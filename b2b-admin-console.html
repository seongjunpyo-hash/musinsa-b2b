                            >
                              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" /></svg>
                              메일 발송
                            </button>
                          );
                        })()}
                      </td>
                      <td onClick={(e) => e.stopPropagation()}>
                        <button onClick={() => { if (confirm(`'${partner.company_name}' 파트너를 삭제하시겠습니까?`)) onDeletePartner(partner.partner_id); }} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: '4px', color: '#111', display: 'inline-flex', alignItems: 'center' }} title="삭제">
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></svg>
                        </button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {editingPartner && (() => {
            const editCountryValid = !!(editingPartner.country && editingPartner.country.trim());
            const editDiscountValid = editingPartner.discount_rate != null && !isNaN(editingPartner.discount_rate) && editingPartner.discount_rate >= 0 && editingPartner.discount_rate <= 1;
            const editCanSave = editCountryValid && editDiscountValid;
            return (
              <div className="modal-overlay" onClick={() => setEditingPartner(null)}>
                <div className="modal-content" onClick={(e) => e.stopPropagation()} style={{ maxWidth: '480px' }}>
                  <div className="modal-header">
                    <h2 className="modal-title">파트너 정보 수정</h2>
                    <button className="modal-close" onClick={() => setEditingPartner(null)}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg></button>
                  </div>
                  <div className="modal-body">
                    <div className="form-group">
                      <label className="form-label">파트너명</label>
                      <input className="form-input" type="text" value={editingPartner.company_name} disabled />
                    </div>
                    <div className="form-group">
                      <label className="form-label">국가 <span style={{ color: '#2563eb' }}>*</span></label>
                      <input
                        className="form-input"
                        type="text"
                        placeholder="예: TH, VN, AE, ID, PH"
                        value={editingPartner.country || ''}
                        onChange={(e) => setEditingPartner({ ...editingPartner, country: e.target.value })}
                      />
                    </div>
                    <div className="form-group">
                      <label className="form-label">할인율 (%) <span style={{ color: '#2563eb' }}>*</span></label>
                      <input
                        className="form-input"
                        type="number"
                        min="0"
                        max="100"
                        value={(editingPartner.discount_rate * 100).toFixed(0)}
                        onChange={(e) => setEditingPartner({ ...editingPartner, discount_rate: parseFloat(e.target.value) / 100 })}
                      />
                    </div>
                  </div>
                  <div className="modal-footer" style={{ borderTop: 'none', paddingTop: '1rem' }}>
                    <button className="btn-cancel" onClick={() => setEditingPartner(null)}>취소</button>
                    <button
                      className="btn-primary"
                      disabled={!editCanSave}
                      style={!editCanSave ? { background: '#e5e5e5', color: '#999', cursor: 'not-allowed', border: 'none' } : {}}
                      onClick={() => {
                        if (!editCanSave) return;
                        onUpdatePartner({ ...editingPartner, country: editingPartner.country.trim() });
                        setEditingPartner(null);
                      }}
                    >저장</button>
                  </div>
                </div>
              </div>
            );
          })()}

          {showAddModal && (
            <div className="modal-overlay" onClick={() => setShowAddModal(false)}>
              <div className="modal-content" onClick={(e) => e.stopPropagation()} style={{ maxWidth: '480px' }}>
                <div className="modal-header">
                  <h2 className="modal-title">파트너 추가</h2>
                  <button className="modal-close" onClick={() => setShowAddModal(false)}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg></button>
                </div>
                <div className="modal-body">
                  <div className="form-group">
                    <label className="form-label">파트너명 <span style={{ color: '#2563eb' }}>*</span></label>
                    <input
                      className="form-input"
                      type="text"
                      value={newPartner.company_name}
                      onChange={(e) => setNewPartner({ ...newPartner, company_name: e.target.value })}
                    />
                  </div>
                  <div className="form-group">
                    <label className="form-label">이메일 <span style={{ color: '#2563eb' }}>*</span></label>
                    <input
                      className="form-input"
                      type="email"
                      value={newPartner.email}
                      onChange={(e) => setNewPartner({ ...newPartner, email: e.target.value })}
                    />
                  </div>
                  <div className="form-group">
                    <label className="form-label">국가 <span style={{ color: '#2563eb' }}>*</span></label>
                    <input
                      className="form-input"
                      type="text"
                      placeholder="예: TH, VN, AE, ID, PH"
                      value={newPartner.country || ''}
                      onChange={(e) => setNewPartner({ ...newPartner, country: e.target.value })}
                    />
                  </div>
                  <div className="form-group">
                    <label className="form-label">할인율 (%) <span style={{ color: '#2563eb' }}>*</span></label>
                    <input
                      className="form-input"
                      type="number"
                      min="1"
                      max="100"
                      step="1"
                      placeholder="입력"
                      value={newPartner.discount_rate || ''}
                      onChange={(e) => {
                        const v = e.target.value;
                        if (v === '') { setNewPartner({ ...newPartner, discount_rate: '' }); return; }
                        const n = parseInt(v, 10);
                        if (isNaN(n)) return;
                        const clamped = Math.max(1, Math.min(100, n));
                        setNewPartner({ ...newPartner, discount_rate: clamped });
                      }}
                      onKeyDown={(e) => { if (['.', '-', '+', 'e', 'E'].includes(e.key)) e.preventDefault(); }}
                    />
                  </div>
                </div>
                <div className="modal-footer" style={{ borderTop: 'none', paddingTop: '1rem' }}>
                  <button className="btn-cancel" onClick={() => setShowAddModal(false)}>취소</button>
                  <button className="btn-primary" onClick={handleAddPartner}>추가</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const SettingsPage = ({ exchangeRate, onUpdateExchangeRate, onUpdateOrderSettings, orderSettingsEnabled }) => {
      const [krwUsd, setKrwUsd] = useState(exchangeRate.krw_per_usd.toString());
      const [effectiveDate, setEffectiveDate] = useState(exchangeRate.effective_date);
      const [orderEnabled, setOrderEnabled] = useState(orderSettingsEnabled);
      const [saved, setSaved] = useState(false);
      const [fetchingRate, setFetchingRate] = useState(false);
      const [rateFetched, setRateFetched] = useState(false);
      const [rateUpdateTime, setRateUpdateTime] = useState('');

      const handleFetchCurrentRate = async () => {
        setFetchingRate(true);
        setRateFetched(false);
        try {
          const res = await fetch('https://open.er-api.com/v6/latest/USD');
          const data = await res.json();
          if (data && data.rates && data.rates.KRW) {
            const rate = Math.round(data.rates.KRW * 100) / 100;
            setKrwUsd(rate.toString());
            const now = new Date();
            const today = now.toISOString().split('T')[0];
            setEffectiveDate(today);
            const timeStr = now.toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            setRateUpdateTime(timeStr);
            setRateFetched(true);
            setTimeout(() => setRateFetched(false), 4000);
          } else {
            alert('환율 정보를 가져올 수 없습니다.');
          }
        } catch (err) {
          alert('환율 API 호출 실패: ' + err.message);
        }
        setFetchingRate(false);
      };

      const handleSave = () => {
        onUpdateExchangeRate({ krw_per_usd: parseFloat(krwUsd), effective_date: effectiveDate });
        onUpdateOrderSettings(orderEnabled);
        setSaved(true);
        setTimeout(() => setSaved(false), 2000);
      };

      return (
        <div className="main-content">
          <div className="settings-container">
            <h1 className="page-title">설정</h1>

            <div className="settings-card">
              <h2 className="settings-card-title">환율 설정</h2>
              <div className="settings-group">
                <label className="settings-label">KRW / USD</label>
                <div style={{ display: 'flex', gap: '8px', alignItems: 'stretch' }}>
                  <input
                    className="settings-input"
                    type="number"
                    step="0.01"
                    value={krwUsd}
                    onChange={(e) => setKrwUsd(e.target.value)}
                    style={{ flex: 1, marginBottom: 0 }}
                  />
                  <button
                    onClick={handleFetchCurrentRate}
                    disabled={fetchingRate}
                    style={{ padding: '0 16px', background: 'transparent', color: '#111', border: '1px solid #bbb', borderRadius: '0', fontSize: '13px', fontWeight: 500, cursor: 'pointer', whiteSpace: 'nowrap', opacity: fetchingRate ? 0.6 : 1 }}
                  >
                    {fetchingRate ? '조회 중...' : '현재 환율 적용'}
                  </button>
                </div>
              </div>
              <div className="settings-group">
                <label className="settings-label">적용 시작일</label>
                <input
                  className="settings-input"
                  type="date"
                  value={effectiveDate}
                  onChange={(e) => setEffectiveDate(e.target.value)}
                />
              </div>
              {rateFetched && (
                <div style={{ padding: '8px 12px', background: '#f0fdf4', border: '1px solid #bbf7d0', borderRadius: '4px', fontSize: '13px', color: '#166534', marginBottom: '8px' }}>
                  환율이 적용되었습니다. (1 USD = {krwUsd} KRW)
                </div>
              )}
              <div className="settings-description">
                현재 환율: 1 USD = {krwUsd} KRW (적용일: {effectiveDate}){rateUpdateTime && <span style={{ marginLeft: '8px', color: '#999' }}>| 조회 시각: {rateUpdateTime}</span>}
              </div>
            </div>

            <button className="btn-save" onClick={handleSave}>설정 저장</button>
            {saved && <div className="save-feedback">저장되었습니다.</div>}

            <div className="settings-info-box">
              <strong>참고 사항</strong>
              <ul>
                <li>환율은 매월 1일에 자동 업데이트됩니다.</li>
                <li>홀세일가 계산에 반영되며, 파트너 할인율이 적용됩니다.</li>
                <li>수주회 기능이 비활성화되면 모든 파트너의 주문이 중지됩니다.</li>
              </ul>
            </div>
          </div>
        </div>
      );
    };

    // Toast 시스템 (전역)
    const ToastContext = React.createContext({ showToast: () => { } });

    const ToastProvider = ({ children }) => {
      const [toasts, setToasts] = useState([]);
      const showToast = React.useCallback((title, message, type = 'success') => {
        const id = Date.now() + Math.random();
        setToasts(prev => [...prev, { id, title, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
      }, []);
      return (
        <ToastContext.Provider value={{ showToast }}>
          {children}
          <div className="toast-container">
            {toasts.map(t => (
              <div key={t.id} className={`toast-item ${t.type}`}>
                <span className="toast-icon">{t.type === 'success' ? '✓' : t.type === 'error' ? '!' : 'i'}</span>
                <div className="toast-body">
                  <div className="toast-title">{t.title}</div>
                  {t.message && <div className="toast-message">{t.message}</div>}
                </div>
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    };

    const useToast = () => React.useContext(ToastContext);

    // 이메일 전송 (시뮬레이션 - 콘솔 출력 + 디자인 미리보기)
    const ALLOWED_EMAILS = ['seongjun.pyo@musinsa.com', 'ddingkoo@gmail.com'];
    const sendOrderResultEmail = async (order, partner, kind) => {
      // kind: 'received' | 'approved' | 'rejected'
      if (!partner || !partner.email) return { ok: false, reason: 'no_email' };
      if (!ALLOWED_EMAILS.includes(partner.email.toLowerCase())) return { ok: false, reason: 'not_allowed' };

      // 어드민에서 등록한 템플릿 사용 (없으면 기본값)
      let template = null;
      try {
        const ds = JSON.parse(localStorage.getItem('musinsa_b2b_display_settings') || '{}');
        template = ds.emailTemplates?.[kind];
      } catch (e) { }
      const fallbackSubject = kind === 'approved'
        ? `[MUSINSA B2B] Your order ${order.order_id} has been APPROVED`
        : kind === 'rejected'
          ? `[MUSINSA B2B] Your order ${order.order_id} has been REJECTED`
          : `[MUSINSA B2B] Your order ${order.order_id} has been RECEIVED`;
      const subject = (template?.subject || fallbackSubject)
        .replace(/\{\{ORDER_ID\}\}/g, order.order_id)
        .replace(/\{\{PARTNER_NAME\}\}/g, partner.company_name || 'Partner');
      const html = buildOrderEmailHtml(order, partner, kind, template);
      // 콘솔에 미리보기 출력 (실제 SMTP 연동 시 이 자리에서 전송)
      console.log('=== EMAIL SEND ===');
      console.log('To:', partner.email);
      console.log('Subject:', subject);
      // 별도 창으로 이메일 미리보기 띄우기 (데모용)
      try {
        const w = window.open('', '_blank', 'width=620,height=800');
        if (w) {
          w.document.title = subject;
          w.document.body.innerHTML = `<div style="background:#f5f5f5;min-height:100vh;padding:20px 0"><div style="max-width:560px;margin:0 auto 16px;font-size:11px;color:#666;font-family:monospace">📧 To: ${partner.email}<br/>Subject: ${subject}</div>${html}</div>`;
        }
      } catch (e) { }
      // 시뮬레이션 딜레이
      await new Promise(r => setTimeout(r, 300));
      return { ok: true };
    };

    const buildOrderEmailHtml = (order, partner, kind, template = null) => {
      const accent = kind === 'approved' ? '#16a34a' : kind === 'rejected' ? '#dc2626' : '#2563eb';
      const statusLabel = kind === 'approved' ? 'APPROVED' : kind === 'rejected' ? 'REJECTED' : 'RECEIVED';
      const fallbackIntro = kind === 'approved'
        ? 'Your order has been approved. We will proceed with the next steps shortly.'
        : kind === 'rejected'
          ? 'Unfortunately, your order has been rejected. Please review the reason below and contact us for further assistance.'
          : 'We have received your order. Our team will review it and get back to you shortly.';
      const fallbackFooter = 'Have any questions? Please reach out to your account manager at b2b@musinsa.com.';
      const replaceVars = (s) => (s || '').replace(/\{\{ORDER_ID\}\}/g, order.order_id).replace(/\{\{PARTNER_NAME\}\}/g, partner.company_name || 'Partner');
      const intro = replaceVars(template?.intro || fallbackIntro);

              </tr>`;

          return `
              <tr>
                <td align="center" style="padding:10px 6px;${cellBorder};color:#111">${it.size || '-'}</td>
                <td align="center" style="padding:10px 6px;${cellBorder};color:#111">${it.qty || 0}</td>

          </tbody>

      return `
<div style="font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;background:#f5f5f5;padding:24px 0;color:#111">

    // Main App
    function AdminConsole() {
      const { showToast } = useToast();
      const VALID_PAGES = ['dashboard', 'products', 'orders', 'display', 'partners'];
      // 페이지 마운트 시 Supabase에서 admins fetch → localStorage 갱신
      // 캐시 클리어 후 새로고침해도 admin 계정 보존
      useEffect(() => {
        (async () => {
          const dbAdmins = await fetchAdminsFromDb();
          if (!dbAdmins) return; // 실패 시 localStorage 유지
          if (dbAdmins.length === 0) {
            // DB가 비어있으면 → localStorage의 admin 목록을 DB에 push
            try {
              const local = JSON.parse(localStorage.getItem(ADMINS_LS_KEY) || '[]');
              if (local.length > 0 && supabaseClient) {
                await supabaseClient.from('admins').upsert(local.map(a => ({
                  email: a.email, name: a.name || null, role: a.role || 'admin',
                  password_hash: a.password_hash, created_at: a.created_at || new Date().toISOString()
                })));
                console.log('[Admin] localStorage → DB seeded', local.length);
              }
            } catch (_) { }
            return;
          }
          // DB에 데이터 있으면 → DB가 source of truth, localStorage 갱신
          localStorage.setItem(ADMINS_LS_KEY, JSON.stringify(dbAdmins));
          console.log('[Admin] DB → localStorage synced', dbAdmins.length);
        })();
      }, []);
      // 로그인 상태: localStorage에 저장 → 새로고침 시 유지
      // index.html에서 ?fresh=1로 진입한 경우 로그인 상태 초기화
      const [isLoggedIn, setIsLoggedIn] = useState(() => {
        try {
          const params = new URLSearchParams(window.location.search);
          if (params.get('fresh') === '1') {
            localStorage.removeItem('musinsa_b2b_admin_logged_in');
            // URL에서 fresh 파라미터 제거 (히스토리 정리)
            const url = new URL(window.location.href);
            url.searchParams.delete('fresh');
            window.history.replaceState(null, '', url.toString());
            return false;
          }
          return localStorage.getItem('musinsa_b2b_admin_logged_in') === '1';
        } catch (e) { return false; }
      });
      // 페이지 상태: URL 해시 기반 (예: #orders) → 뒤로가기/앞으로가기 + 새로고침 유지
      const [currentPage, setCurrentPage] = useState(() => {
        const hash = (window.location.hash || '').replace('#', '');
        return VALID_PAGES.includes(hash) ? hash : 'dashboard';
      });
      const [products, setProducts] = useState(() => {
        try {
          const saved = localStorage.getItem('musinsa_b2b_products');
          if (saved) {
            const parsed = JSON.parse(saved);
            // Merge sub_category from MOCK_PRODUCTS if missing in saved data
            const mockMap = {};
            MOCK_PRODUCTS.forEach(m => { mockMap[m.id] = m; });
            return parsed.map(p => {
              if (!p.sub_category && mockMap[p.id] && mockMap[p.id].sub_category) {
                return { ...p, sub_category: mockMap[p.id].sub_category };
              }
              return p;
            });
          }
        } catch (e) { }
        return MOCK_PRODUCTS;
      });
      const [orders, setOrders] = useState(() => {
        const REMOVED_IDS = ['ORD-2026-0002', 'ORD-2026-0003'];
        try {
          const saved = localStorage.getItem('musinsa_b2b_orders');
          if (saved) return JSON.parse(saved).filter(o => o.partner_name && !REMOVED_IDS.includes(o.order_id));
        } catch (e) { }
        return MOCK_ORDERS;
      });
      const [partners, setPartners] = useState(() => {
        try {
          const saved = localStorage.getItem('musinsa_b2b_partners');
          if (saved) {
            const arr = JSON.parse(saved);
            // partner_id 중복 제거 + 누락된 ID 자동 부여
            const seen = new Set();
            const deduped = [];
            let nextNum = 1;
            arr.forEach(p => {
              let id = p.partner_id;
              if (!id || seen.has(id)) {
                while (seen.has(`PTR-${String(nextNum).padStart(3, '0')}`)) nextNum++;
                id = `PTR-${String(nextNum).padStart(3, '0')}`;
                nextNum++;
              }
              seen.add(id);
              deduped.push({ ...p, partner_id: id });
            });
            return deduped;
          }
        } catch (e) { }
        return MOCK_PARTNERS;
      });
      const [exchangeRate, setExchangeRate] = useState(EXCHANGE_RATE);
      const [displaySettings, setDisplaySettings] = useState(() => {
        const DEFAULT_BANNER_SLOTS = {
          male: { image: 'images/banners/Frame 1739342240.png', title: 'MALE', subtitle: 'COLLECTION', link: '/products?gender=Male' },
          female: { image: 'images/banners/Frame 1739342239.png', title: 'FEMALE', subtitle: 'COLLECTION', link: '/products?gender=Female' },
          kids: { image: 'images/banners/Frame 1739342236.png', title: 'KIDS', subtitle: 'COLLECTION', link: '/products?gender=Kids' },
          accessories: { image: 'images/banners/Frame 1739342238.png', title: 'ACCESSORIES', subtitle: 'COLLECTION', link: '/products?gender=Accessories' },
          special: { image: 'images/banners/Frame 1739342241.png', title: 'SPECIAL', subtitle: 'COLLECTION', link: '/products?season=Special' }
        };
        // 파트너 메인에 현재 자동 노출되는 상품 ID들로 기본값 설정
        const DEFAULT_NEW = ['P-033', 'P-038', 'P-031', 'P-039', 'P-025'];
        const DEFAULT_HERO = ['P-001', 'P-002', 'P-006', 'P-009', 'P-010'];
        try {
          const saved = localStorage.getItem('musinsa_b2b_display_settings');
          if (saved) {
            const parsed = JSON.parse(saved);
            return {
              categoryOrder: {},
              genderOrder: {},
              newProducts: DEFAULT_NEW,
              heroProducts: DEFAULT_HERO,
              bannerSlots: DEFAULT_BANNER_SLOTS,
              ...parsed,
              genderOrder: parsed.genderOrder || {},
              newProducts: (parsed.newProducts && parsed.newProducts.length > 0) ? parsed.newProducts : DEFAULT_NEW,
              heroProducts: (parsed.heroProducts && parsed.heroProducts.length > 0) ? parsed.heroProducts : DEFAULT_HERO,
              bannerSlots: Object.fromEntries(
                Object.entries(DEFAULT_BANNER_SLOTS).map(([k, def]) => [k, { ...def, ...((parsed.bannerSlots && parsed.bannerSlots[k]) || {}) }])
              )
            };
          }
        } catch (e) { }
        return { categoryOrder: {}, genderOrder: {}, newProducts: DEFAULT_NEW, heroProducts: DEFAULT_HERO, bannerSlots: DEFAULT_BANNER_SLOTS };
      });
      useEffect(() => {
        try { localStorage.setItem('musinsa_b2b_display_settings', JSON.stringify(displaySettings)); } catch (e) { }
      }, [displaySettings]);
      // 수주회 상태: displaySettings.orderSettings에서 읽음 (Supabase 동기화용)
      const orderSettingsEnabled = displaySettings.orderSettings?.enabled !== false;
      const setOrderSettingsEnabled = (next) => {
        setDisplaySettings(prev => ({
          ...prev,
          orderSettings: { ...(prev.orderSettings || {}), enabled: next }
        }));
      };
      const orderSchedule = displaySettings.orderSettings?.schedule || null;
      const setOrderSchedule = (next) => {
        setDisplaySettings(prev => ({
          ...prev,
          orderSettings: { ...(prev.orderSettings || {}), schedule: next }
        }));
      };

      // Sync to localStorage
      useEffect(() => {
        try { localStorage.setItem('musinsa_b2b_products', JSON.stringify(products)); } catch (e) { }
      }, [products]);

      useEffect(() => {
        try { localStorage.setItem('musinsa_b2b_orders', JSON.stringify(orders)); } catch (e) { }
      }, [orders]);

      useEffect(() => {
        try { localStorage.setItem('musinsa_b2b_partners', JSON.stringify(partners)); } catch (e) { }
      }, [partners]);

      // ==== Supabase Sync (선택) ====
      // 초기 로드: localStorage에서 즉시 표시 후, Supabase에서 받아 덮어씀
      const sbInitDoneRef = React.useRef({ products: false, partners: false, orders: false, displaySettings: false, exchangeRate: false });
      useEffect(() => {
        if (!SBSync.enabled) return;
        let cancelled = false;
        (async () => {
          const [pRows, prRows, oRows, dsRow, erRow] = await Promise.all([
            SBSync.fetchAll('products'),
            SBSync.fetchAll('partners'),
            SBSync.fetchAll('orders'),
            SBSync.fetchSingleton('display_settings'),
            SBSync.fetchSingleton('exchange_rate')
          ]);
          if (cancelled) return;
          if (pRows && pRows.length > 0) { setProducts(pRows); sbInitDoneRef.current.products = true; }
          if (prRows && prRows.length > 0) {
            // 초기 로드 머지 — DB에 없는 컬럼(예: country)이 사라지지 않도록 localStorage(현재 state)와 머지
            setPartners(prev => {
              const localById = {};
              (prev || []).forEach(p => { localById[p.partner_id] = p; });
              return prRows.map(dbRow => {
                const local = localById[dbRow.partner_id];
                if (!local) return dbRow;
                const out = { ...local };
                Object.keys(dbRow).forEach(k => {
                  const v = dbRow[k];
                  if (v !== undefined && v !== null) out[k] = v;
                });
                return out;
              });
            });
            sbInitDoneRef.current.partners = true;
          }
          if (oRows) {
            // 초기 로드도 머지 — DB에 없는 로컬 필드(processed_at, processed_by 등) 보존
            setOrders(prev => {
              const localById = {};
              (prev || []).forEach(o => { localById[o.order_id] = o; });
              return oRows.map(dbRow => {
                const local = localById[dbRow.order_id];
                if (!local) return dbRow;
                const out = { ...dbRow };
                ['processed_at', 'processed_by', 'suggested_items', 'rejection_reason'].forEach(k => {
                  if (local[k] !== undefined && local[k] !== null && (out[k] === undefined || out[k] === null)) {
                    out[k] = local[k];
                  }
                });
                return out;
              });
            });
            sbInitDoneRef.current.orders = true;
          }
          if (dsRow) {
            // banner_slots 안에 우리가 묶어둔 메타 정보 추출
            const bs = dsRow.banner_slots || {};
            const { __loginMedia, __heroMedia, __emailTemplates, __orderSettings, __genderOrder, ...realBanners } = bs;
            setDisplaySettings(prev => ({
              ...prev,
              categoryOrder: dsRow.category_order || prev.categoryOrder,
              genderOrder: __genderOrder || prev.genderOrder || {},
              newProducts: (dsRow.new_products && dsRow.new_products.length > 0) ? dsRow.new_products : prev.newProducts,
              heroProducts: (dsRow.hero_products && dsRow.hero_products.length > 0) ? dsRow.hero_products : prev.heroProducts,
              bannerSlots: realBanners && Object.keys(realBanners).length > 0 ? { ...prev.bannerSlots, ...realBanners } : prev.bannerSlots,
              loginMedia: __loginMedia || prev.loginMedia,
              heroMedia: __heroMedia || prev.heroMedia,
              emailTemplates: __emailTemplates || prev.emailTemplates,
              orderSettings: __orderSettings || prev.orderSettings
            }));
            sbInitDoneRef.current.displaySettings = true;

          if (erRow) {

        return () => { cancelled = true; };

        if (!SBSync.enabled || !sbInitDoneRef.current.products) return;

        return () => clearTimeout(t);
      }, [products]);

        if (!SBSync.enabled || !sbInitDoneRef.current.partners) return;
        const t = setTimeout(() => SBSync.syncFull('partners', 'partner_id', partners), 500);
        return () => clearTimeout(t);
      }, [partners]);

      // 주문 자동 일괄 upsert 제거됨 (line ~7121).
      // 사유: orders state 변경 → upsertMany → Supabase의 updated_at 트리거 또는 형식 차이 → 폴링이 다시 setOrders → 무한 루프.
      // 개별 주문 변경/생성은 handleUpdateOrder, handleAddOrders에서 명시적으로 upsert 호출하므로 자동 sync 불필요.

      useEffect(() => {
        if (!SBSync.enabled || !sbInitDoneRef.current.displaySettings) return;
        const t = setTimeout(() => SBSync.upsertSingleton('display_settings', {

          new_products: displaySettings.newProducts || [],

          // banner_slots에 loginMedia, heroMedia, emailTemplates도 함께 저장 (스키마 확장 없이)
          banner_slots: {
            ...(displaySettings.bannerSlots || {}),
            __loginMedia: displaySettings.loginMedia || null,
            __heroMedia: displaySettings.heroMedia || null,
            __emailTemplates: displaySettings.emailTemplates || null,
            __orderSettings: displaySettings.orderSettings || null,

          }
        }), 500);
        return () => clearTimeout(t);
      }, [displaySettings]);

      useEffect(() => {
        if (!SBSync.enabled || !sbInitDoneRef.current.exchangeRate) return;
        const t = setTimeout(() => SBSync.upsertSingleton('exchange_rate', exchangeRate), 500);
        return () => clearTimeout(t);
      }, [exchangeRate]);

      // 다른 사용자 변경 폴링 (5초마다)
      useEffect(() => {
        if (!SBSync.enabled) return;
        const interval = setInterval(async () => {
          const [pRows, prRows, oRows] = await Promise.all([

            SBSync.fetchAll('partners'),
            SBSync.fetchAll('orders')
          ]);

          // partners MERGE — DB에 없는 컬럼(예: country)이 폴링으로 사라지지 않도록 로컬 값을 보존
          if (prRows) {
            setPartners(prev => {
              const localById = {};
              prev.forEach(p => { localById[p.partner_id] = p; });
              const merged = prRows.map(dbRow => {
                const local = localById[dbRow.partner_id];
                if (!local) return dbRow;
                // 로컬을 base로, dbRow에서 명시적으로 정의된 값만 덮어씀 (undefined/null이 아닌 키만)
                const out = { ...local };
                Object.keys(dbRow).forEach(k => {
                  const v = dbRow[k];
                  if (v !== undefined && v !== null) out[k] = v;
                });
                return out;
              });
              if (JSON.stringify(merged) === JSON.stringify(prev)) return prev;
              return merged;
            });
          }
          // orders는 MERGE (로컬에만 있는 신규 주문 보존 + 최신 updated_at 우선)
          if (oRows) {
            setOrders(prev => {
              const localById = {};
              prev.forEach(o => { localById[o.order_id] = o; });
              const merged = [];
              const dbIds = new Set();
              // DB rows: 로컬 버전이 더 최신이면 로컬 사용 (방금 admin이 변경한 게 폴링으로 롤백되는 것 방지)
              // 또한 DB 스키마에 없는 로컬 전용 필드(예: processed_at, processed_by)는 항상 보존
              oRows.forEach(dbRow => {
                dbIds.add(dbRow.order_id);
                const local = localById[dbRow.order_id];
                let chosen;
                if (local && local.updated_at && dbRow.updated_at && new Date(local.updated_at) > new Date(dbRow.updated_at)) {
                  chosen = local;
                } else {
                  chosen = { ...dbRow };
                  // 로컬에만 있고 DB에 없는(또는 null인) 필드는 로컬 값 보존 — DB 스키마 미확장 대응
                  if (local) {
                    ['processed_at', 'processed_by', 'suggested_items', 'rejection_reason'].forEach(k => {
                      if (local[k] !== undefined && local[k] !== null && (chosen[k] === undefined || chosen[k] === null)) {
                        chosen[k] = local[k];
                      }
                    });
                  }
                }
                merged.push(chosen);
              });
              // 로컬에만 있는 (아직 sync 안 된) 신규 주문
              prev.forEach(o => { if (!dbIds.has(o.order_id)) merged.push(o); });
              // 변경 없으면 동일 참조 반환
              const sameLength = merged.length === prev.length;
              if (sameLength) {
                const a = JSON.stringify(merged.map(o => o.order_id + '|' + o.status + '|' + o.updated_at));
                const b = JSON.stringify(prev.map(o => o.order_id + '|' + o.status + '|' + o.updated_at));
                if (a === b) return prev;
              }
              return merged;
            });
          }
        }, 5000);
        return () => clearInterval(interval);
      }, [products, partners, orders]);

      // Listen for changes from partner portal / other tabs (orders, partners, products)
      useEffect(() => {
        const syncFromStorage = () => {
          try {
            const savedOrders = localStorage.getItem('musinsa_b2b_orders');
            if (savedOrders) {
              const parsed = JSON.parse(savedOrders).filter(o => o.partner_name);
              if (JSON.stringify(parsed) !== JSON.stringify(orders)) setOrders(parsed);
            }
            const savedPartners = localStorage.getItem('musinsa_b2b_partners');
            if (savedPartners) {
              const parsed = JSON.parse(savedPartners);
              if (Array.isArray(parsed) && JSON.stringify(parsed) !== JSON.stringify(partners)) setPartners(parsed);
            }
            const savedProducts = localStorage.getItem('musinsa_b2b_products');
            if (savedProducts) {
              const parsed = JSON.parse(savedProducts);
              if (Array.isArray(parsed) && JSON.stringify(parsed) !== JSON.stringify(products)) setProducts(parsed);
            }
          } catch (e) { }
        };
        // Instant cross-tab sync via storage event
        const onStorage = (e) => {
          if (!e.key || e.key.startsWith('musinsa_b2b_')) syncFromStorage();
        };
        window.addEventListener('storage', onStorage);
        // Fallback polling (same-tab changes or missed events)
        const interval = setInterval(syncFromStorage, 1000);
        return () => {
          window.removeEventListener('storage', onStorage);
          clearInterval(interval);
        };
      }, [orders, partners, products]);

      const handleLogin = () => {
        setIsLoggedIn(true);
        try { localStorage.setItem('musinsa_b2b_admin_logged_in', '1'); } catch (e) { }
        navigateTo('dashboard');
      };

      const handleLogout = () => {
        setIsLoggedIn(false);
        try {
          localStorage.removeItem('musinsa_b2b_admin_logged_in');
          localStorage.removeItem(ADMIN_CURRENT_LS_KEY);
        } catch (e) { }
        navigateTo('dashboard');
      };

      const [initialOrderFilter, setInitialOrderFilter] = useState('');

      // URL 해시와 currentPage 동기화 — 브라우저 뒤로가기/앞으로가기 지원
      const navigateTo = React.useCallback((page) => {
        if (!VALID_PAGES.includes(page)) page = 'dashboard';
        const targetHash = '#' + page;
        if (window.location.hash !== targetHash) {
          window.history.pushState({ page }, '', targetHash);
        }
        setCurrentPage(page);
      }, []);

      // popstate (뒤로가기/앞으로가기) 이벤트 처리
      useEffect(() => {
        const onPop = () => {
          const hash = (window.location.hash || '').replace('#', '');
          const page = VALID_PAGES.includes(hash) ? hash : 'dashboard';
          setCurrentPage(page);
        };
        window.addEventListener('popstate', onPop);
        // 초기 마운트 시 history state가 비어 있을 수 있어서 replace로 보정
        if (!window.history.state) {
          window.history.replaceState({ page: currentPage }, '', '#' + currentPage);
        }
        return () => window.removeEventListener('popstate', onPop);
      }, []);

      const handleNavigate = (page, filter) => {
        if (filter) setInitialOrderFilter(filter);
        else setInitialOrderFilter('');
        navigateTo(page);
      };

      // ==== 데이터 백업/복원 ====
      // 캐시/사이트데이터 삭제 시 데이터 손실을 방지하기 위해 JSON 파일로 내려받음
      const handleBackup = () => {
        const backup = {
          version: 1,
          exported_at: new Date().toISOString(),
          products: products,
          orders: orders,
          partners: partners,
          displaySettings: displaySettings,
          exchangeRate: exchangeRate
        };
        const json = JSON.stringify(backup, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
        a.href = url;
        a.download = `musinsa-b2b-backup-${ts}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      const handleRestore = (file) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            if (!data || typeof data !== 'object') throw new Error('Invalid backup file');
            const summary = [];
            if (Array.isArray(data.products)) { setProducts(data.products); summary.push(`상품 ${data.products.length}개`); }
            if (Array.isArray(data.orders)) { setOrders(data.orders); summary.push(`주문 ${data.orders.length}건`); }
            if (Array.isArray(data.partners)) { setPartners(data.partners); summary.push(`파트너 ${data.partners.length}개`); }
            if (data.displaySettings && typeof data.displaySettings === 'object') setDisplaySettings(data.displaySettings);
            if (data.exchangeRate && typeof data.exchangeRate === 'object') setExchangeRate(data.exchangeRate);
            alert('복원 완료!\n' + summary.join(', '));
          } catch (err) {
            alert('복원 실패: 올바른 백업 파일이 아닙니다.\n' + (err.message || ''));
          }
        };
        reader.readAsText(file);
      };

      // 데이터가 변경될 때마다 자동으로 sessionStorage에 비상 사본 저장 (탭 닫혀도 같은 세션이면 유지)
      useEffect(() => {
        try {
          sessionStorage.setItem('musinsa_b2b_emergency_backup', JSON.stringify({
            ts: Date.now(), products, orders, partners
          }));
        } catch (e) { }
      }, [products, orders, partners]);

      const handleUpdateProduct = (updatedProduct) => {
        setProducts(prev => prev.map(p => p.id === updatedProduct.id ? updatedProduct : p));
      };

      const handleBulkUpdateProducts = (ids, changes) => {
        setProducts(prev => prev.map(p => ids.includes(p.id) ? { ...p, ...changes } : p));
      };

      const handleAddProduct = (newProduct) => {
        // Generate next P-XXX id
        const nums = products.map(p => parseInt((p.id || '').replace('P-', ''), 10)).filter(n => !isNaN(n));
        const nextNum = nums.length > 0 ? Math.max(...nums) + 1 : 1;
        const id = `P-${String(nextNum).padStart(3, '0')}`;
        const product = { id, is_visible: true, ...newProduct };
        setProducts(prev => [product, ...prev]);
      };

      const handleDeleteProduct = (productId) => {
        setProducts(prev => prev.filter(p => p.id !== productId));
      };

      const handleBulkDeleteProducts = (ids) => {
        setProducts(prev => prev.filter(p => !ids.includes(p.id)));
      };

      const handleUpdateOrder = (updatedOrder) => {
        // updated_at 자동 갱신 (race condition 방지: 폴링이 옛날 데이터로 덮어쓰지 못하도록)
        const stamped = { ...updatedOrder, updated_at: new Date().toISOString() };
        setOrders(prev => prev.map(o => o.order_id === stamped.order_id ? stamped : o));
        // Supabase에 즉시 upsert (debounce 없이) — 폴링 race 방지
        if (SBSync.enabled) {
          SBSync.upsertMany('orders', [stamped]).catch(() => { });
        }
      };

      const handleAddOrders = (newOrders) => {
        const stamped = newOrders.map(o => ({ ...o, updated_at: o.updated_at || new Date().toISOString() }));
        setOrders(prev => [...stamped, ...prev]);
        if (SBSync.enabled && stamped.length > 0) {
          SBSync.upsertMany('orders', stamped).catch(() => { });
        }
      };

      const handleUpdatePartner = (updatedPartner) => {
        setPartners(prev => prev.map(p => p.partner_id === updatedPartner.partner_id ? updatedPartner : p));
      };

      const handleAddPartner = (newPartner) => {
        setPartners(prev => [...prev, newPartner]);
      };

      const handleDeletePartner = (partnerId) => {
        setPartners(prev => prev.filter(p => p.partner_id !== partnerId));
      };

      const handleUpdateExchangeRate = (newRate) => {
        setExchangeRate(newRate);
      };

      return (
        <>
          {!isLoggedIn ? (
            <LoginPage onLogin={handleLogin} />
          ) : (
            <div className="admin-shell">
              <Header currentPage={currentPage} onNavigate={handleNavigate} onLogout={handleLogout} onBackup={handleBackup} onRestore={handleRestore} />
              {currentPage === 'dashboard' && <Dashboard products={products} orders={orders} partners={partners} orderSettingsEnabled={orderSettingsEnabled} onUpdateOrderSettings={setOrderSettingsEnabled} orderSchedule={orderSchedule} onUpdateOrderSchedule={setOrderSchedule} onNavigate={handleNavigate} exchangeRate={exchangeRate} onUpdateExchangeRate={handleUpdateExchangeRate} onUpdateOrder={handleUpdateOrder} />}
              {currentPage === 'products' && <ProductsPage products={products} onUpdateProduct={handleUpdateProduct} onAddProduct={handleAddProduct} onBulkUpdateProducts={handleBulkUpdateProducts} onDeleteProduct={handleDeleteProduct} onBulkDeleteProducts={handleBulkDeleteProducts} partners={partners} exchangeRate={exchangeRate} onUpdatePartner={handleUpdatePartner} />}
              {currentPage === 'display' && <DisplaySettingsPage products={products} displaySettings={displaySettings} onUpdateDisplaySettings={setDisplaySettings} />}
              {currentPage === 'orders' && <OrdersPage orders={orders} onUpdateOrder={handleUpdateOrder} onAddOrders={handleAddOrders} products={products} partners={partners} initialFilter={initialOrderFilter} />}
              {currentPage === 'partners' && <PartnersPage partners={partners} orders={orders} onUpdatePartner={handleUpdatePartner} onAddPartner={handleAddPartner} onDeletePartner={handleDeletePartner} />}
            </div>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <ToastProvider><AdminConsole /></ToastProvider>
    );
  </script>
</body>

</html>
