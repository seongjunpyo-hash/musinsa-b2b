<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MUSINSA Admin Console</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="design-system/layer-desktop.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      font-family: 'Pretendard Variable', Pretendard, system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-fg);
    }

    body {
      line-height: 1.5;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: 'Pretendard Variable', Pretendard, system-ui, -apple-system, sans-serif;
      cursor: pointer;
      border: none;
    }

    input, textarea, select {
      font-family: 'Pretendard Variable', Pretendard, system-ui, -apple-system, sans-serif;
    }

    /* Login Page */
    .login-container {
      display: grid;
      grid-template-columns: 60% 40%;
      min-height: 100vh;
    }

    .login-left {
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .login-branding {
      text-align: center;
    }

    .login-branding-main {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      margin-bottom: 0.5rem;
    }

    .login-branding-sub {
      font-size: 0.875rem;
      letter-spacing: 0.4em;
      opacity: 0.6;
    }

    .login-right {
      background: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem 2rem;
    }

    .login-form-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2rem;
    }

    .language-toggle {
      display: flex;
      gap: 0.5rem;
      background: var(--color-bg-low);
      padding: 0.25rem;
      border-radius: 2px;
    }

    .lang-btn {
      padding: 0.5rem 1rem;
      background: transparent;
      border: none;
      font-size: 0.875rem;
      cursor: pointer;
      color: var(--color-fg-low);
    }

    .lang-btn.active {
      background: #fff;
      color: #000;
    }

    .login-form-content h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .login-form-content p {
      color: var(--color-fg-low);
      margin-bottom: 2rem;
      font-size: 0.875rem;
    }

    .login-label {
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      font-weight: 600;
      color: #000;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    .login-label:first-of-type {
      margin-top: 0;
    }

    .login-label-internal {
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      color: #000;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--color-border-strong);
      display: block;
    }

    .login-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--color-border);
      background: var(--color-bg);
      color: var(--color-fg);
      margin-bottom: 1rem;
      font-size: 14px;
      border-radius: var(--input-radius);
    }

    .login-input:focus {
      outline: none;
      border-color: var(--color-border-strong);
    }

    .login-submit {
      width: 100%;
      padding: 12px 16px;
      background: var(--color-bg-contrast);
      color: var(--color-fg-on-contrast);
      font-size: 15px;
      font-weight: var(--btn-font-weight);
      letter-spacing: 0;
      margin-top: 1rem;
      border-radius: var(--btn-radius);
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-submit:hover {
      background: var(--gray-800);
    }

    .login-demo {
      font-size: 0.75rem;
      color: var(--color-fg-low);
      margin-top: 1rem;
      line-height: 1.6;
    }

    /* Header */
    .header {
      height: 3.5rem;
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border-low);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-brand {
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .header-badge {
      background: var(--color-bg-low);
      color: #000;
      font-size: 0.65rem;
      padding: 0.25rem 0.5rem;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .header-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
    }

    .header-nav {
      display: flex;
      gap: 2rem;
      margin-left: 0;
    }

    .header-nav-item {
      color: var(--color-fg-low);
      font-size: 0.95rem;
      cursor: pointer;
      transition: color 0.2s;
      position: relative;
    }

    .header-nav-item.active {
      color: #000;
      font-weight: 600;
    }

    .header-nav-item.active::after {
      content: '';
      position: absolute;
      bottom: -0.75rem;
      left: 0;
      right: 0;
      height: 2px;
      background: #000;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .header-admin {
      color: var(--color-fg-low);
      font-size: 0.95rem;
    }

    .header-logout {
      color: #000;
      font-size: 0.95rem;
      cursor: pointer;
      text-decoration: underline;
      transition: color 0.2s;
    }

    .header-logout:hover {
      color: #666;
    }

    /* Main Content */
    .main-content {
      padding: 2rem;
      max-width: 100%;
    }

    .page-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .page-subtitle {
      color: var(--color-fg-low);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    /* Dashboard */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      padding: 1.5rem;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-radius: var(--radius-md);
    }

    .stat-card-value {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .stat-card-label {
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      color: #000;
      margin-bottom: 0.5rem;
    }

    .stat-card-subtitle {
      font-size: 0.85rem;
      color: var(--color-fg-low);
    }

    .stat-card.amber .stat-card-value {
      color: #d97706;
    }

    .stat-card.green .stat-card-value {
      color: #16a34a;
    }

    .stat-card-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #16a34a;
    }

    .quick-actions-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1.5rem;
    }

    .quick-actions-card {
      background: #fff;
      border: 1px solid var(--color-border);
      padding: 1.5rem;
    }

    .quick-actions-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    .quick-action-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid #f5f5f5;
      cursor: pointer;
      transition: background 0.2s;
    }

    .quick-action-item:hover {
      background: var(--color-bg-low);
      padding: 0.75rem 0.5rem;
      margin: 0 -0.5rem;
    }

    .quick-action-item:last-child {
      border-bottom: none;
    }

    .quick-action-text {
      font-size: 0.95rem;
    }

    .quick-action-arrow {
      color: var(--color-fg-low);
    }

    .recent-orders-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .order-item {
      padding: 0.75rem 0;
      border-bottom: 1px solid #f5f5f5;
      font-size: 0.85rem;
    }

    .order-item:last-child {
      border-bottom: none;
    }

    .order-id {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .order-meta {
      color: var(--color-fg-low);
      font-size: 0.8rem;
    }

    /* Products Page */
    .products-actions {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .btn-primary {
      background: var(--color-bg-contrast);
      color: var(--color-fg-on-contrast);
      padding: 10px 16px;
      font-size: 14px;
      font-weight: var(--btn-font-weight);
      border-radius: var(--btn-radius);
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover {
      background: var(--gray-800);
    }

    .btn-secondary {
      background: var(--color-bg-low);
      color: var(--color-fg);
      padding: 10px 16px;
      font-size: 14px;
      font-weight: var(--btn-font-weight);
      border-radius: var(--btn-radius);
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid var(--color-border);
    }

    .btn-secondary:hover {
      background: var(--color-border-low);
    }

    .search-input {
      width: 100%;
      max-width: 400px;
      padding: 10px 12px;
      border: 1px solid var(--color-border);
      background: var(--color-bg);
      color: var(--color-fg);
      margin-bottom: 1.5rem;
      font-size: 14px;
      border-radius: var(--input-radius);
    }

    .search-input::placeholder {
      color: var(--color-fg-low);
    }

    .products-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .products-table thead {
      background: var(--color-bg-low);
      border-top: 1px solid var(--color-divider);
      border-bottom: 1px solid var(--color-divider);
    }

    .products-table th {
      padding: 0.75rem;
      text-align: left;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.02em;
      color: #000;
    }

    .products-table td {
      padding: 0.75rem;
      border-bottom: 1px solid var(--color-divider);
      vertical-align: middle;
    }

    .products-table tbody tr:hover {
      background: var(--color-bg-low);
    }

    .product-image {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border: 1px solid var(--color-border);
    }

    .product-link {
      color: #0066cc;
      cursor: pointer;
      font-weight: 500;
    }

    .product-link:hover {
      text-decoration: underline;
    }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }

    .toggle-switch input {
      display: none;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 24px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    .toggle-switch input:checked + .toggle-slider {
      background-color: #000;
    }

    .toggle-switch input:checked + .toggle-slider:before {
      transform: translateX(20px);
    }

    /* Orders Page */
    .orders-filters {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .filter-select {
      padding: 0.75rem;
      border: 1px solid var(--color-border);
      background: #fff;
      color: #000;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: var(--btn-font-weight);
      letter-spacing: 0;
    }

    .status-badge.pending {
      background: #fef08a;
      color: #713f12;
    }

    .status-badge.approved {
      background: #dcfce7;
      color: #166534;
    }

    .status-badge.rejected {
      background: #fee2e2;
      color: #991b1b;
    }

    .status-badge.cancelled {
      background: #f3f4f6;
      color: #374151;
    }

    .btn-small {
      padding: 6px 10px;
      font-size: 13px;
      font-weight: var(--btn-font-weight);
      background: var(--color-bg-contrast);
      color: var(--color-fg-on-contrast);
      border: none;
      border-radius: var(--btn-radius);
      cursor: pointer;
      margin: 0 0.25rem;
      transition: background 0.2s;
    }

    .btn-small:hover {
      background: #333;
    }

    .btn-small.reject {
      background: #fee2e2;
      color: #991b1b;
    }

    .btn-small.reject:hover {
      background: #fecaca;
    }

    /* Partners Page */
    .partners-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .partners-header .page-subtitle {
      margin-bottom: 0;
    }

    /* Settings Page */
    .settings-container {
      max-width: 700px;
      margin: 0 auto;
    }

    .settings-card {
      background: #fff;
      border: 1px solid var(--color-border);
      padding: 2rem;
      margin-bottom: 1.5rem;
    }

    .settings-card-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .settings-group {
      margin-bottom: 1.5rem;
    }

    .settings-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #000;
    }

    .settings-input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--color-border);
      background: #fff;
      color: #000;
      font-size: 0.95rem;
    }

    .settings-description {
      font-size: 0.85rem;
      color: var(--color-fg-low);
      margin-top: 0.5rem;
    }

    .settings-warning {
      background: #fef08a;
      border: 1px solid #facc15;
      padding: 1rem;
      border-radius: 2px;
      font-size: 0.85rem;
      color: #713f12;
      margin-top: 1rem;
    }

    .settings-toggle-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .settings-info-box {
      background: var(--color-bg-low);
      border-left: 3px solid #000;
      padding: 1rem;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      line-height: 1.7;
    }

    .settings-info-box ul {
      list-style: none;
      padding-left: 0;
    }

    .settings-info-box li {
      margin-bottom: 0.5rem;
    }

    .settings-info-box li:before {
      content: "•";
      margin-right: 0.5rem;
      font-weight: 700;
    }

    .btn-save {
      background: #000;
      color: #fff;
      padding: 0.75rem 2rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: background 0.2s;
    }

    .btn-save:hover {
      background: #333;
    }

    .save-feedback {
      color: #16a34a;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      max-width: 90vw;
      max-height: 85vh;
      overflow-y: auto;
      padding: 2rem;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--color-divider);
      padding-bottom: 1rem;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .modal-close {
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--color-fg-low);
      transition: color 0.2s;
      background: none;
      border: none;
      padding: 0;
    }

    .modal-close:hover {
      color: #000;
    }

    .modal-body {
      margin-bottom: 1.5rem;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-top: 2rem;
      border-top: 1px solid var(--color-divider);
      padding-top: 1rem;
    }

    .btn-cancel {
      background: var(--color-bg-low);
      color: var(--color-fg);
      padding: 10px 16px;
      font-size: 14px;
      font-weight: var(--btn-font-weight);
      border-radius: var(--btn-radius);
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-cancel:hover {
      background: var(--color-border-low);
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: #000;
    }

    .form-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--color-border);
      background: var(--color-bg);
      color: var(--color-fg);
      font-size: 14px;
      border-radius: var(--input-radius);
    }

    .form-input:disabled {
      background: var(--color-bg-low);
      color: var(--color-fg-low);
      cursor: not-allowed;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-row-full {
      grid-column: 1 / -1;
    }

    .image-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .image-item {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      border: 1px solid var(--color-border);
      overflow: hidden;
    }

    .image-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .drag-drop-zone {
      border: 2px dashed var(--color-border);
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      border-radius: var(--radius-md);
      background: var(--color-bg-low);
    }

    .drag-drop-zone:hover {
      border-color: #000;
      background: var(--color-bg-low);
    }

    .drag-drop-zone.drag-over {
      border-color: #000;
      background: #f0f0f0;
    }

    .sizes-table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.9rem;
    }

    .sizes-table th,
    .sizes-table td {
      padding: 0.5rem;
      text-align: left;
      border-bottom: 1px solid var(--color-divider);
    }

    .sizes-table th {
      background: var(--color-bg-low);
      font-weight: 600;
      font-size: 0.85rem;
    }

    .sizes-table tbody tr:hover {
      background: #f9f9f9;
    }

    .textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--color-border);
      background: #fff;
      color: #000;
      font-family: 'Pretendard Variable', Pretendard, system-ui, -apple-system, sans-serif;
      font-size: 14px;
      resize: vertical;
      min-height: 100px;
      border-radius: var(--input-radius);
    }

    .textarea:focus {
      outline: none;
      border-color: #000;
    }

    .order-items-table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.9rem;
    }

    .order-items-table th,
    .order-items-table td {
      padding: 0.75rem;
      text-align: left;
      border-bottom: 1px solid var(--color-divider);
    }

    .order-items-table th {
      background: var(--color-bg-low);
      font-weight: 600;
      font-size: 0.85rem;
    }

    .order-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--color-divider);
    }

    .order-info-item {
      display: flex;
      flex-direction: column;
    }

    .order-info-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #000;
      margin-bottom: 0.3rem;
    }

    .order-info-value {
      font-size: 0.95rem;
      color: #000;
    }

      );
    };

    const PartnersPage = ({ partners, onUpdatePartner, onAddPartner }) => {
      const [searchTerm, setSearchTerm] = useState('');
      const [editingPartner, setEditingPartner] = useState(null);
      const [showAddModal, setShowAddModal] = useState(false);
      const [newPartner, setNewPartner] = useState({ company_name: '', email: '', discount_rate: 0 });

      const filteredPartners = partners.filter(p =>
        p.company_name.toLowerCase().includes(searchTerm.toLowerCase()) ||
        p.email.toLowerCase().includes(searchTerm.toLowerCase())
      );

      const handleAddPartner = () => {
        const partner = {
          partner_id: `PTR-${String(partners.length + 1).padStart(3, '0')}`,
          company_name: newPartner.company_name,
          email: newPartner.email,
          discount_rate: newPartner.discount_rate / 100,
          created_at: new Date().toISOString().split('T')[0]
        };
        onAddPartner(partner);
        setShowAddModal(false);
        setNewPartner({ company_name: '', email: '', discount_rate: 0 });
      };

      return (
        <div className="main-content">
          <div className="partners-header">
            <div>
              <h1 className="page-title">파트너 관리</h1>
            </div>
            <button className="btn-primary" onClick={() => setShowAddModal(true)}>파트너 추가</button>
          </div>

          <input
            type="text"
            className="search-input"
            placeholder="파트너명 또는 이메일로 검색"
            value={searchTerm}
            onChange={(e) => setSearchTerm(e.target.value)}
          />

          <table className="products-table">
            <thead>
              <tr>
                <th>파트너 ID</th>
                <th>파트너명</th>
                <th>이메일</th>
                <th>할인율 (%)</th>
                <th>등록일</th>
                <th>수정</th>
              </tr>
            </thead>
            <tbody>
              {filteredPartners.map(partner => (
                <tr key={partner.partner_id}>
                  <td>{partner.partner_id}</td>
                  <td>{partner.company_name}</td>
                  <td>{partner.email}</td>
                  <td>{(partner.discount_rate * 100).toFixed(0)}%</td>
                  <td>{partner.created_at}</td>
                  <td>
                    <button className="btn-small" onClick={() => setEditingPartner(partner)}>수정</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>

          {editingPartner && (
            <div className="modal-overlay" onClick={() => setEditingPartner(null)}>
              <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                <div className="modal-header">
                  <h2 className="modal-title">파트너 할인율 수정</h2>
                  <button className="modal-close" onClick={() => setEditingPartner(null)}>×</button>
                </div>
                <div className="modal-body">
                  <div className="form-group">
                    <label className="form-label">파트너명</label>
                    <input className="form-input" type="text" value={editingPartner.company_name} disabled />
                  </div>
                  <div className="form-group">
                    <label className="form-label">할인율 (%)</label>
                    <input
                      className="form-input"
                      type="number"
                      min="0"
                      max="100"
                      value={(editingPartner.discount_rate * 100).toFixed(0)}
                      onChange={(e) => setEditingPartner({ ...editingPartner, discount_rate: parseFloat(e.target.value) / 100 })}
                    />
                  </div>
                </div>
                <div className="modal-footer">
                  <button className="btn-cancel" onClick={() => setEditingPartner(null)}>취소</button>
                  <button className="btn-primary" onClick={() => { onUpdatePartner(editingPartner); setEditingPartner(null); }}>저장</button>
                </div>
              </div>
            </div>
          )}

          {showAddModal && (
            <div className="modal-overlay" onClick={() => setShowAddModal(false)}>
              <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                <div className="modal-header">
                  <h2 className="modal-title">파트너 추가</h2>
                  <button className="modal-close" onClick={() => setShowAddModal(false)}>×</button>
                </div>
                <div className="modal-body">
                  <div className="form-group">
                    <label className="form-label">파트너명</label>
                    <input
                      className="form-input"
                      type="text"
                      value={newPartner.company_name}
                      onChange={(e) => setNewPartner({ ...newPartner, company_name: e.target.value })}
                    />
                  </div>
                  <div className="form-group">
                    <label className="form-label">이메일</label>
                    <input
                      className="form-input"
                      type="email"
                      value={newPartner.email}
                      onChange={(e) => setNewPartner({ ...newPartner, email: e.target.value })}
                    />
                  </div>
                  <div className="form-group">
                    <label className="form-label">할인율 (%)</label>
                    <input
                      className="form-input"
                      type="number"
                      min="0"
                      max="100"
                      value={newPartner.discount_rate}
                      onChange={(e) => setNewPartner({ ...newPartner, discount_rate: parseFloat(e.target.value) })}
                    />
                  </div>
                </div>
                <div className="modal-footer">
                  <button className="btn-cancel" onClick={() => setShowAddModal(false)}>취소</button>
                  <button className="btn-primary" onClick={handleAddPartner}>추가</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const SettingsPage = ({ exchangeRate, onUpdateExchangeRate, onUpdateOrderSettings, orderSettingsEnabled }) => {
      const [krwUsd, setKrwUsd] = useState(exchangeRate.krw_per_usd.toString());
      const [effectiveDate, setEffectiveDate] = useState(exchangeRate.effective_date);
      const [orderEnabled, setOrderEnabled] = useState(orderSettingsEnabled);
      const [saved, setSaved] = useState(false);

      const handleSave = () => {
        onUpdateExchangeRate({ krw_per_usd: parseFloat(krwUsd), effective_date: effectiveDate });
        onUpdateOrderSettings(orderEnabled);
        setSaved(true);
        setTimeout(() => setSaved(false), 2000);
      };

      return (
        <div className="main-content">
          <div className="settings-container">
            <h1 className="page-title">설정</h1>

            <div className="settings-card">
              <h2 className="settings-card-title">환율 설정</h2>
              <div className="settings-group">
                <label className="settings-label">KRW / USD</label>
                <input
                  className="settings-input"
                  type="number"
                  step="0.01"
                  value={krwUsd}
                  onChange={(e) => setKrwUsd(e.target.value)}
                />
              </div>
              <div className="settings-group">
                <label className="settings-label">적용 시작일</label>
                <input
                  className="settings-input"
                  type="date"
                  value={effectiveDate}
                  onChange={(e) => setEffectiveDate(e.target.value)}
                />
              </div>
              <div className="settings-description">
                현재 환율: 1 USD = {krwUsd} KRW (적용일: {effectiveDate})
              </div>
            </div>

            <div className="settings-card">
              <h2 className="settings-card-title">수주회 설정</h2>
              <div className="settings-toggle-group">
                <div>
                  <label className="settings-label">주문 기능 활성화</label>
                  <div className="settings-description">
                    {orderEnabled ? '수주회 주문 기능이 활성화되어 있습니다.' : '수주회 주문 기능이 비활성화되어 있습니다.'}
                  </div>
                </div>
                <label className="toggle-switch">
                  <input
                    type="checkbox"
                    checked={orderEnabled}
                    onChange={(e) => setOrderEnabled(e.target.checked)}
                  />
                  <span className="toggle-slider"></span>
                </label>
              </div>
              {!orderEnabled && <div className="settings-warning">수주회 주문 기능이 비활성화되어 있습니다. 파트너사에서 주문을 할 수 없습니다.</div>}
            </div>

            <button className="btn-save" onClick={handleSave}>설정 저장</button>
            {saved && <div className="save-feedback">저장되었습니다.</div>}

            <div className="settings-info-box">
              <strong>참고 사항</strong>
              <ul>
                <li>환율은 매월 1일에 자동 업데이트됩니다.</li>
                <li>홀세일가 계산에 반영되며, 파트너 할인율이 적용됩니다.</li>
                <li>수주회 기능이 비활성화되면 모든 파트너의 주문이 중지됩니다.</li>
              </ul>
            </div>
          </div>
        </div>
      );
    };

    // Main App
    function AdminConsole() {
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [currentPage, setCurrentPage] = useState('dashboard');
      const [products, setProducts] = useState(MOCK_PRODUCTS);
      const [orders, setOrders] = useState(MOCK_ORDERS);
      const [partners, setPartners] = useState(MOCK_PARTNERS);
      const [exchangeRate, setExchangeRate] = useState(EXCHANGE_RATE);
      const [orderSettingsEnabled, setOrderSettingsEnabled] = useState(true);

      const handleLogin = () => {
        setIsLoggedIn(true);
        setCurrentPage('dashboard');
      };

      const handleLogout = () => {
        setIsLoggedIn(false);
        setCurrentPage('dashboard');
      };

      const handleNavigate = (page) => {
        setCurrentPage(page);
      };

      const handleUpdateProduct = (updatedProduct) => {
        setProducts(prev => prev.map(p => p.id === updatedProduct.id ? updatedProduct : p));
      };

      const handleUpdateOrder = (updatedOrder) => {
        setOrders(prev => prev.map(o => o.order_id === updatedOrder.order_id ? updatedOrder : o));
      };

      const handleUpdatePartner = (updatedPartner) => {
        setPartners(prev => prev.map(p => p.partner_id === updatedPartner.partner_id ? updatedPartner : p));
      };

      const handleAddPartner = (newPartner) => {
        setPartners(prev => [...prev, newPartner]);
      };

      const handleUpdateExchangeRate = (newRate) => {
        setExchangeRate(newRate);
      };

      return (
        <>
          {!isLoggedIn ? (
            <LoginPage onLogin={handleLogin} />
          ) : (
            <>
              <Header currentPage={currentPage} onNavigate={handleNavigate} onLogout={handleLogout} />
              {currentPage === 'dashboard' && <Dashboard products={products} orders={orders} partners={partners} />}
              {currentPage === 'products' && <ProductsPage products={products} onUpdateProduct={handleUpdateProduct} partners={partners} exchangeRate={exchangeRate} />}
              {currentPage === 'orders' && <OrdersPage orders={orders} onUpdateOrder={handleUpdateOrder} products={products} />}
              {currentPage === 'partners' && <PartnersPage partners={partners} onUpdatePartner={handleUpdatePartner} onAddPartner={handleAddPartner} />}
              {currentPage === 'settings' && <SettingsPage exchangeRate={exchangeRate} onUpdateExchangeRate={handleUpdateExchangeRate} onUpdateOrderSettings={setOrderSettingsEnabled} orderSettingsEnabled={orderSettingsEnabled} />}
            </>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<AdminConsole />);
  </script>
</body>
</html>
