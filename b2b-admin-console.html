<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MUSINSA Admin Console</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- EmailJS SDK — 실제 메일 발송 (https://www.emailjs.com) -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="design-system/layer-desktop.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      font-family: 'Pretendard Variable', Pretendard, system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-fg);
    }

    body {
      line-height: 1.5;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: 'Pretendard Variable', Pretendard, system-ui, -apple-system, sans-serif;
      cursor: pointer;
      border: none;
    }

    input,
    textarea,
    select {
      font-family: 'Pretendard Variable', Pretendard, system-ui, -apple-system, sans-serif;
    }

    /* Login Page */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0a0a0a;
      position: relative;
      overflow: hidden;
    }

    .login-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='90' viewBox='0 0 200 90'><text x='10' y='52' font-family='Pretendard, system-ui, sans-serif' font-size='28' font-weight='900' letter-spacing='0' fill='%23ffffff' fill-opacity='0.07'>MUSINSA</text></svg>");
      background-repeat: repeat;
      background-size: 200px 90px;
      pointer-events: none;
      z-index: 0;
    }

    .login-container>* {
      position: relative;
      z-index: 1;
    }

    /* 로그인 컨테이너 — 로고 영역 + 폼 카드 세로 스택 */
    .login-container {
      flex-direction: column;
      gap: 2.5rem;
    }

    .login-left {
      display: none;
    }

    .login-branding {
      color: #fff;
    }

    .login-branding-main {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      line-height: 1;
    }

    .login-branding-sub {
      font-size: 0.6875rem;
      letter-spacing: 0.4em;
      color: rgba(255, 255, 255, 0.45);
      text-transform: uppercase;
      font-weight: 500;
      margin-top: 10px;
    }

    .login-right {
      background: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
    }

    .login-form-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2rem;
    }

    .language-toggle {
      display: flex;
      gap: 0.5rem;
      background: #f5f5f5;
      padding: 0.25rem;
      border-radius: 2px;
    }

    .lang-btn {
      padding: 0.5rem 1rem;
      background: transparent;
      border: none;
      font-size: 0.875rem;
      cursor: pointer;
      color: var(--color-fg-low);
    }

    .lang-btn.active {
      background: #fff;
      color: #000;
    }

    .login-form-content h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .login-form-content p {
      color: var(--color-fg-low);
      margin-bottom: 2rem;
      font-size: 0.875rem;
    }

    .login-label {
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      font-weight: 600;
      color: #000;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    .login-label:first-of-type {
      margin-top: 0;
    }

    .login-label-internal {
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #000;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--color-border-strong);
      display: block;
    }

    .login-form-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 6px 0;
    }

    .login-form-header p {
      font-size: 0.8125rem;
      color: #666;
      margin: 0;
    }

    .login-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #bbb;
      background: transparent;
      color: var(--color-fg);
      margin-bottom: 0.25rem;
      font-size: 14px;
      border-radius: var(--input-radius);
    }

    .login-input:focus {
      outline: none;
      border-color: var(--color-border-strong);
    }

    .login-submit {
      width: 100%;
      padding: 12px 16px;
      background: var(--color-bg-contrast);
      color: var(--color-fg-on-contrast);
      font-size: 15px;
      font-weight: var(--btn-font-weight);
      letter-spacing: 0;
      margin-top: 1rem;
      border-radius: var(--btn-radius);
      cursor: pointer;
      transition: background 0.2s;
      text-transform: uppercase;
    }

    .login-submit:hover {
      background: var(--gray-800);
    }

    .login-demo {
      font-size: 0.75rem;
      color: var(--color-fg-low);
      margin-top: 1rem;
      line-height: 1.6;
    }

    /* Header */
    .header {
      height: 3.5rem;
      background: var(--color-bg);
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-brand {
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .header-badge {
      background: #f5f5f5;
      color: #000;
      font-size: 0.65rem;
      padding: 0.25rem 0.5rem;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .header-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      height: 100%;
    }

    .header-nav {
      display: flex;
      gap: 2rem;
      margin-left: 0;
      height: 100%;
    }

    .header-nav-item {
      color: var(--color-fg-low);
      font-size: 0.95rem;
      cursor: pointer;
      transition: color 0.2s;
      position: relative;
      display: flex;
      align-items: center;
      height: 100%;
    }

    .header-nav-item.active {
      color: #000;
      font-weight: 600;
    }

    .header-nav-item.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: #000;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .header-admin {
      color: var(--color-fg-low);
      font-size: 0.8125rem;
    }

    .header-logout {
      color: #000;
      font-size: 0.8125rem;
      cursor: pointer;
      text-decoration: underline;
      transition: color 0.2s;
    }

    .header-logout:hover {
      color: #666;
    }

    /* Main Content */
    .main-content {
      padding: 2rem;
      max-width: 1980px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
      min-width: 0;
    }

    .page-title {
      font-size: 1.375rem;
      font-weight: 700;
      margin-bottom: 0.375rem;
    }

    .page-subtitle {
      color: var(--color-fg-low);
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
    }

    /* Dashboard */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: #fff;
      border: 1px solid #ddd;
      padding: 1.5rem;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-radius: 10px;
    }

    .stat-card-value {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .stat-card-label {
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      color: #000;
      margin-bottom: 0.5rem;
    }

    .stat-card-subtitle {
      font-size: 0.85rem;
      color: var(--color-fg-low);
    }

    .stat-card.amber .stat-card-value {
      color: #2563eb;
    }

    .stat-card.green .stat-card-value {
      color: #16a34a;
    }

    .stat-card-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #16a34a;
    }

    .quick-actions-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1.5rem;
    }

    .quick-actions-card {
      background: #fff;
      border: 1px solid #eee;
      padding: 1.5rem;
    }

    .quick-actions-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    .quick-action-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid #f5f5f5;
      cursor: pointer;
      transition: background 0.2s;
    }

    .quick-action-item:hover {
      background: var(--color-bg-low);
      padding: 0.75rem 0.5rem;
      margin: 0 -0.5rem;
    }

    .quick-action-item:last-child {
      border-bottom: none;
    }

    .quick-action-text {
      font-size: 0.95rem;
    }

    .quick-action-arrow {
      color: var(--color-fg-low);
    }

    .recent-orders-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .order-item {
      padding: 0.75rem 0;
      border-bottom: 1px solid #f5f5f5;
      font-size: 0.85rem;
    }

    .order-item:last-child {
      border-bottom: none;
    }

    .order-id {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .order-meta {
      color: var(--color-fg-low);
      font-size: 0.8rem;
    }

    /* Products Page */
    .products-actions {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .btn-primary {
      background: var(--color-bg-contrast);
      color: var(--color-fg-on-contrast);
      padding: 10px 16px;
      font-size: 14px;
      font-weight: var(--btn-font-weight);
      border-radius: var(--btn-radius);
      cursor: pointer;
      transition: background 0.2s;
      text-transform: uppercase;
    }

    .btn-primary:hover {
      background: var(--gray-800);
    }

    .btn-secondary {
      background: transparent;
      color: var(--color-fg);
      padding: 10px 16px;
      font-size: 14px;
      font-weight: var(--btn-font-weight);
      border-radius: var(--btn-radius);
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid #bbb;
      text-transform: uppercase;
    }

    .btn-secondary:hover {
      background: var(--color-border-low);
    }

    .search-input {
      width: 100%;
      max-width: 400px;
      padding: 10px 12px;
      border: 1px solid #bbb;
      background: transparent;
      color: var(--color-fg);
      margin-bottom: 1.5rem;
      font-size: 14px;
      border-radius: var(--input-radius);
    }

    .search-input::placeholder {
      color: var(--color-fg-low);
    }

    .products-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .products-table thead {
      background: transparent;
    }

    .products-table th {
      padding: 14px 12px;
      text-align: left;
      font-weight: 700;
      font-size: 13px;
      color: #111;
      letter-spacing: 0.02em;
      border-top: none;
      border-bottom: none;
      white-space: nowrap;
    }

    .products-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #f5f5f5;
      vertical-align: middle;
      font-size: 13px;
      color: #333;
      white-space: nowrap;
    }

    .products-table td button {
      white-space: nowrap;
    }

    /* 상품명/이메일 같은 긴 텍스트 셀은 .wrap-cell 클래스로 줄바꿈 허용 */
    .products-table td.wrap-cell {
      white-space: normal;
    }

    .products-table tbody tr:hover {
      background: #fafafa;
    }

    .products-table input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #111;
    }

    .products-table th input[type="checkbox"] {
      width: 18px;
      height: 18px;
    }

    .product-image {
      width: 60px;
      height: 80px;
      object-fit: cover;
      border: 1px solid #eee;
      border-radius: 4px;
    }

    /* 정보 아이콘 + 툴팁 */
    .info-tooltip-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: help;
      padding: 12px 4px;
      margin: -12px -4px;
    }

    .info-tooltip-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: transparent;
      color: #111;
      border: 1px solid #111;
      font-family: 'Times New Roman', Georgia, serif;
      font-style: italic;
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      vertical-align: middle;
      transition: background 0.15s, color 0.15s;
    }

    .info-tooltip-wrap:hover .info-tooltip-icon {
      background: #111;
      color: #fff;
    }

    .info-tooltip-wrap .tooltip-content {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      color: #fff;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 400;
      white-space: nowrap;
      max-width: 320px;
      white-space: normal;
      width: max-content;
      max-width: 280px;
      text-align: left;
      line-height: 1.5;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.15s, visibility 0.15s;
      z-index: 200;
      pointer-events: none;
    }

    .info-tooltip-wrap:hover .tooltip-content {
      visibility: visible;
      opacity: 1;
    }

    .info-tooltip-wrap .tooltip-content::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: #111;
    }

    /* 호버 시 썸네일 확대 미리보기 */
    .thumb-hover {
      position: relative;
      display: inline-block;
      cursor: zoom-in;
    }

    .thumb-hover {
      flex-shrink: 0;
    }

    .thumb-hover .thumb-hover-preview {
      position: absolute;
      top: 0;
      left: calc(100% + 12px);
      width: 240px;
      height: auto;
      max-height: 320px;
      object-fit: cover;
      border: 1px solid #ddd;
      border-radius: 6px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
      background: #fff;
      display: none;
      z-index: 200;
      pointer-events: none;
      /* 슬라이드 시 부드러운 cross-fade */
      transition: opacity 0.2s ease;
    }

    .thumb-hover:hover .thumb-hover-preview {
      display: block;
    }

    .product-link {
      color: #0066cc;
      cursor: pointer;
      font-weight: 500;
    }

    .product-link:hover {
      text-decoration: underline;
    }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }

    .toggle-switch input {
      display: none;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 24px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    .toggle-switch input:checked+.toggle-slider {
      background-color: #000;
    }

    .toggle-switch input:checked+.toggle-slider:before {
      transform: translateX(20px);
    }

    /* Orders Page */
    .orders-filters {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .filter-select {
      padding: 0.5rem 0.75rem;
      border: 1px solid #ddd;
      background: #fff;
      color: #000;
      font-size: 0.85rem;
      cursor: pointer;
      border-radius: 4px;
      min-width: 100px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .page-header-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .filter-bar {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      padding: 12px 2rem;
      margin: 0 -2rem 0;
      flex-wrap: wrap;
      position: sticky;
      top: 3.5rem;
      background: #fff;
      z-index: 50;
    }

    /* 액션 툴바: 필터 바 아래에 sticky (높이 고정) */
    .table-toolbar {
      position: sticky;
      top: calc(3.5rem + 71px);
      background: #fff;
      z-index: 49;
      box-sizing: border-box;
      min-height: 56px;
    }

    /* 테이블 헤더: 툴바 아래에 sticky (페이지 기준), 상단 강한 블랙 라인 + 하단 그레이 라인 */
    .products-table th {
      position: sticky;
      top: calc(3.5rem + 71px + 56px);
      z-index: 48;
      background: #fff;
      box-shadow: inset 0 2px 0 #111, inset 0 -1px 0 #e5e5e5;
    }

    /* 가로 스크롤 래퍼 안의 테이블은 wrapper 기준으로 sticky (top: 0) */
    .table-scroll-wrap .products-table th {
      top: 0;
    }

    /* shadow thead 의 스크롤바 숨김 (Webkit) */
    .sticky-thead-shadow::-webkit-scrollbar {
      display: none;
    }

    /* Sticky 하단 가로 스크롤바 */
    .sticky-bottom-scrollbar {
      scrollbar-color: #b5b5b5 #f0f0f0;
      scrollbar-width: thin;
    }

    .sticky-bottom-scrollbar::-webkit-scrollbar {
      height: 12px;
    }

    .sticky-bottom-scrollbar::-webkit-scrollbar-track {
      background: rgba(240, 240, 240, 0.9);
    }

    .sticky-bottom-scrollbar::-webkit-scrollbar-thumb {
      background: #b5b5b5;
      border-radius: 4px;
      border: 2px solid #f0f0f0;
    }

    .sticky-bottom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #888;
    }

    /* 원본 wrapper의 native 스크롤바는 sticky가 활성화될 때 숨김 (시각적 중복 방지) */
    /* → 단, 원래 wrapper에는 표시되도록 일단 유지. sticky가 viewport 바닥에 추가로 노출됨 */

    /* 테이블 가로 스크롤 표시: 사용자에게 스크롤 가능함을 명확히 보여줌 */
    .table-scroll-wrap {
      scrollbar-color: #b5b5b5 #f0f0f0;
      scrollbar-width: thin;
    }

    .table-scroll-wrap::-webkit-scrollbar {
      height: 10px;
      width: 10px;
    }

    .table-scroll-wrap::-webkit-scrollbar-track {
      background: #f0f0f0;
      border-radius: 4px;
    }

    .table-scroll-wrap::-webkit-scrollbar-thumb {
      background: #b5b5b5;
      border-radius: 4px;
      border: 2px solid #f0f0f0;
    }

    .table-scroll-wrap::-webkit-scrollbar-thumb:hover {
      background: #888;
    }

    /* 좌측 컬럼 고정 (체크박스, NO., 상품번호, 스타일번호, 이미지) — 가로 스크롤 시에도 보이도록 */
    .freeze-cols-5 .products-table thead th:nth-child(1),
    .freeze-cols-5 .products-table tbody td:nth-child(1),

    const SBSync = {
      enabled: !!supabaseClient,
      status: 'init', // 'init' | 'connected' | 'offline' | 'error'
      listeners: new Set(),
      setStatus(s) {
        this.status = s;
        this.listeners.forEach(fn => { try { fn(s); } catch (e) { } });
      },
      onStatus(fn) { this.listeners.add(fn); return () => this.listeners.delete(fn); },

      async fetchAll(table) {
        if (!supabaseClient) return null;
        try {
          const { data, error } = await supabaseClient.from(table).select('*');
          if (error) throw error;
          this.setStatus('connected');
          return data;

          console.warn(`[SBSync] fetch ${table} failed:`, e.message);

      // 알려진 누락 컬럼 캐싱 (세션 단위) — 첫 upsert 실패 시 해당 컬럼을 자동 제거하고 재시도
      _missingColumns: {},  // { 'partners': ['country'], ... }
      async upsertMany(table, records) {
        if (!supabaseClient || !records || records.length === 0) return false;
        const map = SBMap[table];
        const buildPayload = () => {
          const base = map ? records.map(map.toDb) : records.map(r => ({ ...r }));
          // 이미 알려진 누락 컬럼 제거
          const missing = this._missingColumns[table] || [];
          if (missing.length > 0) {
            return base.map(row => {
              const cleaned = { ...row };
              missing.forEach(c => { delete cleaned[c]; });
              return cleaned;
            });
          }
          return base;
        };
        const tryUpsert = async () => {
          const { error } = await supabaseClient.from(table).upsert(buildPayload());
          if (error) throw error;
          return true;
        };
        try {
          await tryUpsert();
          this.setStatus('connected');
          return true;
        } catch (e) {
          // unknown/missing column 에러 감지 → 해당 컬럼을 제외하고 재시도
          const msg = (e && e.message) || '';
          const colMatch = msg.match(/column\s+["']?(\w+)["']?\s+(?:of\s+relation\s+\w+\s+)?does not exist/i)
            || msg.match(/Could not find the\s+["']?(\w+)["']?\s+column/i);
          if (colMatch && colMatch[1]) {
            const missingCol = colMatch[1];
            this._missingColumns[table] = [...(this._missingColumns[table] || []), missingCol];
            console.warn(`[SBSync] '${table}' table missing column '${missingCol}' — retrying without it. Add the column in Supabase to enable persistence.`);
            try {
              await tryUpsert();
              this.setStatus('connected');
              return true;
            } catch (e2) {
              console.warn(`[SBSync] upsert ${table} retry failed:`, e2.message);
              this.setStatus('error');
              return false;
            }
          }
          console.warn(`[SBSync] upsert ${table} failed:`, msg);
          this.setStatus('error');
          return false;
        }
      },

      async deleteByIds(table, idCol, ids) {
        if (!supabaseClient || !ids || ids.length === 0) return false;
        try {
          const { error } = await supabaseClient.from(table).delete().in(idCol, ids);
          if (error) throw error;

        } catch (e) {

      // 전체 교체 동기화 (현재 state 전체를 Supabase에 반영)
      // - 새 항목/변경 항목은 upsert
      // - DB에만 있고 state에 없는 항목은 삭제
      async syncFull(table, idCol, currentRecords) {
        if (!supabaseClient) return;
        try {
          const dbRows = await this.fetchAll(table);
          if (!dbRows) return;
          const localIds = new Set(currentRecords.map(r => r[idCol]));
          const toDelete = dbRows.filter(r => !localIds.has(r[idCol])).map(r => r[idCol]);
          await this.upsertMany(table, currentRecords);
          if (toDelete.length > 0) await this.deleteByIds(table, idCol, toDelete);
        } catch (e) {
          console.warn(`[SBSync] full sync ${table} failed:`, e.message);
        }
      },

          return null;
        }
      },

        try {
          const { error } = await supabaseClient.from(table).upsert({ id: 1, ...record });
          if (error) throw error;
          return true;
        } catch (e) {

          return false;
        }
      },

      async uploadFile(bucket, path, file) {

          return urlData?.publicUrl || null;
        } catch (e) {
          console.warn(`[SBSync] upload to ${bucket}/${path} failed:`, e.message);
          return null;
        }
      }
    };

          return;

          return;

            return;

    };

    // 어드민 비밀번호 변경 모달 — 현재 로그인된 관리자의 비번만 변경
    const AdminPasswordChangeModal = ({ currentEmail, onClose }) => {
      const [currentPw, setCurrentPw] = React.useState('');
      const [newPw, setNewPw] = React.useState('');
      const [confirmPw, setConfirmPw] = React.useState('');
      const [error, setError] = React.useState('');
      const [submitting, setSubmitting] = React.useState(false);

      const submit = async (e) => {
        e.preventDefault();
        setError('');
        if (!currentPw) { setError('현재 비밀번호를 입력해주세요.'); return; }
        if (!newPw) { setError('새 비밀번호를 입력해주세요.'); return; }
        if (newPw !== confirmPw) { setError('새 비밀번호가 일치하지 않습니다.'); return; }
        if (newPw === currentPw) { setError('새 비밀번호는 현재 비밀번호와 달라야 합니다.'); return; }
        setSubmitting(true);
        try {
          const admin = findAdmin(currentEmail);
          if (!admin) { setError('관리자 정보를 찾을 수 없습니다.'); setSubmitting(false); return; }
          const currentHash = await sha256Hex(currentPw);
          if (currentHash !== admin.password_hash) {
            setError('현재 비밀번호가 일치하지 않습니다.');
            setSubmitting(false);
            return;
          }
          const newHash = await sha256Hex(newPw);
          const list = getAdmins().map(a => a.email.toLowerCase() === currentEmail.toLowerCase() ? { ...a, password_hash: newHash } : a);
          saveAdmins(list);
          // 호환: 기존 단일 admin hash 키도 함께 갱신 (하위 호환)
          if (currentEmail.toLowerCase() === DEFAULT_ADMIN_EMAIL) {
            try { localStorage.setItem('musinsa_b2b_admin_password_hash', newHash); } catch (_) { }
          }
          alert('비밀번호가 변경됐습니다. 다음 로그인부터 새 비밀번호로 접속해주세요.');
          onClose();
        } catch (err) {
          setError('비밀번호 변경 중 오류가 발생했습니다.');
          setSubmitting(false);
        }
      };

      return (
        <div className="modal-overlay" onClick={onClose} style={{ zIndex: 2000 }}>
          <div className="modal-content" onClick={(e) => e.stopPropagation()} style={{ maxWidth: '440px', width: '92%' }}>
            <div className="modal-header">
              <h2 className="modal-title">비밀번호 변경</h2>
              <button className="modal-close" onClick={onClose}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg></button>
            </div>
            <form onSubmit={submit} style={{ padding: '4px 0' }}>
              <div style={{ padding: '12px 14px', background: '#f9fafb', border: '1px solid #e5e7eb', borderRadius: '6px', marginBottom: '14px', fontSize: '12px', color: '#444', lineHeight: 1.6 }}>
                <strong style={{ color: '#111' }}>{currentEmail}</strong> 계정의 비밀번호를 변경합니다.
              </div>
              <div className="form-group" style={{ marginBottom: '12px' }}>
                <label className="form-label" style={{ fontSize: '12px', marginBottom: '6px' }}>현재 비밀번호</label>
                <input type="password" className="form-input" value={currentPw} onChange={(e) => { setCurrentPw(e.target.value); setError(''); }} autoFocus autoComplete="current-password" />
              </div>
              <div className="form-group" style={{ marginBottom: '12px' }}>
                <label className="form-label" style={{ fontSize: '12px', marginBottom: '6px' }}>새 비밀번호</label>
                <input type="password" className="form-input" value={newPw} onChange={(e) => { setNewPw(e.target.value); setError(''); }} autoComplete="new-password" />
              </div>
              <div className="form-group" style={{ marginBottom: '12px' }}>
                <label className="form-label" style={{ fontSize: '12px', marginBottom: '6px' }}>새 비밀번호 확인</label>
                <input type="password" className="form-input" value={confirmPw} onChange={(e) => { setConfirmPw(e.target.value); setError(''); }} autoComplete="new-password" />
              </div>
              {error && <div style={{ fontSize: '12px', color: '#dc2626', marginBottom: '12px', padding: '8px 12px', background: '#fef2f2', borderRadius: '4px' }}>{error}</div>}
              <div className="modal-footer" style={{ borderTop: 'none', paddingTop: '8px' }}>
                <button type="button" className="btn-cancel" onClick={onClose}>취소</button>
                <button type="submit" className="btn-primary" disabled={submitting}>{submitting ? '변경 중...' : '비밀번호 변경'}</button>
              </div>
            </form>
          </div>
        </div>
      );
    };

    // 어드민 관리 모달 — 등록/삭제/비번 직접 설정 또는 임시 비번 발급
    const AdminManagementModal = ({ currentEmail, onClose }) => {
      const [admins, setAdmins] = React.useState(getAdmins());
      const [showAdd, setShowAdd] = React.useState(false);
      const [newEmail, setNewEmail] = React.useState('');
      const [newName, setNewName] = React.useState('');
      const [newPassword, setNewPassword] = React.useState('');
      const [newPasswordConfirm, setNewPasswordConfirm] = React.useState('');
      const [newRole, setNewRole] = React.useState('admin'); // 'admin' | 'super'
      const [error, setError] = React.useState('');
      const [issuedTempPw, setIssuedTempPw] = React.useState(null); // { email, password } 비번 초기화 시 노출

      const refresh = () => setAdmins(getAdmins());

      const addAdmin = async (e) => {
        e.preventDefault();
        setError('');
        // Super Admin만 관리자 추가 가능 — 서버측 가드
        const currentAdmin = admins.find(a => a.email.toLowerCase() === currentEmail.toLowerCase());
        if (!currentAdmin || currentAdmin.role !== 'super') {
          setError('Super Admin만 관리자를 추가할 수 있습니다.');
          return;
        }
        const trimmedEmail = newEmail.trim().toLowerCase();
        if (!trimmedEmail) { setError('이메일을 입력해주세요.'); return; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(trimmedEmail)) { setError('올바른 이메일 형식이 아닙니다.'); return; }
        if (admins.some(a => a.email.toLowerCase() === trimmedEmail)) { setError('이미 등록된 이메일입니다.'); return; }
        if (!newPassword) { setError('비밀번호를 입력해주세요.'); return; }
        if (newPassword !== newPasswordConfirm) { setError('비밀번호 확인이 일치하지 않습니다.'); return; }
        const role = newRole === 'super' ? 'super' : 'admin';
        const hash = await sha256Hex(newPassword);
        const next = [...admins, { email: trimmedEmail, password_hash: hash, name: newName.trim() || trimmedEmail, role, created_at: new Date().toISOString() }];
        saveAdmins(next);
        setAdmins(next);
        setNewEmail('');
        setNewName('');
        setNewPassword('');
        setNewPasswordConfirm('');
        setNewRole('admin');
        setShowAdd(false);
        alert(`'${trimmedEmail}' ${role === 'super' ? '최고 관리자' : '관리자'}가 등록됐습니다.`);
      };

      const deleteAdmin = (email) => {
        const target = admins.find(a => a.email.toLowerCase() === email.toLowerCase());
        if (email.toLowerCase() === currentEmail.toLowerCase()) { alert('현재 로그인된 계정은 삭제할 수 없습니다.'); return; }
        // 일반 Admin은 다른 관리자 삭제 불가 — Super만 가능
        const meAdmin = admins.find(a => a.email.toLowerCase() === currentEmail.toLowerCase());
        if (meAdmin && meAdmin.role !== 'super') { alert('Super Admin만 다른 관리자를 삭제할 수 있습니다.'); return; }
        // Super 계정 삭제 시 — 최소 1명의 Super는 남아야 함
        if (target && target.role === 'super') {
          const superCount = admins.filter(a => a.role === 'super').length;
          if (superCount <= 1) { alert('Super Admin이 1명만 남아 삭제할 수 없습니다. 먼저 다른 Super Admin을 추가해주세요.'); return; }
        }
        if (admins.length <= 1) { alert('최소 1명의 관리자가 필요합니다.'); return; }
        if (!confirm(`'${email}' 관리자를 삭제하시겠습니까?`)) return;
        const next = admins.filter(a => a.email.toLowerCase() !== email.toLowerCase());
        saveAdmins(next);
        setAdmins(next);
        // Supabase에서도 삭제
        deleteAdminFromDb(email);
      };

      // 비밀번호 변경 인라인 폼 — 입력해서 직접 새 비번 설정
      const [pwChangeEmail, setPwChangeEmail] = React.useState(null); // 비번 변경 중인 관리자 이메일
      const [pwChangeNew, setPwChangeNew] = React.useState('');
      const [pwChangeConfirm, setPwChangeConfirm] = React.useState('');
      const [pwChangeError, setPwChangeError] = React.useState('');

      const submitPwChange = async (e) => {
        e.preventDefault();
        setPwChangeError('');
        // Super Admin의 비번 변경은 본인만 가능 — 서버측 가드
        const targetAdmin = admins.find(a => a.email.toLowerCase() === pwChangeEmail.toLowerCase());
        if (targetAdmin && targetAdmin.role === 'super' && pwChangeEmail.toLowerCase() !== currentEmail.toLowerCase()) {
          setPwChangeError('Super Admin의 비밀번호는 본인만 변경할 수 있습니다.');
          return;
        }
        // 일반 Admin은 본인의 비번만 변경 가능 — 서버측 가드
        const meAdmin = admins.find(a => a.email.toLowerCase() === currentEmail.toLowerCase());
        if (meAdmin && meAdmin.role !== 'super' && pwChangeEmail.toLowerCase() !== currentEmail.toLowerCase()) {
          setPwChangeError('본인의 비밀번호만 변경할 수 있습니다.');
          return;
        }
        if (!pwChangeNew) { setPwChangeError('비밀번호를 입력해주세요.'); return; }
        if (pwChangeNew !== pwChangeConfirm) { setPwChangeError('비밀번호 확인이 일치하지 않습니다.'); return; }
        const hash = await sha256Hex(pwChangeNew);
        const next = admins.map(a => a.email.toLowerCase() === pwChangeEmail.toLowerCase() ? { ...a, password_hash: hash } : a);
        saveAdmins(next);
        setAdmins(next);
        // DEFAULT_ADMIN_EMAIL 호환 키도 동기화
        if (pwChangeEmail.toLowerCase() === DEFAULT_ADMIN_EMAIL) {
          try { localStorage.setItem('musinsa_b2b_admin_password_hash', hash); } catch (_) { }
        }
        alert(`'${pwChangeEmail}' 관리자의 비밀번호가 변경됐습니다.`);
        setPwChangeEmail(null);
        setPwChangeNew('');
        setPwChangeConfirm('');
      };

      const cancelPwChange = () => {
        setPwChangeEmail(null);
        setPwChangeNew('');
        setPwChangeConfirm('');
        setPwChangeError('');
      };

      return (
        <div className="modal-overlay" onClick={onClose} style={{ zIndex: 2000 }}>
          <div className="modal-content" onClick={(e) => e.stopPropagation()} style={{ maxWidth: '600px', width: '92%', maxHeight: '85vh', display: 'flex', flexDirection: 'column' }}>
            <div className="modal-header" style={{ flexShrink: 0 }}>
              <h2 className="modal-title">관리자 관리</h2>
              <button className="modal-close" onClick={onClose}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg></button>
            </div>
            <div className="modal-body" style={{ flex: '0 1 auto', overflowY: 'auto', marginBottom: 0 }}>
              {/* 비밀번호 변경 인라인 폼 */}
              {pwChangeEmail && (
                <form onSubmit={submitPwChange} style={{ padding: '14px 16px', background: '#eff6ff', border: '1px solid #bfdbfe', borderRadius: '6px', marginBottom: '16px' }}>
                  <div style={{ fontSize: '13px', fontWeight: 700, color: '#1e40af', marginBottom: '10px' }}>'{pwChangeEmail}' 관리자 비밀번호 변경</div>
                  <div className="form-group" style={{ marginBottom: '10px' }}>
                    <label className="form-label" style={{ fontSize: '12px' }}>새 비밀번호</label>
                    <input type="password" className="form-input" value={pwChangeNew} onChange={(e) => { setPwChangeNew(e.target.value); setPwChangeError(''); }} placeholder="비밀번호 입력" autoFocus autoComplete="new-password" />
                  </div>
                  <div className="form-group" style={{ marginBottom: '10px' }}>
                    <label className="form-label" style={{ fontSize: '12px' }}>비밀번호 확인</label>
                    <input type="password" className="form-input" value={pwChangeConfirm} onChange={(e) => { setPwChangeConfirm(e.target.value); setPwChangeError(''); }} placeholder="비밀번호 재입력" autoComplete="new-password" />
                  </div>
                  {pwChangeError && <div style={{ fontSize: '12px', color: '#dc2626', marginBottom: '10px' }}>{pwChangeError}</div>}
                  <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '6px' }}>
                    <button type="button" onClick={cancelPwChange} style={{ padding: '7px 14px', background: '#fff', color: '#555', border: '1px solid #ddd', borderRadius: '4px', fontSize: '12px', fontWeight: 500, cursor: 'pointer' }}>취소</button>
                    <button type="submit" style={{ padding: '7px 14px', background: '#111', color: '#fff', border: 'none', borderRadius: '4px', fontSize: '12px', fontWeight: 500, cursor: 'pointer' }}>변경</button>
                  </div>
                </form>
              )}
              {(() => {
                const currentAdmin = admins.find(a => a.email.toLowerCase() === currentEmail.toLowerCase());
                const isSuperAdmin = currentAdmin && currentAdmin.role === 'super';
                return (
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                    <span style={{ fontSize: '13px', fontWeight: 600, color: '#111' }}>등록된 관리자 ({admins.length})</span>
                    {!showAdd && (
                      <button
                        onClick={() => { if (!isSuperAdmin) return; setShowAdd(true); }}
                        disabled={!isSuperAdmin}
                        title={isSuperAdmin ? '' : 'Super Admin만 관리자를 추가할 수 있습니다'}
                        style={{ padding: '7px 14px', background: isSuperAdmin ? '#111' : '#e5e5e5', color: isSuperAdmin ? '#fff' : '#999', border: 'none', borderRadius: '4px', fontSize: '12px', fontWeight: 500, cursor: isSuperAdmin ? 'pointer' : 'not-allowed' }}
                      >
                        + 관리자 추가
                      </button>
                    )}
                  </div>
                );
              })()}
              {showAdd && (
                <form onSubmit={addAdmin} style={{ padding: '14px 16px', background: '#f9fafb', border: '1px solid #e5e7eb', borderRadius: '6px', marginBottom: '16px' }}>
                  <div className="form-group" style={{ marginBottom: '10px' }}>
                    <label className="form-label" style={{ fontSize: '12px' }}>이메일 <span style={{ color: '#2563eb' }}>*</span></label>
                    <input type="email" className="form-input" value={newEmail} onChange={(e) => { setNewEmail(e.target.value); setError(''); }} placeholder="admin@company.com" autoFocus style={{ background: '#fff' }} />
                  </div>
                  <div className="form-group" style={{ marginBottom: '10px' }}>
                    <label className="form-label" style={{ fontSize: '12px' }}>이름 (선택)</label>
                    <input type="text" className="form-input" value={newName} onChange={(e) => setNewName(e.target.value)} placeholder="홍길동" style={{ background: '#fff' }} />
                  </div>
                  <div className="form-group" style={{ marginBottom: '10px' }}>
                    <label className="form-label" style={{ fontSize: '12px' }}>비밀번호 <span style={{ color: '#2563eb' }}>*</span></label>
                    <input type="password" className="form-input" value={newPassword} onChange={(e) => { setNewPassword(e.target.value); setError(''); }} placeholder="비밀번호 입력" autoComplete="new-password" style={{ background: '#fff' }} />
                  </div>
                  <div className="form-group" style={{ marginBottom: '10px' }}>
                    <label className="form-label" style={{ fontSize: '12px' }}>비밀번호 확인 <span style={{ color: '#2563eb' }}>*</span></label>
                    <input type="password" className="form-input" value={newPasswordConfirm} onChange={(e) => { setNewPasswordConfirm(e.target.value); setError(''); }} placeholder="비밀번호 재입력" autoComplete="new-password" style={{ background: '#fff' }} />
                  </div>
                  <div className="form-group" style={{ marginBottom: '10px' }}>
                    <label className="form-label" style={{ fontSize: '12px' }}>권한 <span style={{ color: '#2563eb' }}>*</span></label>
                    <div style={{ display: 'flex', gap: '20px', alignItems: 'center', paddingTop: '4px' }}>
                      <label style={{ display: 'inline-flex', alignItems: 'center', gap: '6px', cursor: 'pointer', fontSize: '13px', color: '#111' }}>
                        <input type="radio" name="newRole" value="admin" checked={newRole === 'admin'} onChange={() => setNewRole('admin')} style={{ accentColor: '#111' }} />
                        Admin (일반 관리자)
                      </label>
                      <label style={{ display: 'inline-flex', alignItems: 'center', gap: '6px', cursor: 'pointer', fontSize: '13px', color: '#111' }}>
                        <input type="radio" name="newRole" value="super" checked={newRole === 'super'} onChange={() => setNewRole('super')} style={{ accentColor: '#111' }} />
                        Super (최고 관리자)
                      </label>
                    </div>
                  </div>
                  {error && <div style={{ fontSize: '12px', color: '#dc2626', marginBottom: '10px' }}>{error}</div>}
                  <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '6px' }}>
                    <button type="button" onClick={() => { setShowAdd(false); setNewEmail(''); setNewName(''); setNewPassword(''); setNewPasswordConfirm(''); setNewRole('admin'); setError(''); }} style={{ padding: '7px 14px', background: '#fff', color: '#555', border: '1px solid #ddd', borderRadius: '4px', fontSize: '12px', fontWeight: 500, cursor: 'pointer' }}>취소</button>
                    <button type="submit" style={{ padding: '7px 14px', background: '#111', color: '#fff', border: 'none', borderRadius: '4px', fontSize: '12px', fontWeight: 500, cursor: 'pointer' }}>등록</button>
                  </div>
                </form>
              )}
              <div style={{ border: '1px solid #e5e7eb', borderRadius: '6px', overflow: 'hidden' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '13px' }}>
                  <thead>
                    <tr style={{ background: '#fafafa' }}>
                      <th style={{ padding: '10px 12px', textAlign: 'left', fontWeight: 600, color: '#666', fontSize: '11px', textTransform: 'uppercase' }}>이메일</th>
                      <th style={{ padding: '10px 12px', textAlign: 'left', fontWeight: 600, color: '#666', fontSize: '11px', textTransform: 'uppercase' }}>이름</th>
                      <th style={{ padding: '10px 12px', textAlign: 'left', fontWeight: 600, color: '#666', fontSize: '11px', textTransform: 'uppercase' }}>권한</th>
                      <th style={{ padding: '10px 12px', textAlign: 'right', fontWeight: 600, color: '#666', fontSize: '11px', textTransform: 'uppercase' }}>관리</th>
                    </tr>
                  </thead>
                  <tbody>
                    {(() => {
                      const me = admins.find(x => x.email.toLowerCase() === currentEmail.toLowerCase());
                      const iAmSuper = me && me.role === 'super';
                      const superCount = admins.filter(a => a.role === 'super').length;
                      return admins.map(a => {
                      const isMe = a.email.toLowerCase() === currentEmail.toLowerCase();
                      const isSuper = a.role === 'super';
                      // 삭제 권한:
                      // - 본인은 삭제 불가
                      // - 일반 Admin은 다른 관리자 삭제 불가 (Super만 가능)
                      // - Super 계정은 Super가 2명 이상일 때만 다른 Super가 삭제 가능 (최소 1명은 유지)
                      let cannotDelete = false;
                      let delTitle = '삭제';
                      if (isMe) {
                        cannotDelete = true;
                        delTitle = '본인은 삭제할 수 없습니다';
                      } else if (!iAmSuper) {
                        cannotDelete = true;
                        delTitle = 'Super Admin만 다른 관리자를 삭제할 수 있습니다';
                      } else if (isSuper && superCount <= 1) {
                        cannotDelete = true;
                        delTitle = 'Super Admin이 1명만 남아 삭제할 수 없습니다';
                      }
                      // 비번 변경 권한:
                      // - Super Admin의 비번은 본인만 변경 가능
                      // - 일반 Admin은 본인의 비번만 변경 가능 (남의 비번 변경 불가)
                      // - Super Admin은 다른 일반 Admin의 비번 변경 가능
                      let cannotChangePw = false;
                      let pwTitle = '비번 변경';
                      if (isSuper && !isMe) {
                        cannotChangePw = true;
                        pwTitle = 'Super Admin의 비밀번호는 본인만 변경할 수 있습니다';
                      } else if (!iAmSuper && !isMe) {
                        cannotChangePw = true;
                        pwTitle = '본인의 비밀번호만 변경할 수 있습니다';
                      }
                      return (
                        <tr key={a.email} style={{ borderTop: '1px solid #f3f3f3' }}>
                          <td style={{ padding: '10px 12px', fontWeight: 500 }}>{a.email}{isMe && <span style={{ marginLeft: '6px', fontSize: '10px', color: '#2563eb', fontWeight: 700 }}>(나)</span>}</td>

    /**
     * ThumbHover — 썸네일 호버 시 큰 미리보기 노출.
     * 호버 유지 시 첫 슬라이딩은 1초 후, 이후로는 1.5초마다 다음 이미지로 슬라이딩 모션 (루프).
     * mouseLeave 시 첫 이미지로 리셋.
     */
    const PREVIEW_W = 240;
    const PREVIEW_H = 320;
    const ThumbHover = ({ thumbSrc, images, alt, thumbStyle, thumbClass = 'product-image' }) => {
      const [hovered, setHovered] = React.useState(false);
      const [idx, setIdx] = React.useState(0);
      const list = (images && images.length > 0) ? images : (thumbSrc ? [thumbSrc] : []);
      // 슬라이딩 타이머: 첫 1초 → 그 뒤 1.5초마다
      React.useEffect(() => {
        if (!hovered || list.length <= 1) return;
        let timer;
        const tick = () => {
          setIdx(i => (i + 1) % list.length);
          timer = setTimeout(tick, 1500); // 이후로는 1.5초마다
        };
        timer = setTimeout(tick, 1000); // 최초 슬라이딩은 1초 후
        return () => clearTimeout(timer);
      }, [hovered, list.length]);
      // hover 해제 시 첫 이미지로 리셋
      React.useEffect(() => {
        if (!hovered) setIdx(0);
      }, [hovered]);
      // 미리보기 이미지 사전 로딩 (전환 시 깜빡임 최소화)
      React.useEffect(() => {
        if (!hovered) return;
        list.forEach(src => { const img = new Image(); img.src = src; });
      }, [hovered]);
      return (
        <span className="thumb-hover"
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}
        >
          <img src={thumbSrc} alt={alt} className={thumbClass} style={thumbStyle} />
          {list.length > 0 && (
            <div className="thumb-hover-preview" style={{
              width: PREVIEW_W + 'px',
              height: PREVIEW_H + 'px',
              maxHeight: 'none',
              padding: 0,
              overflow: 'hidden'
            }}>
              <div style={{
                display: 'flex',
                height: '100%',
                width: (list.length * PREVIEW_W) + 'px',
                transform: 'translateX(-' + (idx * PREVIEW_W) + 'px)',
                transition: 'transform 0.4s cubic-bezier(0.22, 0.61, 0.36, 1)',
                willChange: 'transform'
              }}>
                {list.map((src, i) => (
                  <img key={i} src={src} alt="" style={{
                    width: PREVIEW_W + 'px',
                    height: PREVIEW_H + 'px',
                    objectFit: 'cover',
                    flexShrink: 0,
                    display: 'block'
                  }} />
                ))}
              </div>
            </div>
          )}
        </span>
      );
    };

    const CustomSelect = ({ value, onChange, options, style }) => {
      const [open, setOpen] = React.useState(false);
      const ref = React.useRef(null);
      const selectedLabel = (options.find(o => String(o.value) === String(value)) || options[0] || {}).label || '';
      React.useEffect(() => {
        const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);
      return (
        <div ref={ref} style={{ position: 'relative', display: 'inline-block', height: '32px', minWidth: '120px', ...style }}>
          <button onClick={() => setOpen(!open)} style={{ height: '32px', minHeight: '32px', maxHeight: '32px', boxSizing: 'border-box', padding: '0 28px 0 10px', fontSize: '12px', fontWeight: 500, letterSpacing: '0.02em', border: '1px solid #ddd', borderRadius: '4px', background: "#fff url(\"data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23666' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E\") no-repeat right 10px center", cursor: 'pointer', color: '#111', textAlign: 'left', whiteSpace: 'nowrap', width: '100%', lineHeight: '30px', margin: 0 }}>
            {selectedLabel}
          </button>
          {open && (
            <div style={{ position: 'absolute', top: '100%', left: 0, marginTop: '4px', minWidth: '100%', background: '#fff', border: '1px solid #ddd', borderRadius: '6px', boxShadow: '0 4px 16px rgba(0,0,0,0.1)', zIndex: 100, maxHeight: '240px', overflowY: 'auto', padding: '4px 0' }}>
              {options.map(o => (
                <div key={o.value} onClick={() => { onChange(o.value); setOpen(false); }}
                  style={{ padding: '8px 12px', fontSize: '12px', fontWeight: String(o.value) === String(value) ? 600 : 400, color: String(o.value) === String(value) ? '#111' : '#333', background: String(o.value) === String(value) ? '#f5f5f5' : 'transparent', cursor: 'pointer', whiteSpace: 'nowrap', transition: 'background 0.1s' }}
                  onMouseEnter={(e) => { if (String(o.value) !== String(value)) e.target.style.background = '#fafafa'; }}
                  onMouseLeave={(e) => { e.target.style.background = String(o.value) === String(value) ? '#f5f5f5' : 'transparent'; }}
                >{o.label}</div>
              ))}
            </div>
          )}
        </div>
      );
    };

    const DashboardTimeModeButtons = ({ mode, setMode }) => (

    const Dashboard = ({ products, orders, partners, orderSettingsEnabled, onUpdateOrderSettings, orderSchedule, onUpdateOrderSchedule, onNavigate, exchangeRate, onUpdateExchangeRate, onUpdateOrder }) => {
      const { showToast } = useToast();

      return (
        <div style={{ background: '#f5f5f5', minHeight: 'calc(100vh - 60px)' }}>
          <div className="main-content">
            <div style={{ marginBottom: '1.5rem', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '16px' }}>
              <div>
                <h1 className="page-title" style={{ marginBottom: '4px' }}>대시보드</h1>
                <p className="page-subtitle" style={{ margin: 0 }}>관리 현황을 한눈에 확인하세요</p>
              </div>
              <a
                href="b2b-partner-portal.html"
                target="_blank"
                rel="noopener noreferrer"
                style={{ display: 'inline-flex', alignItems: 'center', gap: '6px', padding: '8px 14px', background: '#fff', color: '#111', border: '1px solid #111', borderRadius: '4px', fontSize: '13px', fontWeight: 500, textDecoration: 'none', whiteSpace: 'nowrap', flexShrink: 0 }}
              >
                파트너 사이트 바로가기
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: '16px', marginBottom: '16px' }}>
              <div className="stat-card" onClick={() => onNavigate('products')} style={{ cursor: 'pointer' }}>

              <div className="stat-card green" onClick={() => onNavigate('orders', '주문완료')} style={{ cursor: 'pointer' }}>

              <div className="stat-card">

            </div>

            {/* Row 1: 3단 */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 2fr 1fr', gap: '16px', marginBottom: '16px' }}>
              {/* 카테고리별 상품 분포 */}
              <div className="settings-card">
                <h2 className="settings-card-title" style={{ marginBottom: '20px' }}>카테고리별 상품 분포</h2>
                {(() => {
                  const catMap = {};
                  products.filter(p => p.is_visible).forEach(p => { const c = p.category || '미분류'; catMap[c] = (catMap[c] || 0) + 1; });
                  const cats = Object.entries(catMap).sort((a, b) => b[1] - a[1]).slice(0, 7);
                  const maxCnt = Math.max(...cats.map(([, c]) => c), 1);
                  if (cats.length === 0) {
                    return <div style={{ padding: '40px 0', textAlign: 'center', color: '#999', fontSize: '13px' }}>상품 데이터가 없습니다.</div>;

                  return (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                      {cats.map(([cat, cnt], i) => (
                        <div key={cat} style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>

                          <div style={{ flex: 1, height: '10px', background: '#f0f0f0', borderRadius: '5px', overflow: 'hidden' }}>
                            <div style={{ '--bar-width': `${(cnt / maxCnt) * 100}%`, width: `${(cnt / maxCnt) * 100}%`, height: '100%', background: i < 3 ? '#3b82f6' : '#bfdbfe', borderRadius: '5px', animation: `barFill 0.8s ease-out ${i * 0.08}s both` }}></div>
                          </div>
                          <span style={{ fontSize: '13px', fontWeight: 600, color: '#111', minWidth: '40px', textAlign: 'right' }}>{cnt}개</span>
                        </div>
                      ))}
                    </div>
                  );
                })()}
              </div>

              {/* 파트너별 주문 현황 */}
              {(() => {
                const [hoveredIdx, setHoveredIdx] = React.useState(null);
                // 현재 등록된 파트너 set (삭제된 파트너는 차트에서 제외)
                const registeredPartnerNames = new Set((partners || []).map(p => p.company_name));
                const registeredPartnerIds = new Set((partners || []).map(p => p.partner_id));
                // Group by actual partner_name in orders (so total matches 총 주문 금액)
                const statsMap = new Map();
                orders.forEach(o => {
                  // 등록되지 않은 파트너의 주문은 차트에서 제외
                  const isRegistered = registeredPartnerIds.has(o.partner_id) || registeredPartnerNames.has(o.partner_name);
                  if (!isRegistered) return;
                  const name = o.partner_name || '미지정';
                  const cur = statsMap.get(name) || { name, orders: 0, qty: 0, amount: 0 };
                  cur.orders += 1;
                  cur.qty += (o.total_qty || 0);
                  cur.amount += (o.total_amount || 0);
                  statsMap.set(name, cur);
                });
                const partnerStats = Array.from(statsMap.values()).sort((a, b) => b.amount - a.amount);
                const totalAmt = partnerStats.reduce((s, p) => s + p.amount, 0);
                const colors = ['#5B5BD6', '#12A594', '#E93D82', '#F5A623', '#8E4EC6', '#0EA5E9'];
                const size = 200;
                const strokeWidth = 28;
                const radius = (size - strokeWidth) / 2;
                const circumference = 2 * Math.PI * radius;
                let cumulativePct = 0;
                const segments = partnerStats.map((ps, i) => {
                  const pct = totalAmt > 0 ? ps.amount / totalAmt : 0;
                  const rotation = cumulativePct * 360;
                  cumulativePct += pct;
                  return { ...ps, pct, rotation, len: pct * circumference, color: colors[i % colors.length] };
                });
                // Leader line geometry for hovered segment
                let leader = null;
                if (hoveredIdx !== null && segments[hoveredIdx]) {
                  const seg = segments[hoveredIdx];
                  const midAngleDeg = seg.rotation - 90 + seg.pct * 180;
                  const midAngleRad = midAngleDeg * Math.PI / 180;
                  const innerR = radius + strokeWidth / 2;
                  const elbowR = innerR + 14;
                  const cos = Math.cos(midAngleRad);
                  const sin = Math.sin(midAngleRad);
                  const x1 = size / 2 + innerR * cos;
                  const y1 = size / 2 + innerR * sin;
                  const x2 = size / 2 + elbowR * cos;
                  const y2 = size / 2 + elbowR * sin;
                  const isRight = cos >= 0;
                  const x3 = x2 + (isRight ? 18 : -18);
                  const y3 = y2;
                  leader = { seg, x1, y1, x2, y2, x3, y3, isRight };
                }
                return (
                  <div className="settings-card">
                    <h2 className="settings-card-title" style={{ marginBottom: '20px' }}>파트너별 주문 현황</h2>
                    {partnerStats.length === 0 ? (
                      <div style={{ padding: '40px 0', textAlign: 'center', color: '#999', fontSize: '13px' }}>파트너 데이터가 없습니다.</div>
                    ) : (
                      <div style={{ display: 'flex', flexDirection: 'row', alignItems: 'center', gap: '20px' }}>
                        {(() => {
                          // 최대 10개까지만 노출, 5개씩 양옆으로 분할
                          const visibleSegments = segments.slice(0, 10);
                          const leftCol = visibleSegments.slice(0, 5);
                          const rightCol = visibleSegments.slice(5, 10);
                          const renderLegendItem = ({ seg, idx }) => (
                            <div key={seg.name}
                              onMouseEnter={() => setHoveredIdx(idx)}
                              onMouseLeave={() => setHoveredIdx(null)}
                              style={{ display: 'flex', alignItems: 'flex-start', gap: '8px', fontSize: '12px', cursor: 'pointer', opacity: hoveredIdx === null || hoveredIdx === idx ? 1 : 0.4, transition: 'opacity 0.15s ease' }}>
                              <span style={{ width: '9px', height: '9px', borderRadius: '2px', background: seg.color, flexShrink: 0, marginTop: '4px' }}></span>
                              <div style={{ minWidth: 0, display: 'flex', flexDirection: 'column', gap: '1px' }}>
                                <div style={{ fontWeight: 500, wordBreak: 'break-word', lineHeight: 1.3 }}>{seg.name}</div>
                                <div style={{ fontSize: '11px', color: '#666' }}>
                                  ${seg.amount.toLocaleString()} <span style={{ color: '#bbb', margin: '0 3px' }}>·</span> <span style={{ color: '#999' }}>{seg.orders}건</span>
                                </div>
                              </div>
                            </div>
                          );
                          return (
                            <>
                              {/* Left legend (partners 1-5) */}
                              <div style={{ flex: 1, display: 'flex', justifyContent: 'flex-start' }}>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                                  {leftCol.map((seg, i) => renderLegendItem({ seg, idx: i }))}
                                </div>
                              </div>
                            </>
                          );
                        })()}

                        <div style={{ flexShrink: 0, display: 'flex', justifyContent: 'center' }}>
                          <div style={{ position: 'relative', width: `${size}px`, height: `${size}px`, flexShrink: 0, marginTop: '-26px' }}>
                            <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ overflow: 'visible' }}>
                              <circle cx={size / 2} cy={size / 2} r={radius} fill="none" stroke="#f5f5f5" strokeWidth={strokeWidth} />
                              {segments.map((seg, i) => {
                                const isHovered = hoveredIdx === i;
                                const hoverStroke = strokeWidth + 8; // 호버 시 두께 증가
                                const curStroke = isHovered ? hoverStroke : strokeWidth;
                                return (
                                  <circle
                                    key={i}
                                    cx={size / 2} cy={size / 2} r={radius}
                                    fill="none"
                                    stroke={seg.color}
                                    strokeWidth={curStroke}
                                    strokeDasharray={`${seg.len} ${circumference}`}
                                    strokeLinecap="butt"
                                    transform={`rotate(${seg.rotation - 90}, ${size / 2}, ${size / 2})`}
                                    onMouseEnter={() => setHoveredIdx(i)}
                                    onMouseLeave={() => setHoveredIdx(null)}
                                    style={{ animation: `donutSegment 0.8s ease-out ${i * 0.15}s both`, opacity: hoveredIdx === null || hoveredIdx === i ? 1 : 0.35, transition: 'opacity 0.15s ease, stroke-width 0.15s ease', cursor: 'pointer', pointerEvents: 'stroke' }}
                                  />
                                );
                              })}
                              {segments.map((seg, i) => {
                                if (seg.pct < 0.03) return null;
                                const midAngleRad = (seg.rotation - 90 + seg.pct * 180) * Math.PI / 180;
                                const cos = Math.cos(midAngleRad);
                                const sin = Math.sin(midAngleRad);
                                const innerR = radius + strokeWidth / 2;
                                const elbowR = innerR + 10;
                                const x1 = size / 2 + innerR * cos;
                                const y1 = size / 2 + innerR * sin;
                                const x2 = size / 2 + elbowR * cos;
                                const y2 = size / 2 + elbowR * sin;
                                const isRight = cos >= 0;
                                const x3 = x2 + (isRight ? 12 : -12);
                                const y3 = y2;
                                return (
                                  <g key={`lbl-${i}`} style={{ pointerEvents: 'none' }}>
                                    <polyline
                                      points={`${x1},${y1} ${x2},${y2} ${x3},${y3}`}
                                      fill="none"
                                      stroke={seg.color}
                                      strokeWidth="1"
                                      opacity="0.6"
                                    />
                                    <text
                                      x={x3 + (isRight ? 3 : -3)}
                                      y={y3 + 3}
                                      textAnchor={isRight ? 'start' : 'end'}
                                      fontSize="11"
                                      fontWeight="600"
                                      fill="#333"
                                    >
                                      {(seg.pct * 100).toFixed(1)}%
                                    </text>
                                  </g>
                                );
                              })}
                            </svg>
                            <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', pointerEvents: 'none', textAlign: 'center' }}>
                              <div style={{ fontSize: '10px', color: '#999', letterSpacing: '0.08em', marginBottom: '2px', fontWeight: 600 }}>TOTAL</div>

                const chartAreaH = vbH - padTop - padBottom;   // 198

                const innerW = vbW - padL - padR;              // 560

                  const lastDay = new Date(year, month + 1, 0);

                const weeksInMonth = [];

                  if (startDay > lastDayOfMonth) break;

                  weeksInMonth.push({ value: w, label: `${w + 1}주 (${startDay}~${endDay}일)` });

                            <div style={{ flex: 1, minWidth: 0 }}>

                                <div style={{ '--bar-width': `${(item.qty / maxQty) * 100}%`, width: `${(item.qty / maxQty) * 100}%`, height: '100%', background: i < 3 ? '#3b82f6' : '#bfdbfe', borderRadius: '5px', animation: `barFill 0.8s ease-out ${i * 0.08}s both` }}></div>
                              </div>

                              <button onClick={() => setIsEditing(false)} style={{ padding: '6px 14px', fontSize: '11px', background: '#fff', border: '1px solid #ddd', borderRadius: '4px', cursor: 'pointer', color: '#555', fontWeight: 500 }}>취소</button>
                              <button onClick={handleSaveRate} style={{ padding: '6px 14px', fontSize: '11px', background: '#111', color: '#fff', border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: 500 }}>저장</button>

                {/* 수주회 상태 */}
                {(() => {

                  const _meAdmin = getAdmins().find(a => a.email.toLowerCase() === (getCurrentAdminEmail() || '').toLowerCase());
                  const _iAmSuper = !!(_meAdmin && _meAdmin.role === 'super');
                  // schedule은 부모에서 displaySettings로부터 영구 보관
                  const schedule = orderSchedule;
                  const setSchedule = onUpdateOrderSchedule;
                  const [editing, setEditing] = React.useState(false);
                  const [startDate, setStartDate] = React.useState('');
                  const [startTime, setStartTime] = React.useState('09:00');
                  const [endDate, setEndDate] = React.useState('');
                  const [endTime, setEndTime] = React.useState('18:00');

                  const checkSchedule = (s) => {
                    if (!s) return;
                    const now = new Date();
                    const start = new Date(s.startDate + 'T' + s.startTime);
                    const end = new Date(s.endDate + 'T' + s.endTime);
                    if (now >= start && now <= end) onUpdateOrderSettings(true);
                    else if (now > end) { onUpdateOrderSettings(false); setSchedule(null); }
                  };

                  React.useEffect(() => {
                    if (!schedule) return;
                    checkSchedule(schedule);
                    const timer = setInterval(() => checkSchedule(schedule), 1000);
                    return () => clearInterval(timer);
                  }, [schedule]);

                  const handleSave = () => {
                    if (!startDate || !endDate) { alert('시작일과 종료일을 모두 입력하세요.'); return; }
                    if (new Date(startDate + 'T' + startTime) >= new Date(endDate + 'T' + endTime)) { alert('종료 일시가 시작 일시보다 이후여야 합니다.'); return; }
                    const newSchedule = { startDate, startTime, endDate, endTime };
                    setSchedule(newSchedule);
                    checkSchedule(newSchedule);
                    setEditing(false);
