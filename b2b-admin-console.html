            </div>
            <div className="modal-body" style={{ marginBottom: 0 }}>
              <div style={{ fontSize: '14px', color: '#333', lineHeight: 1.7 }}>
                {String(data.message || '').split('\n').map((line, i) => (
                  <div key={i}>{line}</div>
                ))}
              </div>
              {data.requireReason && (
                <textarea
                  value={reason}
                  onChange={(e) => setReason(e.target.value)}
                  placeholder="반려 사유를 입력하세요"
                  rows={4}
                  style={{ width: '100%', marginTop: '14px', padding: '10px 12px', border: '1px solid #ddd', borderRadius: '4px', fontSize: '13px', resize: 'vertical', fontFamily: 'inherit' }}
                />
              )}
            </div>
            <div className="modal-footer" style={{ marginTop: '20px' }}>
              <button className="btn-cancel" onClick={onClose}>취소</button>
              <button onClick={() => data.onConfirm(reason)} style={{ padding: '10px 20px', borderRadius: '4px', fontSize: '13px', fontWeight: 500, cursor: 'pointer', textTransform: 'uppercase', ...data.confirmStyle }}>{data.confirmLabel}</button>
            </div>
          </div>
        </div>
      );
    };

    // 주문 일괄 등록 모달 (전화 발주 → 엑셀 업로드 → 주문 생성)
    const BulkOrderUploadModal = ({ products, partners, onClose, onCreate }) => {
      const { showToast } = useToast();
      const [parsing, setParsing] = useState(false);
      const [parsed, setParsed] = useState(null); // { orders: [...], errors: [] }
      const [emailRecipient, setEmailRecipient] = useState(''); // 양식 발송 대상 이메일
      const [emailPartnerId, setEmailPartnerId] = useState(''); // 양식 발송용 파트너 (업로드 대상과 별개)
      const [selectedPartnerId, setSelectedPartnerId] = useState(''); // 업로드 대상 파트너
      const [emailMemo, setEmailMemo] = useState('');
      const [templateMode, setTemplateMode] = useState('download'); // 'download' | 'email'
      const fileInputRef = React.useRef(null);

      const buildTemplateWorkbook = () => {
        // Sheet 1: 주문 (사용자가 작성하는 시트)
        const sample = [
          { '스타일 번호': 'KNIT-MOHAIR21', '색상': 'GREY/PURPLE', '사이즈': 'M', '수량': 5 },
          { '스타일 번호': 'KNIT-MOHAIR21', '색상': 'GREY/PURPLE', '사이즈': 'L', '수량': 3 },
          { '스타일 번호': 'BLOUSON-DRK24', '색상': 'CHARCOAL', '사이즈': 'L', '수량': 10 },
        ];
        const ws = XLSX.utils.json_to_sheet(sample);
        ws['!cols'] = [{ wch: 18 }, { wch: 18 }, { wch: 10 }, { wch: 8 }];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '주문');

        // Sheet 2: 상품 정보 (참고용)
        const exch = (typeof EXCHANGE_RATE !== 'undefined' ? EXCHANGE_RATE.krw_per_usd : 1300);
        // 엑셀 셀은 최대 32767 글자. base64 데이터 URL은 매우 길어 잘림 방지를 위해 축약.
        const safeImg = (url) => {
          if (!url) return '';
          const s = String(url);
          if (s.startsWith('data:')) return '[Uploaded image]';
          if (s.length > 32000) return s.slice(0, 32000) + '…';
          return s;
        };
        const productRows = (products || []).filter(p => p.is_visible !== false).map(p => {
          const imgs = (p.images || []).slice(0, 5);
          const colorList = (p.colors_list && p.colors_list.length > 0)
            ? p.colors_list.join(', ')
            : (p.color || '');
          const sizeList = (p.sizes || []).join(', ');
          // 가격(USD)는 기본 할인 적용 없이 환율만 적용
          const priceUsd = p.retail_price_krw ? Math.round((p.retail_price_krw / exch) * 100) / 100 : '';
          return {
            '상품명': p.name || '',
            '스타일 번호': p.style_no || '',
            '이미지1': safeImg(imgs[0]),
            '이미지2': safeImg(imgs[1]),
            '이미지3': safeImg(imgs[2]),
            '이미지4': safeImg(imgs[3]),
            '이미지5': safeImg(imgs[4]),
            '컬러': colorList,
            '사이즈': sizeList,
            '카테고리': p.category || '',
            'Ship Date': p.ship_date || '',
            'Year': (p.season && p.season.year) || '',
            'Season': (p.season && p.season.season) || '',
            'Gender': p.gender || '',
            '가격(USD)': priceUsd,
            '가격(원)': p.retail_price_krw || ''
          };
        });
        const ws2 = XLSX.utils.json_to_sheet(productRows);
        ws2['!cols'] = [
          { wch: 32 }, { wch: 18 }, { wch: 30 }, { wch: 30 }, { wch: 30 }, { wch: 30 }, { wch: 30 },
          { wch: 22 }, { wch: 22 }, { wch: 14 }, { wch: 14 }, { wch: 8 }, { wch: 10 }, { wch: 12 }, { wch: 12 }, { wch: 12 }
        ];
        // 이미지 컬럼(C~G)에 하이퍼링크 적용 - 셀 클릭 시 브라우저로 이미지 열림
        const imageCols = ['C', 'D', 'E', 'F', 'G']; // 이미지1~5
        productRows.forEach((row, rowIdx) => {
          const excelRow = rowIdx + 2; // 헤더가 1행
          imageCols.forEach((col, i) => {
            const url = row[`이미지${i + 1}`];
            if (url && typeof url === 'string' && (url.startsWith('http://') || url.startsWith('https://') || url.startsWith('images/'))) {
              const cellRef = `${col}${excelRow}`;
              const cell = ws2[cellRef];
              if (cell) {
                cell.l = { Target: url, Tooltip: 'Click to view image' };
              }
            }
          });
        });
        XLSX.utils.book_append_sheet(wb, ws2, '상품 정보');

        return wb;
      };

      const downloadTemplate = () => {
        if (typeof XLSX === 'undefined') { alert('엑셀 라이브러리가 로드되지 않았습니다.'); return; }
        try {
          const wb = buildTemplateWorkbook();
          XLSX.writeFile(wb, 'order_upload_template.xlsx');
        } catch (err) {
          console.error('Excel template download error:', err);
          alert('엑셀 양식 다운로드 중 오류가 발생했습니다: ' + err.message);
        }
      };

      // 업로드 대상 파트너 선택 (이메일 발송과 무관)
      const handlePartnerSelect = (pid) => {
        setSelectedPartnerId(pid);
      };

      // 양식 발송 대상 파트너 선택 (이메일 자동 채움, 업로드 대상과 무관)
      const handleEmailPartnerSelect = (pid) => {
        setEmailPartnerId(pid);
        const p = partners.find(p => p.partner_id === pid);
        setEmailRecipient(p && p.email ? p.email : '');
      };

      const sendTemplateEmail = () => {
        const email = (emailRecipient || '').trim();
        if (!email) { alert('받는 사람 이메일을 입력해주세요.'); return; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { alert('올바른 이메일 형식이 아닙니다.'); return; }
        const partnerName = partners.find(p => p.email === email)?.company_name || '파트너';
        // 양식 파일 다운로드 (실제 SMTP 연동 시 첨부)
        if (typeof XLSX !== 'undefined') {
          try { XLSX.writeFile(buildTemplateWorkbook(), 'order_upload_template.xlsx'); } catch (_) { }
        }
        // 메일 미리보기 새 창
        const subject = `[MUSINSA B2B] 발주 양식 안내 - ${partnerName}`;
        const memoBlock = emailMemo.trim() ? `<div style="margin-top:16px;padding:12px 16px;background:#f9fafb;border-left:3px solid #2563eb;color:#374151;font-size:13px;line-height:1.7;white-space:pre-wrap">${emailMemo.replace(/</g, '&lt;')}</div>` : '';
        const html = `
<div style="font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;background:#f5f5f5;padding:24px 0;color:#111">
  <div style="max-width:560px;margin:0 auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.06)">
    <div style="background:#111;padding:28px 32px;color:#fff;text-align:center">
      <div style="font-size:24px;font-weight:800;letter-spacing:0.05em">MUSINSA</div>
      <div style="font-size:11px;letter-spacing:0.3em;opacity:0.65;margin-top:4px">B2B PARTNER</div>
    </div>
    <div style="padding:32px">
      <h1 style="font-size:20px;font-weight:700;margin:0 0 12px 0">발주 양식 안내</h1>
      <p style="font-size:14px;color:#555;line-height:1.7;margin:0 0 20px 0">Dear ${partnerName},<br/>아래 양식 파일을 다운로드하여 발주할 상품 정보를 작성해주세요. 작성 후 회신해주시면 주문이 등록됩니다.</p>
      <div style="border:1px solid #eee;border-radius:8px;padding:16px 20px;margin-bottom:8px;display:flex;align-items:center;gap:12px">
        <div style="font-size:28px">📎</div>
        <div style="flex:1">
          <div style="font-weight:600;font-size:14px">order_upload_template.xlsx</div>
          <div style="font-size:12px;color:#999;margin-top:2px">필요 정보: 스타일 번호, 색상, 사이즈, 수량</div>
        </div>
      </div>
      ${memoBlock}
      <div style="margin-top:28px;padding-top:24px;border-top:1px solid #eee;font-size:12px;color:#999;line-height:1.7">
        Have any questions? Please reach out to your account manager at b2b@musinsa.com.<br/>
        © MUSINSA B2B Partner Portal. All rights reserved.
      </div>
    </div>
  </div>
</div>`;
        try {
          const w = window.open('', '_blank', 'width=620,height=800');
          if (w) {
            w.document.title = subject;
            w.document.body.innerHTML = `<div style="background:#f5f5f5;min-height:100vh;padding:20px 0"><div style="max-width:560px;margin:0 auto 16px;font-size:11px;color:#666;font-family:monospace">📧 To: ${email}<br/>Subject: ${subject}<br/>Attachment: order_upload_template.xlsx</div>${html}</div>`;
          }
        } catch (e) { }
        showToast('양식 메일 발송 완료', `${email}로 발주 양식을 보냈어요. 양식 파일도 함께 다운로드됐습니다.`, 'success');
      };

      const generateOrderId = (offset) => {
        const now = new Date();
        const yy = now.getFullYear();
        const tag = String(now.getTime()).slice(-5);
        return `ORD-${yy}-MAN${tag}${String(offset).padStart(2, '0')}`;
      };

      const parseFile = (file) => {
        if (typeof XLSX === 'undefined') { alert('엑셀 라이브러리가 로드되지 않았습니다.'); return; }
        // 업로드는 파트너 선택 필수
        const partner = partners.find(p => p.partner_id === selectedPartnerId);
        if (!partner) { alert('업로드를 위해 먼저 파트너를 선택해주세요.'); return; }
        setParsing(true);
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
            const errors = [];
            const items = [];
            rows.forEach((r, idx) => {
              const styleNo = String(r['스타일 번호'] || r['스타일번호'] || r['Style No'] || '').trim();
              const color = String(r['색상'] || r['Color'] || '').trim();
              const size = String(r['사이즈'] || r['Size'] || '').trim();
              const qty = parseInt(r['수량'] || r['Qty'] || 0, 10);
              if (!styleNo || !size || !qty || qty <= 0) {
                errors.push(`행 ${idx + 2}: 필수 값 누락 (스타일 번호, 사이즈, 수량 확인)`);
                return;
              }
              const product = products.find(p => p.style_no === styleNo);
              if (!product) { errors.push(`행 ${idx + 2}: 스타일번호 '${styleNo}'에 해당하는 상품이 없습니다.`); return; }
              const discountRate = partner.discount_rate || 0;
              const exch = (typeof EXCHANGE_RATE !== 'undefined' ? EXCHANGE_RATE.krw_per_usd : 1300);
              const unitPriceUsd = Math.round((product.retail_price_krw * (1 - discountRate) / exch) * 100) / 100;
              const subtotal = Math.round(unitPriceUsd * qty * 100) / 100;
              items.push({ productId: product.id, product, color, size, qty, unit_price: unitPriceUsd, subtotal });
            });
            const groupedByPartner = items.length > 0 ? { [partner.partner_id]: { partner, items } } : {};
            const nowIso = new Date().toISOString();
            const newOrders = Object.values(groupedByPartner).map((g, i) => {
              const totalQty = g.items.reduce((s, it) => s + (it.qty || 0), 0);
              const totalAmount = Math.round(g.items.reduce((s, it) => s + (it.subtotal || 0), 0) * 100) / 100;
              return {
                order_id: generateOrderId(i),
                partner_id: g.partner.partner_id,
                partner_name: g.partner.company_name,
                status: '주문접수',
                rejection_reason: null,
                total_qty: totalQty,
                total_amount: totalAmount,
                created_at: nowIso,
                updated_at: nowIso,
                items: g.items,
                created_by: 'manual_bulk_upload'
              };
            });
            setParsed({ orders: newOrders, errors });
          } catch (err) {
            alert('엑셀 파일 파싱 중 오류가 발생했습니다: ' + err.message);
            setParsed(null);
          }
          setParsing(false);
        };
        reader.readAsArrayBuffer(file);
      };

      const handleFile = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        parseFile(file);
      };

      const handleConfirm = () => {
        if (!parsed || parsed.orders.length === 0) return;
        onCreate(parsed.orders);
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-content" onClick={(e) => e.stopPropagation()} style={{ maxWidth: '720px', maxHeight: '90vh', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
            <div className="modal-header" style={{ flexShrink: 0 }}>
              <h2 className="modal-title">주문 일괄 등록</h2>
              <button className="modal-close" onClick={onClose}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg></button>
            </div>
            <div className="modal-body" style={{ flex: 1, overflowY: 'auto', display: 'flex', flexDirection: 'column', marginBottom: 0 }}>
              {/* 엑셀 양식 다운로드 (이메일 발송 기능 일단 제외) */}
              <div style={{ flexShrink: 0, padding: '14px 16px', background: '#f3f4f6', border: 'none', borderRadius: '6px', marginBottom: '20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '12px', flexWrap: 'wrap' }}>
                <div style={{ fontSize: '12px', color: '#666', lineHeight: 1.6 }}>
                  필요 정보: <strong style={{ color: '#111' }}>스타일 번호, 색상, 사이즈, 수량</strong>
                </div>
                <button onClick={downloadTemplate} style={{ display: 'inline-flex', alignItems: 'center', gap: '6px', padding: '8px 18px', background: '#fff', color: '#111', border: '1px solid #111', borderRadius: '4px', fontSize: '13px', fontWeight: 500, cursor: 'pointer', whiteSpace: 'nowrap' }}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg>
                  엑셀 양식 다운로드
                </button>
              </div>

              {/* 업로드 대상 파트너 선택 (필수) */}
              <div style={{ flexShrink: 0, padding: '14px 16px', background: '#fff', border: '1px solid #d1d5db', borderRadius: '6px', marginBottom: '12px', display: 'flex', alignItems: 'center', gap: '12px', flexWrap: 'wrap' }}>
                <span style={{ fontSize: '13px', fontWeight: 600, color: '#111' }}>업로드 대상 파트너 <span style={{ color: '#2563eb' }}>*</span></span>
                <select value={selectedPartnerId} onChange={(e) => handlePartnerSelect(e.target.value)} style={{ width: '220px', height: '34px', padding: '0 28px 0 10px', border: '1px solid #ddd', borderRadius: '4px', fontSize: '13px', background: "#fff url(\"data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23666' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E\") no-repeat right 10px center", appearance: 'none', WebkitAppearance: 'none', MozAppearance: 'none', cursor: 'pointer', color: '#111' }}>
                  <option value="">파트너 선택</option>
                  {partners.map(p => (
                    <option key={p.partner_id} value={p.partner_id}>{p.company_name}</option>
                  ))}
                </select>
                {!selectedPartnerId && (
                  <span style={{ fontSize: '12px', color: '#888' }}>파트너를 먼저 선택해야 업로드할 수 있어요.</span>
                )}
              </div>

              <div style={{ flex: 1, minHeight: '180px', border: '2px dashed #d1d5db', borderRadius: '8px', padding: '20px 20px 24px', textAlign: 'center', background: '#fafafa', marginBottom: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', opacity: selectedPartnerId ? 1 : 0.6 }}>
                <input ref={fileInputRef} type="file" accept=".xlsx,.xls" onChange={handleFile} style={{ display: 'none' }} />
                <div style={{ fontSize: '14px', fontWeight: 600, color: '#111', marginBottom: '4px' }}>엑셀 파일 업로드</div>
                <div style={{ fontSize: '12px', color: '#666', marginBottom: '12px' }}>.xlsx 또는 .xls 형식 지원</div>
                <button onClick={() => { if (!selectedPartnerId) { alert('업로드를 위해 먼저 파트너를 선택해주세요.'); return; } fileInputRef.current && fileInputRef.current.click(); }} disabled={parsing || !selectedPartnerId} style={{ padding: '8px 24px', background: selectedPartnerId ? '#111' : '#ccc', color: '#fff', border: 'none', borderRadius: '4px', fontSize: '13px', fontWeight: 500, cursor: (parsing || !selectedPartnerId) ? 'not-allowed' : 'pointer', opacity: parsing ? 0.6 : 1 }}>
                  {parsing ? '분석 중...' : '파일 선택'}
                </button>
              </div>

              {parsed && (
                <div style={{ marginTop: '16px' }}>
                  <div style={{ padding: '12px 14px', background: '#f9fafb', border: '1px solid #e5e7eb', borderRadius: '6px', marginBottom: '12px', fontSize: '13px' }}>
                    <strong>분석 결과</strong> · 생성될 주문 <strong style={{ color: '#2563eb' }}>{parsed.orders.length}건</strong> · 오류 {parsed.errors.length}건
                  </div>
                  {parsed.orders.length > 0 && (
                    <div style={{ marginBottom: '12px' }}>
                      <div style={{ fontSize: '12px', color: '#666', marginBottom: '6px', fontWeight: 600 }}>주문 미리보기</div>
                      <div style={{ border: '1px solid #e5e7eb', borderRadius: '6px', maxHeight: '180px', overflowY: 'auto' }}>
                        <table style={{ width: '100%', fontSize: '12px', borderCollapse: 'collapse' }}>
                          <thead>
                            <tr style={{ background: '#f9fafb', borderBottom: '1px solid #e5e7eb' }}>
                              <th style={{ padding: '8px 10px', textAlign: 'left', fontWeight: 600 }}>파트너</th>
                              <th style={{ padding: '8px 10px', textAlign: 'center', fontWeight: 600 }}>상품 수</th>
                              <th style={{ padding: '8px 10px', textAlign: 'center', fontWeight: 600 }}>총 수량</th>
                              <th style={{ padding: '8px 10px', textAlign: 'right', fontWeight: 600 }}>예상 금액</th>
                            </tr>
                          </thead>
                          <tbody>
                            {parsed.orders.map(o => (
                              <tr key={o.order_id} style={{ borderBottom: '1px solid #f5f5f5' }}>
                                <td style={{ padding: '8px 10px' }}>{o.partner_name}</td>
                                <td style={{ padding: '8px 10px', textAlign: 'center' }}>{o.items.length}개</td>
                                <td style={{ padding: '8px 10px', textAlign: 'center' }}>{o.total_qty}개</td>
                                <td style={{ padding: '8px 10px', textAlign: 'right', fontWeight: 600 }}>${o.total_amount.toFixed(2)}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}
                  {parsed.errors.length > 0 && (
                    <div style={{ padding: '10px 14px', background: '#fef2f2', border: '1px solid #fecaca', borderRadius: '6px', fontSize: '12px', color: '#dc2626', maxHeight: '120px', overflowY: 'auto' }}>
                      <strong>오류 {parsed.errors.length}건:</strong>
                      <ul style={{ margin: '6px 0 0 18px', padding: 0 }}>
                        {parsed.errors.map((e, i) => <li key={i}>{e}</li>)}
                      </ul>
                    </div>
                  )}
                </div>
              )}
            </div>
            <div className="modal-footer" style={{ flexShrink: 0, marginTop: '16px' }}>
              <button className="btn-cancel" onClick={onClose}>취소</button>
              <button className="btn-approve" disabled={!parsed || parsed.orders.length === 0} style={(!parsed || parsed.orders.length === 0) ? { opacity: 0.4, cursor: 'not-allowed' } : {}} onClick={handleConfirm}>
                {parsed ? `${parsed.orders.length}건 등록` : '주문 등록'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    const DisplaySettingsPage = ({ products, displaySettings, onUpdateDisplaySettings }) => {
      const { showToast } = useToast();
      const [activeTab, setActiveTab] = useState('category');
      // 안내 문구 스크롤 시 접힘
      const bannerScrollRef = React.useRef(null);
      const [bannerNoticeCollapsed, setBannerNoticeCollapsed] = useState(false);
      React.useEffect(() => {
        if (activeTab !== 'banner') return;
        const el = bannerScrollRef.current;
        if (!el) return;
        const onScroll = () => setBannerNoticeCollapsed(el.scrollTop > 24);
        el.addEventListener('scroll', onScroll, { passive: true });
        return () => el.removeEventListener('scroll', onScroll);
      }, [activeTab]);
      // 메일 관리 안내 문구 스크롤 시 접힘
      const emailScrollRef = React.useRef(null);
      const [emailNoticeCollapsed, setEmailNoticeCollapsed] = useState(false);
      React.useEffect(() => {
        if (activeTab !== 'email') return;
        const el = emailScrollRef.current;
        if (!el) return;
        const onScroll = () => setEmailNoticeCollapsed(el.scrollTop > 24);
        el.addEventListener('scroll', onScroll, { passive: true });
        return () => el.removeEventListener('scroll', onScroll);
      }, [activeTab]);
      const visibleProducts = products.filter(p => p.is_visible);
      // 무신사 표준 카테고리 노출 순서 (파트너 포털과 통일)
      const CATEGORY_ORDER = ['Outerwear', 'Tops', 'Pants', 'Bottoms', 'Skirts', 'Dresses', 'Shoes', 'Bags', 'Accessories'];
      const categoryRank = (c) => {
        const i = CATEGORY_ORDER.indexOf(c);
        return i === -1 ? 999 : i;
      };
      const categories = [...new Set(visibleProducts.map(p => p.category).filter(Boolean))]
        .sort((a, b) => categoryRank(a) - categoryRank(b) || a.localeCompare(b));
      const settings = displaySettings || { categoryOrder: {}, newProducts: [], heroProducts: [], banners: [] };

      const update = (patch) => {
        const next = { ...settings, ...patch };
        onUpdateDisplaySettings(next);
      };

      // 상품 노출 순서: 카테고리별 / 구분별 (성별)
      const [orderMode, setOrderMode] = useState('category'); // 'category' | 'gender'
      // 일괄 순서 변경 모달
      const [bulkReorderOpen, setBulkReorderOpen] = useState(false);
      const [bulkReorderText, setBulkReorderText] = useState('');

      // 상품 ID로 안정적인 정렬 (P-001, P-002, ... 순)
      const sortByIdAsc = (arr) => [...arr].sort((a, b) => {
        const ai = parseInt((a.id || '').replace(/[^0-9]/g, ''), 10) || 0;
        const bi = parseInt((b.id || '').replace(/[^0-9]/g, ''), 10) || 0;
        if (ai !== bi) return ai - bi;
        return (a.id || '').localeCompare(b.id || '');
      });

      // 카테고리 순서 관리
      const [activeCategory, setActiveCategory] = useState(categories[0] || '');
      React.useEffect(() => {
        if (!activeCategory && categories.length > 0) setActiveCategory(categories[0]);
      }, [categories.join(',')]);

      const getCategoryOrder = (cat) => {
        const saved = settings.categoryOrder?.[cat] || [];
        // 기본 순서: ID 오름차순 (P-001부터). 저장된 순서가 있으면 그걸 우선 사용.
        const inCat = sortByIdAsc(visibleProducts.filter(p => p.category === cat));
        const ordered = saved.map(id => inCat.find(p => p.id === id)).filter(Boolean);
        const missing = inCat.filter(p => !saved.includes(p.id));
        return [...ordered, ...missing];
      };

      const moveCategoryItem = (cat, idx, dir) => {
        const list = getCategoryOrder(cat).map(p => p.id);
        const newIdx = idx + dir;
        if (newIdx < 0 || newIdx >= list.length) return;
        [list[idx], list[newIdx]] = [list[newIdx], list[idx]];
        update({ categoryOrder: { ...(settings.categoryOrder || {}), [cat]: list } });
      };

      // 구분(성별)별 순서 관리
      const GENDER_GROUPS = [
        { key: 'Male', label: 'Male' },
        { key: 'Female', label: 'Female' },
        { key: 'Kids', label: 'Kids' },
        { key: 'Accessories', label: 'Accessories' }
      ];
      const genderLabel = (g) => (GENDER_GROUPS.find(x => x.key === g) || {}).label || g;
      const [activeGender, setActiveGender] = useState('Male');

      const getGenderOrder = (gender) => {
        const saved = settings.genderOrder?.[gender] || [];
        const inGender = sortByIdAsc(visibleProducts.filter(p => p.gender === gender));
        const ordered = saved.map(id => inGender.find(p => p.id === id)).filter(Boolean);
        const missing = inGender.filter(p => !saved.includes(p.id));
        return [...ordered, ...missing];
      };

      const moveGenderItem = (gender, idx, dir) => {
        const list = getGenderOrder(gender).map(p => p.id);
        const newIdx = idx + dir;
        if (newIdx < 0 || newIdx >= list.length) return;
        [list[idx], list[newIdx]] = [list[newIdx], list[idx]];
        update({ genderOrder: { ...(settings.genderOrder || {}), [gender]: list } });
      };

      // NEW / HERO 상품 추가
      const togglePinned = (key, productId, max) => {
        const current = settings[key] || [];
        let next;
        if (current.includes(productId)) {
          next = current.filter(id => id !== productId);
        } else {
          if (current.length >= max) {
            showToast('등록 제한', `${key === 'newProducts' ? 'NEW' : 'HERO'} 상품은 최대 ${max}개까지 등록 가능해요.`, 'error');
            return;
          }
          next = [...current, productId];
        }
        update({ [key]: next });
        showToast('저장 완료', `${key === 'newProducts' ? 'NEW' : 'HERO'} 상품 목록이 업데이트됐어요.`, 'success');
      };

      const moveTopItem = (key, idx, dir) => {
        const list = [...(settings[key] || [])];
        const newIdx = idx + dir;
        if (newIdx < 0 || newIdx >= list.length) return;
        [list[idx], list[newIdx]] = [list[newIdx], list[idx]];
        update({ [key]: list });
      };

      // Drag & Drop 순서 변경 (카테고리 / NEW / HERO 공용)
      const [dragCtx, setDragCtx] = useState(null); // { kind: 'category'|'new'|'hero', from: number }
      const [dragOverIdx, setDragOverIdx] = useState(null);
      const handleDragStart = (kind, from, e) => {
        setDragCtx({ kind, from });
        if (e.dataTransfer) {
          e.dataTransfer.effectAllowed = 'move';
          try { e.dataTransfer.setData('text/plain', String(from)); } catch (_) { }
        }
      };
      const handleDragOverItem = (kind, overIdx, e) => {
        if (!dragCtx || dragCtx.kind !== kind) return;
        e.preventDefault();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
        if (dragOverIdx !== overIdx) setDragOverIdx(overIdx);
      };
      const handleDrop = (kind, toIdx, e) => {
        e.preventDefault();
        if (!dragCtx || dragCtx.kind !== kind) { setDragCtx(null); setDragOverIdx(null); return; }
        const from = dragCtx.from;
        if (from === toIdx) { setDragCtx(null); setDragOverIdx(null); return; }
        if (kind === 'category') {
          const list = getCategoryOrder(activeCategory).map(p => p.id);
          const [moved] = list.splice(from, 1);
          list.splice(toIdx, 0, moved);
          update({ categoryOrder: { ...(settings.categoryOrder || {}), [activeCategory]: list } });
        } else if (kind === 'gender') {
          const list = getGenderOrder(activeGender).map(p => p.id);
          const [moved] = list.splice(from, 1);
          list.splice(toIdx, 0, moved);
          update({ genderOrder: { ...(settings.genderOrder || {}), [activeGender]: list } });
        } else {
          const key = kind === 'new' ? 'newProducts' : 'heroProducts';
          const list = [...(settings[key] || [])];
          const [moved] = list.splice(from, 1);
          list.splice(toIdx, 0, moved);
          update({ [key]: list });
        }
        setDragCtx(null);
        setDragOverIdx(null);
      };
      const handleDragEnd = () => { setDragCtx(null); setDragOverIdx(null); };

      // 배너 슬롯 관리 (고정 5슬롯) - 슬롯별 개별 수정 모드 (자동 저장)
      const savedBannerSlots = settings.bannerSlots || {};
      const [editingSlot, setEditingSlot] = useState(null); // 'male' | 'female' | ... | null
      const startSlotEdit = (slotKey) => setEditingSlot(slotKey);
      const cancelSlotEdit = () => setEditingSlot(null);
      const BANNER_SLOT_DEFS = [
        { key: 'male', label: '배너 1', size: '1500 × 550px', ratio: '약 2.7:1 (가로 와이드)', tip: '메인 좌측 큰 카드 (2칸 폭 × 2행)' },
        { key: 'female', label: '배너 2', size: '2400 × 400px', ratio: '6:1 (가로 와이드)', tip: '메인 상단 와이드 카드' },
        { key: 'kids', label: '배너 3', size: '900 × 300px', ratio: '3:1 (가로)', tip: '메인 중앙 작은 카드' },
        { key: 'accessories', label: '배너 4', size: '900 × 300px', ratio: '3:1 (가로)', tip: '메인 중앙 작은 카드' },
        { key: 'special', label: '배너 5', size: '1000 × 750px', ratio: '약 4:3 (가로)', tip: '메인 우측 카드 (1칸 폭 × 2행)' }
      ];
      const updateBannerSlot = (slotKey, patch) => {
        if (editingSlot !== slotKey) return;
        update({ bannerSlots: { ...savedBannerSlots, [slotKey]: { ...(savedBannerSlots[slotKey] || {}), ...patch } } });
      };

      const tabs = [
        { key: 'category', label: '상품 노출 순서' },
        { key: 'new', label: 'NEW 상품 (메인)' },
        { key: 'hero', label: 'HERO 상품 (메인)' },
        { key: 'banner', label: '메인 배너' },
        { key: 'email', label: '안내 메일 관리' }
      ];

      // 이메일 템플릿 관리
      const DEFAULT_EMAIL_TEMPLATES = {
        received: {
          subject: '[MUSINSA B2B] Your order {{ORDER_ID}} has been RECEIVED',
          intro: 'We have received your order. Our team will review it and get back to you shortly.',
          footer: 'Have any questions? Please reach out to your account manager at b2b@musinsa.com.'
        },
        approved: {
          subject: '[MUSINSA B2B] Your order {{ORDER_ID}} has been APPROVED',
          intro: 'Your order has been approved. We will proceed with the next steps shortly.',
          footer: 'Have any questions? Please reach out to your account manager at b2b@musinsa.com.'
        },
        rejected: {
          subject: '[MUSINSA B2B] Your order {{ORDER_ID}} has been REJECTED',
          intro: 'Unfortunately, your order has been rejected. Please review the reason below and contact us for further assistance.',
          footer: 'Have any questions? Please reach out to your account manager at b2b@musinsa.com.'
        }
      };
      const savedEmailTemplates = settings.emailTemplates || DEFAULT_EMAIL_TEMPLATES;
      const [emailEditing, setEmailEditing] = useState(false);
      const [emailDraft, setEmailDraft] = useState(savedEmailTemplates);
      const [activeEmailKind, setActiveEmailKind] = useState('approved');
      React.useEffect(() => {
        if (!emailEditing) setEmailDraft(savedEmailTemplates);
      }, [JSON.stringify(savedEmailTemplates), emailEditing]);
      const isEmailDirty = JSON.stringify(emailDraft) !== JSON.stringify(savedEmailTemplates);
      const emailTemplates = emailEditing ? emailDraft : savedEmailTemplates;
      const updateEmailTemplate = (kind, patch) => {
        if (!emailEditing) return;
        // 자동 저장 - savedEmailTemplates에 즉시 commit
        update({ emailTemplates: { ...savedEmailTemplates, [kind]: { ...(savedEmailTemplates[kind] || {}), ...patch } } });
      };
      const handleEmailCancel = () => {
        setEmailEditing(false);
      };
      const handleEmailReset = () => {
        if (!confirm('기본 템플릿으로 초기화하시겠습니까?')) return;
        update({ emailTemplates: DEFAULT_EMAIL_TEMPLATES });
        showToast('초기화 완료', '기본 템플릿으로 복원됐어요.', 'success');
      };

      return (
        <div className="main-content">
          <div className="page-header">
            <h1 className="page-title" style={{ marginBottom: 0 }}>전시 설정</h1>
          </div>

          {/* Tabs - 일반 플로우 (sticky 제거), 컨텐츠는 카드 안에서 스크롤 */}
          <div style={{ marginBottom: '16px' }}>
            <div style={{ display: 'flex', gap: '0', borderBottom: '1px solid #e5e5e5' }}>
              {tabs.map(t => (
                <button key={t.key}
                  onClick={() => setActiveTab(t.key)}
                  style={{
                    padding: '12px 20px',
                    background: 'transparent',
                    border: 'none',
                    borderBottom: activeTab === t.key ? '2px solid #111' : '2px solid transparent',
                    fontSize: '14px',
                    fontWeight: activeTab === t.key ? 700 : 500,
                    color: activeTab === t.key ? '#111' : '#888',
                    cursor: 'pointer',
                    marginBottom: '-1px'
                  }}>
                  {t.label}
                </button>
              ))}
            </div>
          </div>

          {/* PRODUCT DISPLAY ORDER (카테고리별 / 구분별) */}
          {activeTab === 'category' && (() => {
            const isCat = orderMode === 'category';
            const items = isCat ? getCategoryOrder(activeCategory) : getGenderOrder(activeGender);
            const dragKind = isCat ? 'category' : 'gender';
            const moveFn = isCat ? moveCategoryItem : moveGenderItem;
            const activeKey = isCat ? activeCategory : activeGender;
            const sectionTitle = isCat ? activeCategory : genderLabel(activeGender);
            const sectionLabel = isCat ? '카테고리' : '구분';
            return (
              <div className="settings-card" style={{ height: 'calc(100vh - 220px)', display: 'flex', flexDirection: 'column', overflow: 'hidden', padding: '2rem' }}>
                <div style={{ display: 'flex', gap: '24px', alignItems: 'stretch', flex: 1, minHeight: 0 }}>
                  {/* Left sidebar: 모드 토글 + 항목 리스트 */}
                  <div style={{ width: '200px', borderRight: '1px solid #eee', paddingRight: '16px', flexShrink: 0, overflowY: 'auto', display: 'flex', flexDirection: 'column' }}>
                    {/* 작은 segmented 토글 (카테고리별 / 구분별) */}
                    <div style={{ display: 'inline-flex', padding: '3px', background: '#f3f3f3', borderRadius: '6px', marginBottom: '16px', width: '100%' }}>
                      {[
                        { key: 'category', label: '카테고리별' },
                        { key: 'gender', label: '구분별' }
                      ].map(m => (
                        <button key={m.key}
                          onClick={() => setOrderMode(m.key)}
                          style={{
                            flex: 1,
                            padding: '6px 10px',
                            background: orderMode === m.key ? '#fff' : 'transparent',
                            border: 'none',
                            borderRadius: '4px',
                            fontSize: '12px',
                            fontWeight: orderMode === m.key ? 700 : 500,
                            color: orderMode === m.key ? '#111' : '#777',
                            cursor: 'pointer',
                            boxShadow: orderMode === m.key ? '0 1px 2px rgba(0,0,0,0.06)' : 'none',
                            transition: 'background 0.15s, color 0.15s'
                          }}>
                          {m.label}
                        </button>
                      ))}
                    </div>

                    {/* 카테고리 또는 구분 리스트 */}
                    {isCat
                      ? categories.map(cat => (
                        <div key={cat}
                          onClick={() => setActiveCategory(cat)}
                          style={{
                            padding: '10px 12px',
                            marginBottom: '4px',
                            borderRadius: '4px',
                            cursor: 'pointer',
                            background: activeCategory === cat ? '#f5f5f5' : 'transparent',
                            fontWeight: activeCategory === cat ? 600 : 400,
                            fontSize: '13px',
                            display: 'flex',
                            justifyContent: 'space-between',
                            alignItems: 'center'
                          }}>
                          <span>{cat}</span>
                          <span style={{ fontSize: '11px', color: '#999' }}>{visibleProducts.filter(p => p.category === cat).length}</span>
                        </div>
                      ))
                      : GENDER_GROUPS.map(g => (
                        <div key={g.key}
                          onClick={() => setActiveGender(g.key)}
                          style={{
                            padding: '10px 12px',
                            marginBottom: '4px',
                            borderRadius: '4px',
                            cursor: 'pointer',
                            background: activeGender === g.key ? '#f5f5f5' : 'transparent',
                            fontWeight: activeGender === g.key ? 600 : 400,
                            fontSize: '13px',
                            display: 'flex',
                            justifyContent: 'space-between',
                            alignItems: 'center'
                          }}>
                          <span>{g.label}</span>
                          <span style={{ fontSize: '11px', color: '#999' }}>{visibleProducts.filter(p => p.gender === g.key).length}</span>
                        </div>
                      ))}
                  </div>

                  {/* Right: 상품 리스트 */}
                  <div style={{ flex: 1, minWidth: 0, overflowY: 'auto', paddingRight: '8px' }}>
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '16px', gap: '12px' }}>
                      <div style={{ fontSize: '13px', color: '#666' }}>
                        <strong>{sectionTitle}</strong> {sectionLabel}의 파트너 페이지 노출 순서를 드래그 또는 ↑↓ 버튼으로 조정하세요.
                      </div>
                      <button
                        onClick={() => { setBulkReorderText(''); setBulkReorderOpen(true); }}
                        style={{ flexShrink: 0, padding: '7px 14px', fontSize: '12px', fontWeight: 500, background: '#fff', color: '#111', border: '1px solid #111', borderRadius: '4px', cursor: 'pointer', whiteSpace: 'nowrap', display: 'inline-flex', alignItems: 'center', gap: '6px' }}
                      >
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M3 12h18M3 18h18" /></svg>
                        일괄 순서 변경
                      </button>
                    </div>
                    {items.map((p, idx) => {
                      const isDragging = dragCtx && dragCtx.kind === dragKind && dragCtx.from === idx;
                      const isDragOver = dragCtx && dragCtx.kind === dragKind && dragOverIdx === idx && dragCtx.from !== idx;
                      return (
                        <div key={p.id}
                          draggable
                          onDragStart={(e) => handleDragStart(dragKind, idx, e)}
                          onDragOver={(e) => handleDragOverItem(dragKind, idx, e)}
                          onDrop={(e) => handleDrop(dragKind, idx, e)}
                          onDragEnd={handleDragEnd}
                          style={{ display: 'flex', alignItems: 'center', gap: '12px', padding: '10px 12px', border: isDragOver ? '1px solid #2563eb' : '1px solid #d1d5db', borderRadius: '6px', marginBottom: '6px', background: isDragOver ? '#eff6ff' : '#fff', opacity: isDragging ? 0.4 : 1, cursor: 'grab', transition: 'background 0.1s, border-color 0.1s' }}>
                          <span style={{ color: '#bbb', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', cursor: 'grab', userSelect: 'none' }} title="드래그해서 순서 변경"><svg width="10" height="14" viewBox="0 0 10 14" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><circle cx="2.2" cy="2" r="1.2" /><circle cx="7.8" cy="2" r="1.2" /><circle cx="2.2" cy="7" r="1.2" /><circle cx="7.8" cy="7" r="1.2" /><circle cx="2.2" cy="12" r="1.2" /><circle cx="7.8" cy="12" r="1.2" /></svg></span>
                          <span style={{ width: '28px', textAlign: 'center', fontWeight: 700, color: '#111', fontSize: '13px' }}>{idx + 1}</span>
                          {p.images?.[0] ? <img src={p.images[0]} alt="" style={{ width: '60px', height: '80px', objectFit: 'cover', borderRadius: '4px' }} draggable={false} /> : <div style={{ width: '60px', height: '80px', background: '#f5f5f5', borderRadius: '4px' }} />}
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontSize: '13px', fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{p.name}</div>
                            <div style={{ fontSize: '11px', color: '#999' }}>{p.style_no} · {isCat ? p.sub_category : p.category}</div>
                          </div>
                          <div style={{ display: 'flex', gap: '4px' }}>
                            <button onClick={() => moveFn(activeKey, idx, -1)} disabled={idx === 0} style={{ width: '28px', height: '28px', border: '1px solid #ddd', background: '#fff', borderRadius: '4px', cursor: idx === 0 ? 'default' : 'pointer', opacity: idx === 0 ? 0.4 : 1 }}>↑</button>
                            <button onClick={() => moveFn(activeKey, idx, 1)} disabled={idx === items.length - 1} style={{ width: '28px', height: '28px', border: '1px solid #ddd', background: '#fff', borderRadius: '4px', cursor: idx === items.length - 1 ? 'default' : 'pointer', opacity: idx === items.length - 1 ? 0.4 : 1 }}>↓</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* 일괄 순서 변경 모달 */}
                {bulkReorderOpen && (() => {
                  // 구분자: 쉼표(,) / 줄바꿈(\n,\r) / 탭(\t) / 세미콜론(;) — 엑셀 복붙 호환
                  const parseStyleNos = (text) => text.split(/[,\n\r\t;]+/).map(s => s.trim()).filter(Boolean);
                  const applyBulkReorder = () => {
                    const styleNos = parseStyleNos(bulkReorderText);
                    if (styleNos.length === 0) { showToast('입력 필요', '스타일넘버를 입력해주세요.', 'error'); return; }
                    const currentItems = isCat ? getCategoryOrder(activeCategory) : getGenderOrder(activeGender);
                    const styleNoMap = {};
                    currentItems.forEach(p => { if (p.style_no) styleNoMap[p.style_no.toLowerCase()] = p; });
                    const orderedIds = [];
                    const matched = new Set();
                    const notFound = [];
                    styleNos.forEach(sn => {
                      const product = styleNoMap[sn.toLowerCase()];
                      if (product && !matched.has(product.id)) {
                        orderedIds.push(product.id);
                        matched.add(product.id);
                      } else if (!product) {
                        notFound.push(sn);
                      }
                    });
                    // 입력에 없는 나머지 항목은 기존 순서대로 뒤에 append
                    currentItems.forEach(p => { if (!matched.has(p.id)) orderedIds.push(p.id); });
                    if (isCat) {
                      update({ categoryOrder: { ...(settings.categoryOrder || {}), [activeCategory]: orderedIds } });
                    } else {
                      update({ genderOrder: { ...(settings.genderOrder || {}), [activeGender]: orderedIds } });
                    }
                    if (notFound.length > 0) {
                      showToast('일괄 순서 변경 완료', `${matched.size}개 적용됨. 미매칭 ${notFound.length}개: ${notFound.slice(0, 3).join(', ')}${notFound.length > 3 ? ' 외' : ''}`, 'success');
                    } else {
                      showToast('일괄 순서 변경 완료', `${matched.size}개 스타일넘버 순서가 적용됐어요.`, 'success');
                    }
                    setBulkReorderOpen(false);
                    setBulkReorderText('');
                  };
                  const inputCount = parseStyleNos(bulkReorderText).length;
                  return (
                    <div className="modal-overlay" onClick={() => setBulkReorderOpen(false)}>
                      <div className="modal-content" onClick={(e) => e.stopPropagation()} style={{ maxWidth: '600px' }}>
                        <div className="modal-header">
                          <h2 className="modal-title">일괄 순서 변경</h2>
                          <button className="modal-close" onClick={() => setBulkReorderOpen(false)}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg></button>
                        </div>
                        <div className="modal-body" style={{ paddingTop: '8px' }}>
                          <div style={{ padding: '12px 14px', background: '#f9fafb', border: '1px solid #e5e7eb', borderRadius: '6px', marginBottom: '14px', fontSize: '13px', color: '#444', lineHeight: 1.6 }}>
                            대상: <strong style={{ color: '#111' }}>{sectionTitle}</strong> {sectionLabel}<br />
                            스타일넘버를 입력 순서대로 적용합니다. <strong>쉼표(,) · 줄바꿈 · 탭</strong>으로 구분 가능 (엑셀에서 복사 후 붙여넣기 OK).<br />
                            <span style={{ color: '#999', fontSize: '12px' }}>예시 1: MSSTD-JK01, DENIM-SH02, TSHIRT-BAS03</span><br />
                            <span style={{ color: '#999', fontSize: '12px' }}>예시 2: 엑셀 컬럼 한 줄씩 복붙</span>
                          </div>
                          <textarea
                            value={bulkReorderText}
                            onChange={(e) => setBulkReorderText(e.target.value)}
                            placeholder="스타일넘버를 쉼표/줄바꿈/탭으로 구분해 입력하거나, 엑셀에서 복사한 컬럼을 그대로 붙여넣으세요"
                            rows={10}
                            style={{ width: '100%', padding: '10px 12px', border: '1px solid #ddd', borderRadius: '4px', fontSize: '13px', fontFamily: 'monospace', resize: 'vertical', minHeight: '180px', boxSizing: 'border-box' }}
                          />
                          <div style={{ marginTop: '6px', fontSize: '11px', color: '#999' }}>
                            입력된 스타일넘버: <strong style={{ color: '#111' }}>{inputCount}</strong>개
                          </div>
                          <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '8px', marginTop: '16px' }}>
                            <button onClick={() => setBulkReorderOpen(false)} style={{ padding: '8px 18px', background: '#fff', color: '#555', border: '1px solid #ddd', borderRadius: '4px', fontSize: '13px', fontWeight: 500, cursor: 'pointer' }}>취소</button>
                            <button onClick={applyBulkReorder} disabled={inputCount === 0} style={{ padding: '8px 18px', background: inputCount === 0 ? '#ccc' : '#111', color: '#fff', border: 'none', borderRadius: '4px', fontSize: '13px', fontWeight: 500, cursor: inputCount === 0 ? 'default' : 'pointer' }}>적용</button>
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })()}
              </div>
            );
          })()}

          {/* NEW / HERO */}
          {(activeTab === 'new' || activeTab === 'hero') && (() => {
            const key = activeTab === 'new' ? 'newProducts' : 'heroProducts';
            const label = activeTab === 'new' ? 'NEW' : 'HERO';
            const max = 10;
            const selected = settings[key] || [];
            const selectedProducts = selected.map(id => visibleProducts.find(p => p.id === id)).filter(Boolean);
            const candidates = visibleProducts.filter(p => !selected.includes(p.id));
            return (
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', height: 'calc(100vh - 220px)' }}>
                <div className="settings-card" style={{ display: 'flex', flexDirection: 'column', overflow: 'hidden', padding: '2rem' }}>
                  <h2 className="settings-card-title" style={{ marginBottom: '12px' }}>{label} 노출되는 상품 ({selectedProducts.length}/{max})</h2>
                  <p style={{ fontSize: '12px', color: '#666', marginBottom: '16px' }}>파트너 메인 페이지 {label} 섹션에 노출됩니다. 드래그 또는 ↑↓ 로 순서 변경, ✕ 로 제외.</p>
                  <div style={{ flex: 1, minHeight: 0, overflowY: 'auto' }}>
                    {selectedProducts.length === 0 && <div style={{ padding: '40px 0', textAlign: 'center', color: '#bbb', fontSize: '13px' }}>우측에서 상품을 선택해 등록하세요.</div>}
                    {selectedProducts.map((p, idx) => {
                      const dragKind = activeTab === 'new' ? 'new' : 'hero';
                      const isDragging = dragCtx && dragCtx.kind === dragKind && dragCtx.from === idx;
                      const isDragOver = dragCtx && dragCtx.kind === dragKind && dragOverIdx === idx && dragCtx.from !== idx;
                      return (
                        <div key={p.id}
                          draggable
                          onDragStart={(e) => handleDragStart(dragKind, idx, e)}
                          onDragOver={(e) => handleDragOverItem(dragKind, idx, e)}
                          onDrop={(e) => handleDrop(dragKind, idx, e)}
                          onDragEnd={handleDragEnd}
                          style={{ display: 'flex', alignItems: 'center', gap: '12px', padding: '10px 12px', border: isDragOver ? '1px solid #2563eb' : '1px solid #d1d5db', borderRadius: '6px', marginBottom: '6px', background: isDragOver ? '#eff6ff' : '#fff', opacity: isDragging ? 0.4 : 1, cursor: 'grab', transition: 'background 0.1s, border-color 0.1s' }}>
                          <span style={{ color: '#bbb', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', cursor: 'grab', userSelect: 'none' }} title="드래그해서 순서 변경"><svg width="10" height="14" viewBox="0 0 10 14" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><circle cx="2.2" cy="2" r="1.2" /><circle cx="7.8" cy="2" r="1.2" /><circle cx="2.2" cy="7" r="1.2" /><circle cx="7.8" cy="7" r="1.2" /><circle cx="2.2" cy="12" r="1.2" /><circle cx="7.8" cy="12" r="1.2" /></svg></span>
                          <span style={{ width: '24px', textAlign: 'center', fontWeight: 700, color: '#111', fontSize: '13px' }}>{idx + 1}</span>
                          {p.images?.[0] ? <img src={p.images[0]} alt="" style={{ width: '60px', height: '80px', objectFit: 'cover', borderRadius: '4px' }} draggable={false} /> : <div style={{ width: '60px', height: '80px', background: '#f5f5f5', borderRadius: '4px' }} />}
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontSize: '13px', fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{p.name}</div>
                            <div style={{ fontSize: '11px', color: '#999' }}>{p.style_no}</div>
                          </div>
                          <div style={{ display: 'flex', gap: '4px' }}>
                            <button onClick={() => moveTopItem(key, idx, -1)} disabled={idx === 0} style={{ width: '26px', height: '26px', border: '1px solid #ddd', background: '#fff', borderRadius: '4px', cursor: idx === 0 ? 'default' : 'pointer', opacity: idx === 0 ? 0.4 : 1 }}>↑</button>
                            <button onClick={() => moveTopItem(key, idx, 1)} disabled={idx === selectedProducts.length - 1} style={{ width: '26px', height: '26px', border: '1px solid #ddd', background: '#fff', borderRadius: '4px', cursor: idx === selectedProducts.length - 1 ? 'default' : 'pointer', opacity: idx === selectedProducts.length - 1 ? 0.4 : 1 }}>↓</button>
                            <button onClick={() => togglePinned(key, p.id, max)} style={{ width: '26px', height: '26px', border: '1px solid #fecaca', color: '#dc2626', background: '#fff', borderRadius: '4px', cursor: 'pointer' }}>✕</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
                <div className="settings-card" style={{ display: 'flex', flexDirection: 'column', overflow: 'hidden', padding: '2rem' }}>
                  <h2 className="settings-card-title" style={{ marginBottom: '12px' }}>노출 가능한 상품</h2>
                  <p style={{ fontSize: '12px', color: '#666', marginBottom: '16px' }}>+ 버튼을 눌러 {label} 섹션에 추가합니다 (최대 {max}개).</p>
                  <div style={{ flex: 1, minHeight: 0, overflowY: 'auto' }}>
                    {candidates.map(p => (
                      <div key={p.id} style={{ display: 'flex', alignItems: 'center', gap: '12px', padding: '8px 4px', borderBottom: '1px solid #f5f5f5' }}>
                        {p.images?.[0] ? <img src={p.images[0]} alt="" style={{ width: '52px', height: '68px', objectFit: 'cover', borderRadius: '4px' }} /> : <div style={{ width: '52px', height: '68px', background: '#f5f5f5', borderRadius: '4px' }} />}
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: '12px', fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{p.name}</div>
                          <div style={{ fontSize: '10px', color: '#999' }}>{p.style_no} · {p.category}</div>
                        </div>
                        <button onClick={() => togglePinned(key, p.id, max)} style={{ width: '26px', height: '26px', border: '1px solid #111', background: '#fff', color: '#111', borderRadius: '4px', cursor: 'pointer', fontWeight: 700 }}>+</button>
                      </div>
                    ))}
                    {candidates.length === 0 && <div style={{ padding: '40px 0', textAlign: 'center', color: '#bbb', fontSize: '13px' }}>등록 가능한 상품이 없습니다.</div>}
                  </div>
                </div>
              </div>
            );
          })()}

          {/* BANNER (5 fixed slots) */}
          {activeTab === 'banner' && (
            <div className="settings-card" style={{ height: 'calc(100vh - 220px)', display: 'flex', flexDirection: 'column', overflow: 'hidden', padding: '2rem' }}>
              <div style={{
                background: '#eff6ff',
                border: bannerNoticeCollapsed ? '1px solid transparent' : '1px solid #bfdbfe',
                borderRadius: '6px',
                padding: bannerNoticeCollapsed ? '0 16px' : '12px 16px',
                marginBottom: bannerNoticeCollapsed ? '0' : '16px',
                fontSize: '13px',
                color: '#1e40af',
                flexShrink: 0,
                maxHeight: bannerNoticeCollapsed ? '0' : '200px',
                opacity: bannerNoticeCollapsed ? 0 : 1,
                overflow: 'hidden',
                transition: 'max-height 0.25s ease, opacity 0.2s ease, padding 0.25s ease, margin 0.25s ease, border-color 0.25s ease'
              }}>
                <strong>파트너 메인 배너 슬롯</strong><br />
                · 메인 페이지 카테고리 배너 5개 슬롯에 각각 다른 사이즈/비율의 이미지를 등록합니다.<br />
                · 파일 포맷: JPG, PNG, WebP (최대 2MB), 자동으로 최적화됩니다.<br />
                · 각 배너의 <strong>수정</strong> 버튼을 눌러 편집하고 <strong>저장</strong>하면 즉시 반영됩니다.
              </div>
              <div ref={bannerScrollRef} style={{ flex: 1, minHeight: 0, overflowY: 'auto' }}>
                {/* 로그인 영상 / 메인 키비주얼 영상 (배너 슬롯 위) */}
                {(() => {
                  const updateMedia = (key, patch) => update({ [key]: { ...(settings[key] || {}), ...patch } });

                  const handleMediaUpload = async (key, file) => {
                    if (!file) return;
                    const isVideo = file.type.startsWith('video/');
                    const isImage = file.type.startsWith('image/');
                    if (!isVideo && !isImage) { showToast('지원하지 않는 형식', '영상 또는 이미지 파일만 업로드 가능합니다.', 'error'); return; }
                    const maxSize = isVideo ? 50 * 1024 * 1024 : 5 * 1024 * 1024;
                    if (file.size > maxSize) {
                      showToast('파일 크기 초과', isVideo ? '영상은 50MB 이하만 업로드 가능합니다. 더 큰 파일은 외부 호스팅 후 URL을 입력해주세요.' : '이미지는 5MB 이하만 업로드 가능합니다.', 'error');
                      return;
                    }

                    // 1. Supabase Storage 업로드 시도 (버킷 'media' 필요)
                    if (SBSync.enabled) {
                      showToast('업로드 중', `${file.name} (${(file.size / (1024 * 1024)).toFixed(2)}MB) 업로드 중...`, 'info');
                      const ext = (file.name.split('.').pop() || 'bin').toLowerCase();
                      const storagePath = `display/${key}-${Date.now()}.${ext}`;
                      const publicUrl = await SBSync.uploadFile('media', storagePath, file);
                      if (publicUrl) {
                        updateMedia(key, {
                          type: isVideo ? 'video' : 'image',
                          url: publicUrl,
                          uploadedData: '',
                          uploadedName: file.name,
                          uploadedSize: file.size
                        });
                        showToast('업로드 완료', `${key === 'heroMedia' ? '메인 키비주얼' : '로그인'} ${isVideo ? '영상' : '이미지'} "${file.name}"이(가) Supabase에 업로드됐어요.`, 'success');
                        return;
                      }
                      // Storage 실패 → 알림 후 base64 fallback (작은 파일만)
                      if (file.size > 2 * 1024 * 1024) {
                        showToast('Storage 업로드 실패', '"media" 버킷이 없거나 권한 문제입니다. Supabase Dashboard → Storage → "media" 버킷(public)을 만들어주세요. (현재는 외부 URL을 직접 입력해 주세요)', 'error');
                        return;
                      }
                      showToast('Storage 사용 불가', '버킷 미설정으로 base64로 저장합니다 (다른 사용자에게 동기화 안 될 수 있음).', 'warning');
                    }

                    // 2. 폴백: base64 (작은 이미지만 / Supabase 미사용 시)
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                      updateMedia(key, {
                        type: isVideo ? 'video' : 'image',
                        uploadedData: ev.target.result,
                        uploadedName: file.name,
                        uploadedSize: file.size,
                        url: ''
                      });
                      showToast('업로드 완료', `${key === 'heroMedia' ? '메인 키비주얼' : '로그인'} ${isVideo ? '영상' : '이미지'} "${file.name}"이(가) 로컬에 저장됐어요.`, 'success');

                          <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>

                                <input type="radio" name={`media-type-${key}`} checked={media.type === 'image'} onChange={() => updateMedia(key, { type: 'image' })} disabled={!isEditingThis} style={{ accentColor: '#111' }} />

                            <label style={{ width: '90px', fontSize: '12px', fontWeight: 600, color: '#111', flexShrink: 0 }}>업로드</label>
                            <input id={fileInputId} type="file" accept="video/*,image/*" style={{ display: 'none' }} onChange={(e) => { handleMediaUpload(key, e.target.files?.[0]); e.target.value = ''; }} />
                            <input
                              type="text"
                              readOnly
                              value={media.uploadedName ? (media.uploadedName + (media.uploadedSize ? ` (${(media.uploadedSize / (1024 * 1024)).toFixed(2)}MB)` : '')) : ''}
                              placeholder="업로드된 파일이 없습니다"
                              className="form-input"
                              style={{ marginBottom: 0, flex: 1, maxWidth: '66.66%', background: '#fafafa', fontSize: '12px', color: '#111', cursor: 'default' }}
                              title={media.uploadedName || ''}

                              <button onClick={() => { if (confirm('등록된 미디어를 삭제하시겠습니까?')) updateMedia(key, { url: '', uploadedData: '', uploadedName: '', uploadedSize: 0 }); }} style={{ padding: '7px 12px', background: 'transparent', color: '#dc2626', border: '1px solid #fecaca', borderRadius: '4px', fontSize: '12px', fontWeight: 500, cursor: 'pointer', whiteSpace: 'nowrap' }}>삭제</button>

                            <>
                              <button onClick={() => { cancelSlotEdit(); showToast('저장 완료', `${label} 설정이 저장됐어요.`, 'success'); }} style={{ padding: '8px 20px', height: '36px', background: '#111', color: '#fff', border: '1px solid #111', borderRadius: '4px', fontSize: '13px', fontWeight: 500, cursor: 'pointer', lineHeight: 1, boxSizing: 'border-box' }}>저장</button>
                              <button onClick={cancelSlotEdit} style={{ padding: '8px 20px', height: '36px', background: '#fff', color: '#111', border: '1px solid #ddd', borderRadius: '4px', fontSize: '13px', fontWeight: 500, cursor: 'pointer', lineHeight: 1, boxSizing: 'border-box' }}>취소</button>
                            </>
                          )}
                        </div>
                      </div>
                    );
                  };

                  return (
                    <>
                      {renderMediaCard('loginMedia', '로그인 영상/이미지', '파트너 로그인 페이지 좌측 배경')}
                      {renderMediaCard('heroMedia', '메인 키비주얼 영상/이미지', '파트너 메인 상단 히어로 영역')}
                    </>
                  );
                })()}

                {BANNER_SLOT_DEFS.map((slot) => {
                  const isEditingThis = editingSlot === slot.key;
                  const isAnotherEditing = editingSlot && editingSlot !== slot.key;
                  const b = savedBannerSlots[slot.key] || {};
                  const handleSlotUpload = (e) => {
                    const file = e.target.files?.[0];
                    if (!file) return;
                    if (file.size > 2 * 1024 * 1024) { showToast('파일 크기 초과', '2MB 이하의 이미지를 업로드해주세요.', 'error'); return; }
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                      const img = new Image();
                      img.onload = () => {
                        const maxW = 2400, maxH = 1500;
                        const ratio = Math.min(maxW / img.width, maxH / img.height, 1);
                        const w = Math.round(img.width * ratio);
                        const h = Math.round(img.height * ratio);
                        const canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h);
                        ctx.drawImage(img, 0, 0, w, h);
                        try { updateBannerSlot(slot.key, { image: canvas.toDataURL('image/jpeg', 0.9) }); }
                        catch (err) { updateBannerSlot(slot.key, { image: ev.target.result }); }
                      };
                      img.onerror = () => updateBannerSlot(slot.key, { image: ev.target.result });
                      img.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                  };
                  return (
                    <div key={slot.key} style={{ display: 'flex', gap: '24px', padding: '20px', border: `1px solid ${isEditingThis ? '#fde68a' : '#eee'}`, background: isEditingThis ? '#fffbeb' : '#fff', borderRadius: '8px', marginBottom: '16px', alignItems: 'flex-start', opacity: isAnotherEditing ? 0.5 : 1, transition: 'all 0.15s' }}>

                      <div style={{ width: '160px', flexShrink: 0 }}>
                        <div style={{ fontSize: '14px', fontWeight: 700, color: '#111', marginBottom: '4px' }}>{slot.label}</div>
                        <div style={{ fontSize: '11px', color: '#666', lineHeight: 1.6, marginBottom: '12px' }}>{slot.tip}</div>
                        <div style={{ fontSize: '11px', color: '#999' }}>권장 사이즈</div>
                        <div style={{ fontSize: '12px', fontWeight: 600, color: '#2563eb' }}>{slot.size}</div>
                        <div style={{ fontSize: '11px', color: '#999', marginTop: '2px' }}>{slot.ratio}</div>
                      </div>
                      {/* 이미지 업로드 영역 - 모든 슬롯이 같은 wrapper 너비(360px)로 정렬 */}
                      <div style={{ width: '360px', flexShrink: 0, display: 'flex', flexDirection: 'column', alignItems: 'flex-start', justifyContent: 'flex-start', gap: '8px' }}>
                        {(() => {
                          const dims = {
                            male: { w: 290, h: 110 },        // ≈ 2.7:1
                            female: { w: 360, h: 60 },        // 6:1
                            kids: { w: 180, h: 60 },          // 3:1
                            accessories: { w: 180, h: 60 },   // 3:1
                            special: { w: 140, h: 110 }       // ≈ 4:3
                          };
                          const d = dims[slot.key];
                          return (
                            <div style={{ width: `${d.w}px`, height: `${d.h}px`, background: '#f5f5f5', borderRadius: '6px', overflow: 'hidden', border: '1px dashed #ddd', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative' }}>
                              {b.image ? (
                                <img src={b.image} alt={slot.label} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                              ) : (
                                <div style={{ textAlign: 'center', color: '#999', fontSize: '11px' }}>
                                  <div style={{ fontSize: '20px', marginBottom: '2px' }}>📷</div>
                                  <div>업로드</div>
                                </div>
                              )}
                            </div>
                          );
                        })()}
                      </div>
                      {/* 메타 정보 */}
                      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: '8px', minWidth: 0, marginLeft: '48px' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                          <label style={{ width: '90px', fontSize: '12px', fontWeight: 600, color: '#111', flexShrink: 0 }}>제목</label>
                          <input type="text" placeholder="예: MALE" value={b.title || ''} onChange={(e) => updateBannerSlot(slot.key, { title: e.target.value })} className="form-input" disabled={!isEditingThis} style={{ marginBottom: 0, flex: 1, maxWidth: '66.66%', background: isEditingThis ? '#fff' : '#fafafa' }} />
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                          <label style={{ width: '90px', fontSize: '12px', fontWeight: 600, color: '#111', flexShrink: 0 }}>서브 텍스트</label>
                          <input type="text" placeholder="예: COLLECTION" value={b.subtitle || ''} onChange={(e) => updateBannerSlot(slot.key, { subtitle: e.target.value })} className="form-input" disabled={!isEditingThis} style={{ marginBottom: 0, flex: 1, maxWidth: '66.66%', background: isEditingThis ? '#fff' : '#fafafa' }} />
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                          <label style={{ width: '90px', fontSize: '12px', fontWeight: 600, color: '#111', flexShrink: 0 }}>링크 URL</label>
                          <input type="text" placeholder="예: /products?gender=Male (선택)" value={b.link || ''} onChange={(e) => updateBannerSlot(slot.key, { link: e.target.value })} className="form-input" disabled={!isEditingThis} style={{ marginBottom: 0, flex: 1, maxWidth: '66.66%', background: isEditingThis ? '#fff' : '#fafafa' }} />
                        </div>
                        {/* 이미지 업로드 — 수정 상태일 때만 링크 URL 입력창 아래에 노출 */}

                            <div style={{ width: '90px', flexShrink: 0 }}></div>
                            <label style={{ cursor: 'pointer', display: 'inline-flex' }}>
                              <input type="file" accept="image/*" onChange={handleSlotUpload} style={{ display: 'none' }} />

                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" /></svg>
                                이미지 업로드
                              </span>
                            </label>
                          </div>
                        )}
                      </div>
                      {/* 액션 버튼 - 카드 우측 끝, 수정 모드에서는 저장 위 / 취소 아래로 세로 배치 (버튼 크기는 수정 버튼과 동일) */}
                      <div style={{ display: 'flex', flexDirection: isEditingThis ? 'column' : 'row', gap: '8px', flexShrink: 0, alignItems: 'flex-end', alignSelf: 'flex-start' }}>

                          </>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* EMAIL TEMPLATES */}
          {activeTab === 'email' && (
            <div className="settings-card" style={{ height: 'calc(100vh - 220px)', display: 'flex', flexDirection: 'column', overflow: 'hidden', padding: '2rem' }}>
              <div style={{
                background: '#eff6ff',
                border: emailNoticeCollapsed ? '1px solid transparent' : '1px solid #bfdbfe',
                borderRadius: '6px',
                padding: emailNoticeCollapsed ? '0 16px' : '12px 16px',
                marginBottom: emailNoticeCollapsed ? '0' : '32px',
                fontSize: '13px',
                color: '#1e40af',
                flexShrink: 0,
                maxHeight: emailNoticeCollapsed ? '0' : '200px',
                opacity: emailNoticeCollapsed ? 0 : 1,
                overflow: 'hidden',
                transition: 'max-height 0.25s ease, opacity 0.2s ease, padding 0.25s ease, margin 0.25s ease, border-color 0.25s ease'
              }}>
                <strong>주문 처리 안내 메일 템플릿</strong><br />
                · 어드민이 주문을 승인/반려하면 등록된 파트너 이메일로 안내 메일이 발송됩니다.<br />
                · 본문에 사용 가능한 변수: <code>{'{{ORDER_ID}}'}</code> (주문번호), <code>{'{{PARTNER_NAME}}'}</code> (파트너 회사명)<br />
                · 주문 정보 카드, 반려 사유 박스, 무신사 로고 헤더는 자동 포함됩니다.
              </div>
              {/* 안내 라벨만 상단 표시 */}
              {emailEditing && (
                <div style={{ marginBottom: '16px', padding: '10px 14px', background: '#fffbeb', border: '1px solid #fde68a', borderRadius: '6px', fontSize: '13px', color: '#92400e', flexShrink: 0 }}>
                  <strong>수정 중</strong> — 변경사항을 저장해야 다음 메일부터 적용됩니다.
                </div>
              )}
              {/* 승인 / 반려 토글 */}
              <div style={{ display: 'flex', gap: '8px', marginBottom: '20px', flexShrink: 0 }}>
                {[
                  { key: 'received', label: '주문 접수 메일', color: '#2563eb', icon: 'inbox' },
                  { key: 'approved', label: '주문 완료 메일', color: '#16a34a', icon: 'check' },
                  { key: 'rejected', label: '주문 반려 메일', color: '#dc2626', icon: 'x' }
                ].map(k => {
                  const isActive = activeEmailKind === k.key;
                  return (
                    <button key={k.key} onClick={() => setActiveEmailKind(k.key)}
                      style={{
                        padding: '10px 20px',
                        background: '#fff',
                        color: isActive ? k.color : '#666',
                        border: `1px solid ${isActive ? k.color : '#ddd'}`,
                        borderRadius: '6px',
                        fontSize: '13px',
                        fontWeight: 600,
                        cursor: 'pointer',
                        display: 'inline-flex',
                        alignItems: 'center',
                        gap: '8px'
                      }}>
                      <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: '18px', height: '18px', color: k.color }}>
                        {k.icon === 'check' ? (
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><polyline points="16 9 11 15 8 12" /></svg>
                        ) : k.icon === 'x' ? (
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><line x1="15" y1="9" x2="9" y2="15" /><line x1="9" y1="9" x2="15" y2="15" /></svg>
                        ) : (
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" /><polyline points="22,6 12,13 2,6" /></svg>
                        )}
                      </span>
                      {k.label}
                    </button>
                  );
                })}
              </div>

        const maxId = partners.reduce((max, p) => {
          const m = (p.partner_id || '').match(/PTR-(\d+)/);
          if (m) { const n = parseInt(m[1], 10); if (n > max) return n; }
          return max;
        }, 0);
        const tempPw = generateTempPassword();
        const partner = {
          partner_id: `PTR-${String(maxId + 1).padStart(3, '0')}`,
          company_name: trimmedName,
          email: trimmedEmail,
          country: trimmedCountry,
          discount_rate: rateInt / 100,
          created_at: new Date().toISOString().split('T')[0],
          temp_password: tempPw,
          password: null,
          password_changed: false,
          invited_at: new Date().toISOString()
        };
        onAddPartner(partner);
        const result = await sendInvitationEmail(partner, tempPw);
        const message = result.sent
          ? `${partner.email}로 초대 메일 발송 완료 (EmailJS).`
          : `${partner.email}로 로그인 정보 미리보기를 띄웠어요. (EmailJS 미설정)`;
        showToast('파트너 등록', message, 'success');
        setShowAddModal(false);
        setNewPartner({ company_name: '', email: '', country: '', discount_rate: '' });
      };

      return (
        <div className="main-content" style={{ maxWidth: '1980px' }}>

            <h1 className="page-title" style={{ marginBottom: 0 }}>파트너 관리</h1>
          </div>

          <div className="filter-bar">
            <div className="filter-item">
              <span className="filter-item-label">검색</span>
              <input type="text" placeholder="파트너명 / 이메일" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} style={{ minWidth: '200px' }} />
            </div>
          </div>

          <div className="table-toolbar" style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '0 2rem', margin: '0 -2rem', fontSize: '13px' }}>
            <span style={{ fontWeight: 600 }}>전체 {filteredPartners.length}개</span>
            <button onClick={() => setShowAddModal(true)} style={{ marginLeft: 'auto', padding: '7px 16px', background: '#111', color: '#fff', border: '1px solid transparent', borderRadius: '4px', fontSize: '12px', fontWeight: 500, cursor: 'pointer', whiteSpace: 'nowrap' }}>+ 파트너 추가</button>
          </div>

          <div className="table-scroll-wrap" style={{ overflowX: 'auto' }}>
            <table className="products-table">
              <thead>
                <tr>
                  <th style={{ width: '48px', textAlign: 'center' }}>NO</th>
                  <th>파트너 ID</th>
                  <th>파트너명</th>
                  <th>국가</th>
                  <th>이메일</th>
                  <th>총 주문 수</th>
                  <th>총 주문 금액</th>
                  <th>할인율 (%)</th>
                  <th>등록일</th>
                  <th>사용</th>
                  <th>수정</th>
                  <th>비밀번호 재설정</th>
                  <th>삭제</th>
                </tr>
              </thead>
              <tbody>
                {filteredPartners.map((partner, idx) => {
                  const partnerOrders = orders.filter(o => o.partner_name === partner.company_name && o.status !== '주문취소');
                  const totalOrderCount = partnerOrders.length;
                  const totalOrderAmount = partnerOrders.reduce((s, o) => s + (o.total_amount || 0), 0);
                  return (
                    <tr key={partner.partner_id}
                      onClick={() => setEditingPartner(partner)}
                      style={{ cursor: 'pointer' }}>
                      <td style={{ textAlign: 'center', color: '#999', fontWeight: 500 }}>{idx + 1}</td>
                      <td>{partner.partner_id}</td>
                      <td>{partner.company_name}</td>
                      <td>{partner.country || <span style={{ color: '#ccc' }}>-</span>}</td>
                      <td>{partner.email}</td>
                      <td style={{ fontWeight: 600 }}>{totalOrderCount.toLocaleString()}건</td>
                      <td style={{ fontWeight: 600 }}>${totalOrderAmount.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
                      <td style={{ fontWeight: 700, color: '#2563eb' }}>{(partner.discount_rate * 100).toFixed(0)}%</td>
                      <td>{partner.created_at}</td>
                      <td onClick={(e) => e.stopPropagation()}>
                        {(() => {

                              <label className="toggle-switch" title="로그인 가능 여부 변경">
                                <input
                                  type="checkbox"
                                  checked={isActive}
                                  onChange={() => onUpdatePartner({ ...partner, is_active: !isActive })}

                      <td onClick={(e) => e.stopPropagation()}>
