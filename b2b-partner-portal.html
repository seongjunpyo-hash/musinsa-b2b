<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSINSA GLOBAL B2B Partner Portal</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <link rel="stylesheet" href="design-system/layer-desktop.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body, #root {
            min-height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Pretendard Variable', Pretendard, system-ui, -apple-system, sans-serif;
            color: var(--color-fg);
            background: var(--color-bg);
            line-height: 1.5;
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            padding: 0;
            background: none;
        }

        input, select, textarea {
            font-family: inherit;
            font-size: inherit;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* LAYOUT */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: 3.5rem;
            background: var(--color-bg);
            border-bottom: 1px solid var(--color-border-low);
            display: flex;
            align-items: center;
            padding: 0 2rem;
            justify-content: space-between;
        }

        .header-spacer {
            height: 3.5rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0;
        }

        .header-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: -0.01em;
            cursor: pointer;
        }

        .logo-small {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--color-fg-low);
        }

        .nav {
            display: flex;
            gap: 2rem;
        }

        .nav-item {
            font-size: 1rem;
            color: var(--color-fg-low);
            position: relative;
            cursor: pointer;
        }

        .nav-item.active {
            color: #000;
            font-weight: 600;
        }

        .cart-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #000;
            color: #fff;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 10px;
            font-weight: 700;
            padding: 0 4px;
            margin-left: 4px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .cart-icon-wrap {
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            color: var(--color-fg);
            transition: color 0.2s;
        }

        .cart-icon-wrap:hover {
            color: var(--color-fg-low);
        }

        .cart-icon-wrap .cart-badge {
            position: absolute;
            top: -6px;
            right: -8px;
            min-width: 16px;
            height: 16px;
            font-size: 9px;
            margin-left: 0;
        }

        .company-info {
            font-size: 0.875rem;
            text-align: right;
        }

        .company-name {
            color: var(--color-fg-low);
            font-weight: 500;
        }

        .logout-btn {
            color: var(--color-fg-low);
            font-size: 0.875rem;
            cursor: pointer;
        }

        /* LOGIN PAGE */
        .login-container {
            display: flex;
            height: 100vh;
        }

        .login-left {
            flex: 0 0 60%;
            background: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .login-left-bg {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .login-left-bg video {
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: translate(-50%, -50%);
            opacity: 0.3;
            filter: grayscale(35%) contrast(88%) brightness(95%);
            pointer-events: none;
        }

        .login-left-overlay {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at center, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.75) 100%),
                linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0) 70%, rgba(0,0,0,0.3) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .login-left > .login-logo,
        .login-left > .login-subtitle {
            position: relative;
            z-index: 2;
        }

        .login-logo {
            font-size: 3.75rem;
            font-weight: 700;
            letter-spacing: 0.3em;
        }

        .login-subtitle {
            font-size: 0.875rem;
            letter-spacing: 0.4em;
            opacity: 0.6;
            margin-top: 1rem;
        }

        .login-right {
            flex: 0 0 40%;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        .lang-selector {
            position: absolute;
            top: 2rem;
            right: 2rem;
            display: flex;
            gap: 0.5rem;
        }

        .lang-btn {
            padding: 6px 10px;
            border: 1px solid var(--color-border);
            background: var(--color-bg);
            font-size: 13px;
            font-weight: var(--btn-font-weight);
            letter-spacing: 0;
            border-radius: var(--btn-radius);
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: var(--color-bg-contrast);
            color: var(--color-fg-on-contrast);
            border-color: var(--color-border-strong);
        }

        .login-form {
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
        }

        .login-header {
            margin-bottom: 3rem;
        }

        .login-label {
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 600;
            color: #000;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--color-border-strong);
            display: block;
            margin-bottom: 1.5rem;
        }

        .login-h2 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .login-subtitle-text {
            font-size: 0.875rem;
            color: var(--color-fg-low);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #000;
            display: block;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--color-border);
            background: var(--color-bg);
            font-size: 14px;
            border-radius: var(--input-radius);
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-border-strong);
        }

        .btn-black {
            width: 100%;
            padding: 12px 16px;
            background: var(--color-bg-contrast);
            color: var(--color-fg-on-contrast);
            font-size: 15px;
            font-weight: var(--btn-font-weight);
            letter-spacing: 0;
            border-radius: var(--btn-radius);
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-black:hover {
            opacity: 0.9;
        }

        .demo-accounts {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--color-divider);
            font-size: 0.75rem;
            color: var(--color-fg-low);
        }

        .demo-accounts-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .demo-email {
            padding: 0.25rem 0;
            color: #000;
            font-family: inherit;
        }

        /* PAGES */
        .page {
            min-height: calc(100vh - 3.5rem);
        }

        /* HOME PAGE */
        .hero-section {
            background: #fff;
            color: #111;
            padding: 6rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: min-height 0.35s cubic-bezier(0.22, 1, 0.36, 1), padding 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            will-change: min-height;
        }

        /* Scroll-reveal: text fades in after auto-scroll completes */
        .hero-section .hero-label,
        .hero-section .hero-title,
        .hero-section .hero-subtitle,
        .hero-section .btn-white {
            opacity: 0;
            transform: translateY(18px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .hero-section.hero-revealed .hero-label,
        .hero-section.hero-revealed .hero-title,
        .hero-section.hero-revealed .hero-subtitle,
        .hero-section.hero-revealed .btn-white {
            opacity: 1;
            transform: translateY(0);
        }

        .hero-section.hero-revealed .hero-label { transition-delay: 0s; }
        .hero-section.hero-revealed .hero-title { transition-delay: 0.12s; }
        .hero-section.hero-revealed .hero-subtitle { transition-delay: 0.24s; }
        .hero-section.hero-revealed .btn-white { transition-delay: 0.36s; }

        .hero-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .hero-bg video {
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            width: 130%;
            height: 130%;
            object-fit: cover;
            transform: translate(-50%, -50%);
            opacity: 1;
            filter: saturate(105%) contrast(100%) brightness(105%);
            pointer-events: none;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: transparent;
            z-index: 1;
            pointer-events: none;
        }

        .hero-section > .hero-label,
        .hero-section > .hero-title,
        .hero-section > .hero-subtitle,
        .hero-section > .btn-white {
            position: relative;
            z-index: 2;
        }

        .hero-label {
            font-size: 0.9375rem;
            letter-spacing: 0.18em;
            opacity: 0.7;
            margin-bottom: 1.75rem;
        }

        .hero-title {
            font-size: 5.5rem;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.01em;
            margin-bottom: 1.75rem;
        }

        .hero-subtitle {
            font-size: 1.125rem;
            opacity: 0.75;
            margin-bottom: 2.75rem;
        }

        @media (max-width: 1024px) {
            .hero-title { font-size: 4rem; }
            .hero-subtitle { font-size: 1rem; }
        }

        @media (max-width: 768px) {
            .hero-title { font-size: 3rem; }
            .hero-label { font-size: 0.8125rem; }
            .hero-subtitle { font-size: 0.9375rem; }
        }

        .btn-white {
            background: #111;
            color: #fff;
            padding: 18px 40px;
            font-size: 17px;
            font-weight: var(--btn-font-weight);
            letter-spacing: 0;
            border-radius: var(--btn-radius);
            cursor: pointer;
            display: inline-block;
        }

        .btn-white:hover {
            opacity: 0.9;
        }

        .collections-section {
            padding: 3.5rem 1.5rem;
            max-width: 2200px;
            margin: 0 auto;
        }

        .hero-section + .collections-section {
            margin-top: 40px;
        }

        .collections-section:last-child {
            padding-bottom: 6rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .section-subtitle {
            font-size: 0.75rem;
            color: var(--color-fg-low);
            margin-bottom: 2rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5rem;
        }

        .product-card {
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .product-card:hover {
            opacity: 0.8;
        }

        .product-image-container {
            position: relative;
            aspect-ratio: 3/4;
            background: var(--color-bg-low);
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-badges {
            display: flex;
            gap: 6px;
            margin-bottom: 4px;
        }

        .product-badge {
            display: inline-block;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: var(--btn-font-weight);
            letter-spacing: 0;
            text-transform: uppercase;
            border-radius: 2px;
        }

        .badge-season {
            background: var(--color-bg-contrast);
            color: var(--color-fg-on-contrast);
        }

        .badge-hero {
            background: #fff;
            color: var(--color-fg);
            border: 1px solid var(--color-border-strong);
        }

        .product-info {
            font-size: 0.875rem;
        }

        .product-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .product-meta {
            color: var(--color-fg-low);
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .product-price {
            font-weight: 700;
            font-size: 1.25rem;
        }

        .product-price-retail {
            color: var(--color-fg-low);
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }

        /* PRODUCTS PAGE */
        .summary-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 90;
            background: #000;
            color: #fff;
            padding: 0.75rem 1.5rem 1.25rem;
            font-size: 0.875rem;
        }

        .summary-bar-inner {
            max-width: 2200px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .summary-stats {
            display: flex;
            gap: 1.25rem;
        }

        .stat {
            display: flex;
            gap: 0.35rem;
        }

        .stat-label {
            color: var(--color-fg-lower);
        }

        .btn-outline-white {
            padding: 8px 12px;
            border: 1px solid #fff;
            background: transparent;
            color: #fff;
            font-size: 14px;
            font-weight: var(--btn-font-weight);
            letter-spacing: 0;
            text-transform: uppercase;
            border-radius: var(--btn-radius);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-outline-white:hover {
            background: #fff;
            color: #000;
        }

        .filters-sticky {
            position: sticky;
            top: 3.5rem;
            z-index: 50;
            background: var(--color-bg);
        }

        .filters-row {
            max-width: 2200px;
            margin: 0 auto;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.625rem;
        }

        .filter-divider {
            width: 1px;
            height: 20px;
            background: var(--color-divider);
            flex-shrink: 0;
        }

        .search-toggle {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
            border-radius: 4px;
            transition: background 0.15s;
            flex-shrink: 0;
        }

        .search-toggle:hover {
            background: var(--color-bg-low);
        }

        .search-input-wrapper {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .search-input {
            padding: 7px 12px;
            border: 1px solid var(--color-border);
            background: var(--color-bg);
            font-size: 13px;
            width: 200px;
            border-radius: var(--input-radius);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--color-border-strong);
        }

        .category-buttons {
            display: flex;
            gap: 0.375rem;
            flex-wrap: nowrap;
        }

        .category-btn {
            padding: 5px 12px;
            border: 1px solid var(--color-border);
            background: var(--color-bg);
            font-size: 12px;
            font-weight: var(--btn-font-weight);
            letter-spacing: 0.02em;
            text-transform: uppercase;
            border-radius: var(--btn-radius);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .category-btn:hover {
            border-color: var(--color-border-strong);
        }

        .category-btn.active {
            background: var(--color-bg-contrast);
            color: var(--color-fg-on-contrast);
            border-color: var(--color-bg-contrast);
        }

        .filter-select {
            appearance: none;
            -webkit-appearance: none;
            padding: 5px 28px 5px 10px;
            border: 1px solid var(--color-border);
            background: var(--color-bg);
            font-size: 12px;
            font-weight: var(--btn-font-weight);
            letter-spacing: 0.02em;
            border-radius: var(--btn-radius);
            cursor: pointer;
            background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23666' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 10px center;
            transition: border-color 0.15s;
        }

        .filter-select:hover {
            border-color: var(--color-border-strong);
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--color-border-strong);
        }

        .filter-select.active {
            background: var(--color-bg-contrast) url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23ffffff' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 10px center !important;
            color: var(--color-fg-on-contrast) !important;
            border-color: var(--color-bg-contrast) !important;
        }

        .filter-select.active:hover {
            border-color: var(--color-bg-contrast) !important;
        }

        .cat-multi-select {
            position: relative;
        }

        .cat-multi-dropdown-backdrop {
            display: none;
        }

        .products-title-row h2 {
            margin: 0;
        }

        .products-title-row {
            display: block;
        }

        .mobile-search-row {
            display: none;
        }

        .search-toggle-mobile {
            display: none;
        }

        .cat-multi-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border: 1px solid var(--color-border);
            border-radius: var(--btn-radius);
            background: var(--color-bg);
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            min-height: 34px;
        }

        .cat-multi-btn:hover { border-color: var(--color-border-strong); }

        .cat-multi-btn .arrow {
            font-size: 10px;
            opacity: 0.5;
        }

        .cat-multi-dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            min-width: 200px;
            background: #fff;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            z-index: 100;
            padding: 8px 0;
            max-height: 320px;
            overflow-y: auto;
        }

        .cat-multi-group-label {
            padding: 6px 14px 2px;
            font-size: 11px;
            font-weight: 700;
            color: var(--color-fg-low);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .cat-multi-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.1s;
        }

        .cat-multi-option:hover { background: var(--color-bg-low); }

        .cat-multi-clear {
            display: flex;
            align-items: center;
            padding: 6px 14px;
            font-size: 12px;
            color: var(--color-fg-low);
            cursor: pointer;
            transition: background 0.1s, color 0.1s;
        }

        .cat-multi-clear:hover {
            background: var(--color-bg-low);
            color: var(--color-fg);
        }

        .cat-multi-reset {
            width: 20px;
            height: 20px;
            padding: 0;
            border: none;
            background: transparent;
            color: var(--color-fg-low);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: background 0.1s, color 0.1s;
        }

        .cat-multi-reset:hover {
            background: var(--color-border);
            color: var(--color-fg);
        }

        .cat-multi-check {
            width: 16px;
            height: 16px;
            border: 1.5px solid var(--color-border-strong);
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 11px;
        }

        .cat-multi-check.checked {
            background: #000;
            border-color: #000;
            color: #fff;
        }

        .cat-multi-divider {
            height: 1px;
            background: var(--color-border);
            margin: 4px 0;
        }

        .cat-multi-tags {
            display: flex;
            gap: 3px;
            flex-wrap: wrap;
        }

        .cat-multi-tag {
            background: #000;
            color: #fff;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            line-height: 1;
        }

        .filter-reset {
            background: none;
            border: none;
            font-size: 12px;
            color: var(--color-fg-low);
            cursor: pointer;
            padding: 5px 8px;
            text-decoration: underline;
            text-underline-offset: 3px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .filter-reset:hover {
            color: var(--color-fg);
        }

        .filters-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 0.625rem;
        }

        .products-section {
            max-width: 2200px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
        }

        .product-qty-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 0.5rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* MODAL */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--color-bg);
            max-width: 980px;
            width: 100%;
            max-height: 90vh;
            overflow: hidden;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 1rem 2rem 0.25rem;
            border-bottom: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modal-close {
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--color-fg-low);
            transition: color 0.2s;
            background: none;
            border: none;
            padding: 0;
        }

        .modal-close:hover {
            color: #000;
        }

        .modal-body {
            padding: 1rem 2rem 2rem;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }

        .product-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .detail-images {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .detail-main-image {
            position: relative;
            aspect-ratio: 3/4;
            background: var(--color-bg-low);
            overflow: hidden;
        }

        .detail-main-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detail-image-badges {
            position: absolute;
            top: 12px;
            left: 12px;
            display: flex;
            gap: 6px;
            z-index: 2;
        }

        .img-zoom-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            background: rgba(0,0,0,0.55);
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }

        .img-zoom-btn:hover {
            background: rgba(0,0,0,0.8);
        }

        .img-fullscreen-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0,0,0,0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }

        .img-fullscreen-overlay img {
            max-width: 95vw;
            max-height: 95vh;
            object-fit: contain;
        }

        .img-fullscreen-close {
            position: absolute;
            top: 20px;
            right: 24px;
            background: none;
            border: none;
            color: #fff;
            font-size: 32px;
            cursor: pointer;
            line-height: 1;
            z-index: 2;
        }

        .img-fullscreen-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            font-size: 44px;
            font-weight: 300;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.2s;
            z-index: 2;
            padding-bottom: 4px;
        }

        .img-fullscreen-nav:hover {
            background: rgba(255,255,255,0.4);
            transform: translateY(-50%) scale(1.05);
        }

        .img-fullscreen-nav.prev { left: 32px; }
        .img-fullscreen-nav.next { right: 32px; }

        .img-fullscreen-counter {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            z-index: 2;
        }

        .detail-thumbnails {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0.5rem;
        }

        .detail-thumbnail {
            aspect-ratio: 3/4;
            background: var(--color-bg-low);
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--color-border);
            transition: all 0.2s;
        }

        .detail-thumbnail:hover {
            border-color: var(--color-fg-low);
        }

        .detail-thumbnail.active {
            border-color: #000;
        }

        .detail-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detail-info {
            display: flex;
            flex-direction: column;
        }

        .detail-field {
            margin-bottom: 0;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--color-divider);
        }

        .detail-field:last-child {
            border-bottom: none;
        }

        .detail-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        .detail-row .detail-field {
            border-bottom: 1px solid var(--color-divider);
        }

        /* Color selection summary tags */
        .color-selection-tags {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .color-tag {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            padding: 0.75rem 2.25rem 0.75rem 1rem;
            background: var(--color-bg-low);
            border-radius: var(--radius-sm);
        }

        .color-tag-name {
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            color: var(--color-fg-low);
            text-transform: uppercase;
        }

        .color-tag-sizes {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.25rem 0;
            font-size: 1rem;
            color: var(--color-fg);
            line-height: 1.4;
        }

        .size-qty-pair {
            display: inline-flex;
            align-items: baseline;
            gap: 0.35rem;
            padding: 0 0.7rem;
            border-right: 1px solid rgba(0, 0, 0, 0.18);
        }

        .size-qty-pair:first-child {
            padding-left: 0;
        }

        .size-qty-pair:last-child {
            border-right: none;
            padding-right: 0;
        }

        /* Bulk size quantity helper bar */
        .bulk-size-helper {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 0.75rem;
            background: var(--color-bg-low);
            border-radius: var(--radius-sm);
            margin-bottom: 0.875rem;
            font-size: 0.8125rem;
            white-space: nowrap;
        }

        .bulk-size-helper > * {
            flex-shrink: 0;
        }

        .bulk-size-helper select {
            min-width: 0;
        }

        .bulk-size-helper-label {
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--color-fg-low);
        }

        .bulk-size-helper-group {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .bulk-size-helper-divider {
            width: 1px;
            height: 18px;
            background: rgba(0, 0, 0, 0.18);
        }

        .bulk-size-helper input[type="number"] {
            width: 64px;
            height: 32px;
            padding: 0 8px;
            font-size: 0.875rem;
            font-weight: 600;
            border: 1px solid var(--color-divider);
            border-radius: var(--radius-sm);
            background: var(--color-bg);
            color: var(--color-fg);
            text-align: center;
            -moz-appearance: textfield;
        }

        .bulk-size-helper input[type="number"]::-webkit-outer-spin-button,
        .bulk-size-helper input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .bulk-size-helper select {
            height: 32px;
            padding: 0 26px 0 10px;
            font-size: 0.8125rem;
            border: 1px solid var(--color-divider);
            border-radius: var(--radius-sm);
            background: var(--color-bg);
            color: var(--color-fg);
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23666' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 10px center;
        }

        .bulk-size-helper-btn {
            height: 32px;
            padding: 0 12px;
            font-size: 0.8125rem;
            font-weight: 600;
            border: 1px solid var(--color-fg);
            border-radius: var(--radius-sm);
            background: var(--color-fg);
            color: var(--color-bg);
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .bulk-size-helper-btn:hover {
            opacity: 0.85;
        }

        .bulk-size-helper-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .size-qty-pair .size-label {
            font-weight: 600;
            color: var(--color-fg-low);
        }

        .size-qty-pair .size-qty {
            font-weight: 600;
            color: var(--color-fg);
            font-variant-numeric: tabular-nums;
        }

        .color-tag-remove {
            position: absolute;
            top: 50%;
            right: 0.75rem;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 1.125rem;
            color: var(--color-fg-lower);
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
        }

        .color-tag-remove:hover {
            color: var(--color-fg);
        }

        /* Modal bottom fixed area */
        .modal-bottom {
            flex-shrink: 0;
            border-top: 1px solid var(--color-divider);
            background: var(--color-bg);
        }

        .modal-summary {
            padding: 1rem 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .modal-summary-item .detail-label {
            margin-bottom: 0.25rem;
        }

        .modal-summary-item .detail-price {
            font-size: 1.125rem;
        }

        .modal-action {
            padding: 0 2rem 1.5rem;
        }

        .modal-action .btn-black {
            width: 100%;
        }

        .detail-label {
            font-size: 0.65rem;
            color: var(--color-fg-low);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
            font-weight: 600;
        }

        .detail-value {
            font-weight: 500;
            font-size: 0.95rem;
        }

        .detail-price {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .sizes-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .size-input-wrap {
            position: relative;
            width: 100%;
        }

        .size-input {
            padding: 10px 12px;
            border: 1px solid var(--color-border);
            background: var(--color-bg-low);
            text-align: left;
            font-weight: var(--btn-font-weight);
            font-size: 14px;
            width: 100%;
            height: 44px;
            border-radius: var(--input-radius);
            -moz-appearance: textfield;
        }

        .size-input::-webkit-inner-spin-button,
        .size-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .size-input:focus {
            outline: none;
            border-color: var(--color-border-strong);
        }

        .size-spin {
            position: absolute;
            right: 1px;
            width: 28%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            border-left: 1px solid var(--color-border);
            background: var(--color-bg);
            color: var(--color-fg-low);
            font-size: 8px;
            transition: background 0.1s, color 0.1s;
        }

        .size-spin:hover {
            background: var(--color-bg-low);
            color: var(--color-fg);
        }

        .size-spin:active {
            background: var(--color-border);
        }

        .size-spin-up {
            top: 1px;
            height: 50%;
            border-radius: 0 var(--input-radius) 0 0;
            border-bottom: 1px solid var(--color-border);
        }

        .size-spin-down {
            bottom: 1px;
            height: 50%;
            border-radius: 0 0 var(--input-radius) 0;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
            border-top: 1px solid var(--color-divider);
            padding-top: 1rem;
            align-items: center;
            font-size: 0.8125rem;
        }

        .modal-footer .stat-label {
            font-size: 0.75rem;
            color: var(--color-fg-low);
        }

        .modal-footer .stat span:not(.stat-label) {
            font-size: 1rem;
            font-weight: 700;
        }

        .modal-footer-right {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-black-sm {
            padding: 10px 16px;
            background: var(--color-bg-contrast);
            color: var(--color-fg-on-contrast);
            font-size: 14px;
            font-weight: var(--btn-font-weight);
            letter-spacing: 0;
            text-transform: uppercase;
            border-radius: var(--btn-radius);
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-black-sm:hover {
            opacity: 0.9;
        }

        /* ORDER DETAIL MODAL */
        .modal-body .order-detail-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding: 1.5rem;
            background: var(--color-bg-low);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
        }

        .modal-body .order-detail-info .order-info-label {
            color: var(--color-fg-low);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
            font-weight: 400;
        }

        .modal-body .order-detail-info .order-info-value {
            font-weight: 600;
            font-size: 0.875rem;
        }

        .order-items-table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.875rem;
        }

        .order-items-table th {
            text-align: left;
            padding: 1rem;
            box-shadow: inset 0 -2px 0 var(--color-border-strong);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 13px;
        }

        .order-items-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--color-divider);
            font-size: 14px;
        }

        .order-items-table tfoot td {
            font-weight: 700;
            box-shadow: inset 0 2px 0 var(--color-border-strong);
            border-bottom: none;
            background: var(--color-bg);
            font-size: 16px;
            padding: 1.25rem 1rem;
        }

        .order-modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: flex-end;
        }

        /* Order detail modal: only the items table scrolls */
        .modal-content .order-detail-modal-body {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 1rem 2rem 1.5rem;
        }

        .order-detail-modal-body > .order-detail-info,
        .order-detail-modal-body > .rejection-reason,
        .order-detail-modal-body > .order-modal-actions {
            flex-shrink: 0;
        }

        .order-detail-modal-body .order-items-table-wrap {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            margin: 1rem 0;
            border-top: 1px solid var(--color-divider);
            border-bottom: 1px solid var(--color-divider);
        }

        .order-detail-modal-body .order-items-table {
            margin: 0;
        }

        .order-detail-modal-body .order-items-table thead {
            position: sticky;
            top: 0;
            background: var(--color-bg);
            z-index: 2;
        }

        .order-detail-modal-body .order-items-table thead th {
            background: var(--color-bg);
        }

        .order-detail-modal-body .order-items-table tfoot {
            position: sticky;
            bottom: 0;
            background: var(--color-bg);
            z-index: 2;
        }

        .order-detail-modal-body .order-items-table tfoot td {
            background: var(--color-bg);
        }

        .order-detail-modal-body .order-items-table tbody tr:last-child td {
            border-bottom: none;
        }

        /* COLOR SWATCHES */
        .color-swatches {
            position: relative;
        }

        .color-swatches-row {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .color-swatch {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid var(--color-border);
            outline: 2px solid transparent;
            outline-offset: 1px;
            transition: all 0.2s;
        }

        .color-swatch:hover {
            border-color: var(--color-fg-low);
        }

        .color-swatch.active {
            border-color: var(--color-border);
            outline-color: var(--color-border-strong);
        }

        .color-swatch-label {
            font-size: 0.65rem;
            font-weight: 500;
            color: var(--color-fg-low);
            position: absolute;
            top: 100%;
            margin-top: 4px;
            white-space: nowrap;
        }

        /* CART PAGE */
        .empty-cart {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 400px;
            text-align: center;
            color: var(--color-fg-low);
        }

        .empty-cart-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .empty-cart-text {
            font-size: 1.125rem;
            margin-bottom: 0.5rem;
        }

        .cart-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5rem;
        }

        .cart-item-card {
            position: relative;
        }

        .cart-item-card .product-image-container {
            aspect-ratio: 1 / 1;
            position: relative;
            overflow: hidden;
            background: var(--color-bg-low);
        }

        .cart-item-card .product-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cart-item-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .cart-item-card:hover .cart-item-overlay {
            opacity: 1;
        }

        .edit-qty-btn {
            background: var(--color-bg);
            color: var(--color-fg);
            padding: 8px 16px;
            font-size: 13px;
            font-weight: var(--btn-font-weight);
            letter-spacing: 0;
            text-transform: uppercase;
            border-radius: var(--btn-radius);
            cursor: pointer;
        }

        .remove-btn {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            width: 28px;
            height: 28px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: var(--btn-font-weight);
            border: none;
            border-radius: var(--radius-sm);
        }

        .cart-item-info {
            font-size: 0.875rem;
            margin-top: 1rem;
        }

        .size-breakdown {
            font-size: 0.75rem;
            color: var(--color-fg-low);
            margin: 0.5rem 0;
        }

        .confirm-view {
            padding: 1.5rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 3.5rem);
        }

        .confirm-view > h2 {
            flex-shrink: 0;
        }

        .confirm-table-scroll {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            margin-bottom: 0;
            border-bottom: none;
        }

        .confirm-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        .confirm-table thead {
            position: sticky;
            top: 0;
            background: var(--color-bg);
            z-index: 1;
        }

        .confirm-table thead::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 2px;
            background: var(--color-border-strong);
        }

        .confirm-table th {
            text-align: left;
            padding: 1rem;
            border-bottom: 2px solid var(--color-border-strong);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 13px;
        }

        .confirm-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--color-divider);
            font-size: 14px;
        }

        .confirm-table tr:last-child td {
            border-bottom: 1px solid var(--color-divider);
        }

        .product-cell {
