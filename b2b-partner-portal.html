<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSINSA GLOBAL B2B Partner Portal</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <link rel="stylesheet" href="design-system/layer-desktop.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body, #root {
            min-height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Pretendard Variable', Pretendard, system-ui, -apple-system, sans-serif;
            color: var(--color-fg);
            background: var(--color-bg);
            line-height: 1.5;
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            padding: 0;
            background: none;
        }

        input, select, textarea {
            font-family: inherit;
            font-size: inherit;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* LAYOUT */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: 3.5rem;
            background: var(--color-bg);
            border-bottom: 1px solid var(--color-border-low);
            display: flex;
            align-items: center;
            padding: 0 2rem;
            justify-content: space-between;
        }

        .header-spacer {
            height: 3.5rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0;
        }

        .header-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: -0.01em;
            cursor: pointer;
        }

        .logo-small {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--color-fg-low);
        }

        .nav {
            display: flex;
            gap: 2rem;
        }

        .nav-item {
            font-size: 1rem;
            color: var(--color-fg-low);
            position: relative;
            cursor: pointer;
        }

        .nav-item.active {
            color: #000;
            font-weight: 600;
        }

        .cart-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #000;
            color: #fff;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 10px;
            font-weight: 700;
            padding: 0 4px;
            margin-left: 4px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .cart-icon-wrap {
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            color: var(--color-fg);
            transition: color 0.2s;
        }

        .cart-icon-wrap:hover {
            color: var(--color-fg-low);
        }

        .cart-icon-wrap .cart-badge {
            position: absolute;
            top: -6px;
            right: -8px;
            min-width: 16px;
            height: 16px;
            font-size: 9px;
            margin-left: 0;
        }

        .company-info {
            font-size: 0.875rem;
            text-align: right;
        }

        .company-name {
            color: var(--color-fg-low);
            font-weight: 500;
        }

        .logout-btn {
            color: var(--color-fg-low);
            font-size: 0.875rem;
            cursor: pointer;
        }

        /* LOGIN PAGE */
        .login-container {
            display: flex;
            height: 100vh;
        }

        .login-left {
            flex: 0 0 60%;
            background: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        .login-logo {
            font-size: 3.75rem;
            font-weight: 700;
            letter-spacing: 0.3em;
        }

        .login-subtitle {
            font-size: 0.875rem;
            letter-spacing: 0.4em;
            opacity: 0.6;
            margin-top: 1rem;
        }

        .login-right {
            flex: 0 0 40%;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        .lang-selector {
            position: absolute;
            top: 2rem;
            right: 2rem;
            display: flex;
            gap: 0.5rem;
        }

        .lang-btn {
            padding: 6px 10px;
            border: 1px solid var(--color-border);
            background: var(--color-bg);
            font-size: 13px;
            font-weight: var(--btn-font-weight);
            letter-spacing: 0;
            border-radius: var(--btn-radius);
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: var(--color-bg-contrast);
            color: var(--color-fg-on-contrast);
            border-color: var(--color-border-strong);
        }

        .login-form {
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
        }

        .login-header {
            margin-bottom: 3rem;
        }

        .login-label {
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 600;
            color: #000;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--color-border-strong);
            display: block;
            margin-bottom: 1.5rem;
        }

        .login-h2 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .login-subtitle-text {
            font-size: 0.875rem;
            color: var(--color-fg-low);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #000;
            display: block;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--color-border);
            background: var(--color-bg);
            font-size: 14px;
            border-radius: var(--input-radius);
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-border-strong);
        }

        .btn-black {
            width: 100%;
            padding: 12px 16px;
            background: var(--color-bg-contrast);
            color: var(--color-fg-on-contrast);
            font-size: 15px;
            font-weight: var(--btn-font-weight);
            letter-spacing: 0;
            border-radius: var(--btn-radius);
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-black:hover {
            opacity: 0.9;
        }

        .demo-accounts {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--color-divider);
            font-size: 0.75rem;
            color: var(--color-fg-low);
        }

        .demo-accounts-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .demo-email {
            padding: 0.25rem 0;
            color: #000;
            font-family: inherit;
        }

        /* PAGES */
        .page {
            min-height: calc(100vh - 3.5rem);
        }

        /* HOME PAGE */
        .hero-section {
            background: #000;
            color: #fff;
            padding: 6rem 2rem;
            text-align: center;
        }

        .hero-label {
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            opacity: 0.6;
            margin-bottom: 1rem;
        }

        .hero-title {
            font-size: 3.75rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1.5rem;
        }

        .hero-subtitle {
            font-size: 0.875rem;
            opacity: 0.7;
            margin-bottom: 2rem;
        }

        .btn-white {
            background: var(--color-bg);
            color: var(--color-fg);
            padding: 12px 20px;
            font-size: 15px;
            font-weight: var(--btn-font-weight);
            letter-spacing: 0;
            border-radius: var(--btn-radius);
            cursor: pointer;
            display: inline-block;
        }

        .btn-white:hover {
            opacity: 0.9;
        }

        .collections-section {
            padding: 3.5rem 1.5rem;
            max-width: 2200px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .section-subtitle {
            font-size: 0.75rem;
            color: var(--color-fg-low);
            margin-bottom: 2rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5rem;
        }

        .product-card {
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .product-card:hover {
            opacity: 0.8;
        }

        .product-image-container {
            position: relative;
            aspect-ratio: 3/4;
            background: var(--color-bg-low);
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-badges {
            display: flex;
            gap: 6px;
            margin-bottom: 4px;
        }

        .product-badge {
            display: inline-block;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: var(--btn-font-weight);
            letter-spacing: 0;
            text-transform: uppercase;
            border-radius: 2px;
        }

        .badge-season {
            background: var(--color-bg-contrast);
            color: var(--color-fg-on-contrast);
        }

        .badge-hero {
            background: var(--color-bg-low);
            color: var(--color-fg);
            border: 1px solid var(--color-border-strong);
        }

        .product-info {
            font-size: 0.875rem;
        }

        .product-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .product-meta {
            color: var(--color-fg-low);
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .product-price {
            font-weight: 700;
        }

        .product-price-retail {
            color: var(--color-fg-low);
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }

        /* PRODUCTS PAGE */
        .summary-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 90;
            background: #000;
            color: #fff;
            padding: 0.75rem 1.5rem;
            font-size: 0.875rem;
        }

        .summary-bar-inner {
            max-width: 2200px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .summary-stats {
            display: flex;
            gap: 2rem;
        }

        .stat {
            display: flex;
            gap: 0.5rem;
        }

        .stat-label {
            color: var(--color-fg-lower);
        }

        .btn-outline-white {
            padding: 8px 12px;
            border: 1px solid #fff;
            background: transparent;
            color: #fff;
            font-size: 14px;
            font-weight: var(--btn-font-weight);
            letter-spacing: 0;
            text-transform: uppercase;
            border-radius: var(--btn-radius);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-outline-white:hover {
            background: #fff;
            color: #000;
        }

        .filters-sticky {
            position: sticky;
            top: 3.5rem;
            z-index: 50;
            background: var(--color-bg);
        }

        .filters-row {
            max-width: 2200px;
            margin: 0 auto;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.625rem;
        }

        .filter-divider {
            width: 1px;
            height: 20px;
            background: var(--color-divider);
            flex-shrink: 0;
        }

        .search-toggle {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
            border-radius: 4px;
            transition: background 0.15s;
            flex-shrink: 0;
        }

        .search-toggle:hover {
            background: var(--color-bg-low);
        }

        .search-input-wrapper {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .search-input {
            padding: 7px 12px;
            border: 1px solid var(--color-border);
            background: var(--color-bg);
            font-size: 13px;
            width: 200px;
            border-radius: var(--input-radius);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--color-border-strong);
        }

        .category-buttons {
            display: flex;
            gap: 0.375rem;
            flex-wrap: nowrap;
        }

        .category-btn {
            padding: 5px 12px;
            border: 1px solid var(--color-border);
            background: var(--color-bg);
            font-size: 12px;
            font-weight: var(--btn-font-weight);
            letter-spacing: 0.02em;
            text-transform: uppercase;
            border-radius: var(--btn-radius);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .category-btn:hover {
            border-color: var(--color-border-strong);
        }

        .category-btn.active {
            background: var(--color-bg-contrast);
            color: var(--color-fg-on-contrast);
            border-color: var(--color-bg-contrast);
        }

        .filter-select {
            appearance: none;
            -webkit-appearance: none;
            padding: 5px 28px 5px 10px;
            border: 1px solid var(--color-border);
            background: var(--color-bg);
            font-size: 12px;
            font-weight: var(--btn-font-weight);
            letter-spacing: 0.02em;
            border-radius: var(--btn-radius);
            cursor: pointer;
            background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23666' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 10px center;
            transition: border-color 0.15s;
        }

        .filter-select:hover {
            border-color: var(--color-border-strong);
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--color-border-strong);
        }

        .filter-reset {
            background: none;
            border: none;
            font-size: 12px;
            color: var(--color-fg-low);
            cursor: pointer;
            padding: 5px 8px;
            text-decoration: underline;
            text-underline-offset: 3px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .filter-reset:hover {
            color: var(--color-fg);
        }

        .filters-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 0.625rem;
        }

        .products-section {
            max-width: 2200px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
        }

        .product-qty-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 0.5rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* MODAL */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--color-bg);
            max-width: 980px;
            width: 100%;
            max-height: 90vh;
            overflow: hidden;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 1rem 2rem 0.25rem;
            border-bottom: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .modal-close {
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--color-fg-low);
            transition: color 0.2s;
            background: none;
            border: none;
            padding: 0;
        }

        .modal-close:hover {
            color: #000;
        }

        .modal-body {
            padding: 1rem 2rem 2rem;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }

        .product-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .detail-images {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .detail-main-image {
            position: relative;
            aspect-ratio: 3/4;
            background: var(--color-bg-low);
            overflow: hidden;
        }

        .detail-main-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .img-zoom-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            background: rgba(0,0,0,0.55);
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }

        .img-zoom-btn:hover {
            background: rgba(0,0,0,0.8);
        }

        .img-fullscreen-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0,0,0,0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }

        .img-fullscreen-overlay img {
            max-width: 95vw;
            max-height: 95vh;
            object-fit: contain;
        }

        .img-fullscreen-close {
            position: absolute;
            top: 20px;
            right: 24px;
            background: none;
            border: none;
            color: #fff;
            font-size: 32px;
            cursor: pointer;
            line-height: 1;
        }

        .detail-thumbnails {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0.5rem;
        }

        .detail-thumbnail {
            aspect-ratio: 3/4;
            background: var(--color-bg-low);
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--color-border);
            transition: all 0.2s;
        }

        .detail-thumbnail:hover {
            border-color: var(--color-fg-low);
        }

        .detail-thumbnail.active {
            border-color: #000;
        }

        .detail-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detail-info {
            display: flex;
            flex-direction: column;
        }

        .detail-field {
            margin-bottom: 0;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--color-divider);
        }

        .detail-field:last-child {
            border-bottom: none;
        }

        .detail-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        .detail-row .detail-field {
            border-bottom: 1px solid var(--color-divider);
        }

        /* Color selection summary tags */
        .color-selection-tags {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .color-tag {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: var(--color-bg-low);
            border-radius: var(--radius-sm);
            font-size: 0.8125rem;
        }

        .color-tag-name {
            font-weight: 600;
            min-width: 40px;
        }

        .color-tag-sizes {
            flex: 1;
            color: var(--color-fg);
        }

        .color-tag-remove {
            background: none;
            border: none;
            font-size: 1.125rem;
            color: var(--color-fg-lower);
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
        }

        .color-tag-remove:hover {
            color: var(--color-fg);
        }

        /* Modal bottom fixed area */
        .modal-bottom {
            flex-shrink: 0;
            border-top: 1px solid var(--color-divider);
            background: var(--color-bg);
        }

        .modal-summary {
            padding: 1rem 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .modal-summary-item .detail-label {
            margin-bottom: 0.25rem;
        }

        .modal-summary-item .detail-price {
            font-size: 1.125rem;
        }

        .modal-action {
            padding: 0 2rem 1.5rem;
        }

        .modal-action .btn-black {
            width: 100%;
        }

        .detail-label {
            font-size: 0.65rem;
            color: var(--color-fg-low);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
            font-weight: 600;
        }

        .detail-value {
            font-weight: 500;
            font-size: 0.95rem;
        }

        .detail-price {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .sizes-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .size-input-wrap {
            position: relative;
            width: 100%;
        }

        .size-input {
            padding: 10px 12px;
            border: 1px solid var(--color-border);
            background: var(--color-bg-low);
            text-align: left;
            font-weight: var(--btn-font-weight);
            font-size: 14px;
            width: 100%;
            height: 44px;
            border-radius: var(--input-radius);
            -moz-appearance: textfield;
        }

        .size-input::-webkit-inner-spin-button,
        .size-input::-webkit-outer-spin-button {
            -webkit-appearance: none;

                { product: PRODUCTS[2], color: 'NAVY', size: 'M', qty: 100, unit_price: 32.69, subtotal: 3269.00 },

        // HELPERS
        const calculateWholesalePrice = (retailKrw) => {
            return Math.floor((retailKrw / EXCHANGE_RATE) * (1 - CURRENT_PARTNER.discount_rate) * 100) / 100;
        };

        const LATEST_SEASON = { year: 2027, season: 'S/S' };
        const formatSeason = (season) => {
            if (!season) return '';
            if (season.season === 'Carry Over') return '';
            if (season.year === LATEST_SEASON.year && season.season === LATEST_SEASON.season) return 'NEW';
            const yy = season.year.toString().slice(-2);
            const ss = season.season === 'S/S' ? 'SS' : season.season;
            return `${yy}-${ss}`;
        };
        const formatSeasonFull = (season) => {
            if (!season) return '';
            if (season.season === 'Carry Over') return 'Carry Over';
            const yy = season.year.toString().slice(-2);
            const ss = season.season === 'S/S' ? 'S/S' : season.season;
            return `${yy}-${ss}`;
        };

        const formatUSD = (amount) => `$${amount.toFixed(2)}`;
        const formatKRW = (amount) => `₩${Math.round(amount).toLocaleString()}`;
        const formatDateTime = (dateStr) => {
            const d = new Date(dateStr);
            const yyyy = d.getFullYear();
            const MM = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            const ss = String(d.getSeconds()).padStart(2, '0');
            return `${yyyy}-${MM}-${dd} ${hh}:${mm}:${ss}`;
        };

        // COMPONENTS
        const ProductCard = ({ product, onSelect, cartQty }) => {

                        const wholesale = calculateWholesalePrice(product.retail_price_krw);

                                                    <div className="order-info-label">Last Updated</div>
                                                    <div className="order-info-value">{formatDateTime(order.updated_at)}</div>
                                                </div>
                                                <div className="order-info-item">
                                                    <div className="order-info-label">Total Quantity</div>
                                                    <div className="order-info-value">{order.total_qty} units</div>
                                                </div>
                                                <div className="order-info-item">
                                                    <div className="order-info-label">Total Amount</div>
                                                    <div className="order-info-value">{formatUSD(order.total_amount)}</div>
                                                </div>
                                                <div className="order-info-item">
                                                    <div className="order-info-label">Status</div>
                                                    <div className="order-info-value">
                                                        <span className={`status-badge ${statusClassMap[order.status]}`}>{statusMap[order.status]}</span>
                                                    </div>
                                                </div>
                                            </div>
                                            {order.rejection_reason && (
                                                <div className="rejection-reason">
                                                    <strong>Rejection Reason:</strong> {order.rejection_reason}
                                                </div>
                                            )}
                                            <div style={{ textAlign: 'right' }}>
                                                <button className="order-card-button" onClick={() => setSelectedOrder(order)}>View Details</button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            {/* Order Detail Modal */}
                            {selectedOrder && (() => {
                                const statusMap = { '주문접수': 'Pending', '주문승인': 'Approved', '반려': 'Rejected' };
                                const statusClassMap = { '주문접수': 'status-pending', '주문승인': 'status-approved', '반려': 'status-rejected' };
                                return (
                                <div className="modal-backdrop" onClick={() => setSelectedOrder(null)}>
                                    <div className="modal-content" onClick={e => e.stopPropagation()}>
                                        <div className="modal-header">
                                            <h2 className="modal-title">{selectedOrder.order_id}</h2>
                                            <button className="modal-close" onClick={() => setSelectedOrder(null)}>&times;</button>
                                        </div>
                                        <div className="modal-body">
                                            <div className="order-detail-info">
                                                <div className="order-info-item">
                                                    <div className="order-info-label">Order Number</div>
                                                    <div className="order-info-value">{selectedOrder.order_id}</div>
                                                </div>
                                                <div className="order-info-item">
                                                    <div className="order-info-label">Order Date</div>
                                                    <div className="order-info-value">{formatDateTime(selectedOrder.created_at)}</div>
                                                </div>
                                                <div className="order-info-item">
                                                    <div className="order-info-label">Status</div>
                                                    <div className="order-info-value">
                                                        <span className={`status-badge ${statusClassMap[selectedOrder.status]}`}>
                                                            {statusMap[selectedOrder.status]}
                                                        </span>
                                                    </div>
                                                </div>
                                                <div className="order-info-item">
                                                    <div className="order-info-label">Total Quantity</div>
                                                    <div className="order-info-value">{selectedOrder.total_qty} units</div>
                                                </div>
                                                <div className="order-info-item">
                                                    <div className="order-info-label">Total Amount</div>
                                                    <div className="order-info-value">{formatUSD(selectedOrder.total_amount)}</div>
                                                </div>
                                                <div className="order-info-item">
                                                    <div className="order-info-label">Last Updated</div>
                                                    <div className="order-info-value">{formatDateTime(selectedOrder.updated_at)}</div>
                                                </div>
                                            </div>

                                            {selectedOrder.rejection_reason && (
                                                <div className="rejection-reason">
                                                    <strong>Rejection Reason:</strong> {selectedOrder.rejection_reason}
                                                </div>
                                            )}

                                            <table className="order-items-table">
                                                <thead>
                                                    <tr>
                                                        <th>Product</th>
                                                        <th>Style No.</th>
                                                        <th>Color / Size</th>
                                                        <th>Qty</th>
                                                        <th>Unit Price</th>
                                                        <th>Subtotal</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {(selectedOrder.items || []).map((item, idx) => (
                                                        <tr key={idx}>
                                                            <td>
                                                                <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                                                    <img src={item.product.images[0]} alt={item.product.name} style={{ width: '40px', height: '40px', objectFit: 'cover', background: 'var(--color-bg-low)' }} />
                                                                    <span>{item.product.name}</span>
                                                                </div>
                                                            </td>
                                                            <td>{item.product.style_no}</td>
                                                            <td>{item.color ? `${item.color} / ${item.size}` : item.size}</td>
                                                            <td>{item.qty}</td>
                                                            <td>${item.unit_price.toFixed(2)}</td>
                                                            <td>${item.subtotal.toFixed(2)}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                                <tfoot>
                                                    <tr>
                                                        <td colSpan="3" style={{ textAlign: 'right' }}>Total</td>
                                                        <td>{selectedOrder.total_qty}</td>
                                                        <td></td>
                                                        <td>{formatUSD(selectedOrder.total_amount)}</td>
                                                    </tr>
                                                </tfoot>
                                            </table>

                                            <div className="order-modal-actions">
                                                <button className="order-card-button" onClick={() => setSelectedOrder(null)}>Close</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                );
                            })()}
                        </div>
                    )}
                </div>
            );
        };

        // RENDER
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
