            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 7rem);
            text-align: center;
        }

        .success-icon {
            display: block;
            margin-bottom: 2rem;
        }

        .success-title {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            margin-bottom: 0.5rem;
        }

        .success-order-no {
            font-family: inherit;
            font-weight: 500;
            font-size: 0.9375rem;
            color: var(--color-fg-low);
            letter-spacing: 0.02em;
            margin-bottom: 2.5rem;
        }

        .success-buttons {
            display: flex;
            gap: 1rem;
        }

        .success-buttons button {
            white-space: nowrap;
        }

        /* ORDERS PAGE */
        .orders-section {
            padding: clamp(16px, 2vw, 32px) 1.5rem 2rem;
            max-width: 1980px;
            margin: 0 auto;
        }

        /* 데스크톱: 타이틀 옆 export 버튼 숨김 (하단 버튼만 노출) */
        .orders-export-top {
            display: none;
        }

        .order-card {
            background: transparent;
            padding: 1.25rem 1.5rem;
            margin-bottom: 0.75rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            gap: 2.5rem;
            cursor: pointer;
            transition: background 0.15s ease, border-color 0.15s ease;
        }

        .order-card:hover {
            background: #f8f8f8;
            border-color: #ccc;
        }

        .order-card-actions {
            flex-shrink: 0;
            margin-left: auto;
            display: flex;
            gap: 0.75rem;
        }

        .order-thumbnails {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            width: 152px;
        }
        /* 뷰포트 1700+ : 썸네일 2개 노출 */
        @media (min-width: 1700px) {
            .order-thumbnails {
                width: 240px;
            }
        }
        /* 뷰포트 1900+ : 썸네일 3개 노출 */
        @media (min-width: 1900px) {
            .order-thumbnails {
                width: 328px;
            }
        }
        /* 뷰포트 2100+ : 썸네일 4개 노출 (컨테이너 폭을 줄여 +N 우측 여백을 절반으로 축소 → 그만큼 정보 컬럼 사이가 자동으로 넓어짐) */
        @media (min-width: 2100px) {
            .order-thumbnails {
                width: 380px;
            }
        }
        /* 뷰포트 2300+ : 썸네일은 4개 유지(최대), 카드 내부 간격 절반으로 축소 */
        @media (min-width: 2300px) {
            .order-card {
                gap: 1.25rem;
            }
        }
        /* 1700px 미만 : 카드 컴팩트 모드 (1 썸네일, 마진/갭 축소, 액션 크기 축소) */
        @media (max-width: 1699px) {
            .order-card {
                gap: 1.25rem;
            }
            .order-card-actions .order-card-button {
                padding: 8px 14px;
                font-size: 11px;
            }
        }
        /* 1700px 이상: 가로 레이아웃에서 gap만 확장 (그리드 컬럼은 기본 .order-info-grid 규칙 사용) */
        @media (min-width: 1700px) {
            .order-info-grid {
                gap: 0.5rem 1.5rem;
            }
        }
        /* 1280px 미만 (태블릿) : 카드 세로 정렬 — 썸네일 위, 정보 가운데, 액션 아래 */
        @media (max-width: 1279px) {
            /* 페이지 레벨 가로 스크롤 방지 */
            body, html {
                overflow-x: hidden;
            }
            /* 주문 상세 모달의 정보 카드 — 태블릿 영역에서는 2 컬럼으로 압축 */
            .modal-body .order-detail-info {
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 0.875rem !important;
                padding: 1.25rem !important;
            }
            /* 주문 상세 모달 — 본문 패딩 축소 + 아이템 테이블이 모달 폭을 넘지 않도록 가로 스크롤은 wrapper 내부에서만 */
            .order-detail-modal-body {
                padding: 1rem 1rem 10px !important;
            }
            .order-detail-modal-body .order-items-table-wrap {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            .order-detail-modal-body .order-items-table {
                min-width: 640px;
            }
            .order-card {
                flex-direction: column !important;
                align-items: stretch !important;
                gap: 1rem !important;
                padding: 1.25rem !important;
            }
            /* NO. 번호: 좌상단 작게 */
            .order-card > div:first-child {
                min-width: 0 !important;
                margin-right: 0 !important;
                margin-left: 0 !important;
                padding-top: 0 !important;
                justify-content: flex-start !important;
                font-size: 12px !important;
                color: #999 !important;
            }
            /* 썸네일 컨테이너 풀폭, 가운데 정렬 안 함 (좌측 정렬) */
            .order-thumbnails {
                width: auto !important;
                justify-content: flex-start !important;
                flex-wrap: wrap !important;
            }
            /* 정보 컨테이너의 inline marginLeft 무효화 */
            .order-card > div[style*="flex: 1"] {
                margin-left: 0 !important;
                width: 100% !important;
            }
            /* 가로 grid 해제 → flex 2단으로 복귀 (좌측 padding/grid-template 무효화) */
            .order-info-grid {
                display: flex !important;
                grid-template-columns: none !important;
                flex-wrap: wrap !important;
                gap: 1.25rem 1rem !important;
                width: 100% !important;
                padding-left: 0 !important;
            }
            .order-info-item {
                flex: 0 0 calc(50% - 0.5rem) !important;
                min-width: 0 !important;
            }
            /* 텍스트 줄바꿈 안전망 */
            .order-info-value {
                overflow-wrap: anywhere !important;
                word-break: break-word !important;
            }
            .order-card-actions {
                margin-left: 0 !important;
                width: 100% !important;
                gap: 0.5rem !important;
            }
            .order-card-actions .order-card-button {
                flex: 1 !important;
                min-width: 0 !important;
            }
        }

        .order-thumbnail {
            height: 80px;
            width: auto;
            max-width: 80px;
            object-fit: contain;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            background: var(--color-bg);
            flex-shrink: 0;
        }

        .order-thumbnail-more {
            min-width: 56px;
            height: 80px;
            padding: 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            background: var(--color-bg);
            color: var(--color-fg-low);
            font-size: 0.95rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .order-id {
            font-family: inherit;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .order-date {
            font-size: 0.75rem;
            color: var(--color-fg-low);
        }

        .status-badge {
            padding: 4px 8px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0;
            text-transform: uppercase;
            border-radius: var(--radius-sm);
        }

        .status-pending {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-approved {
            background: #d4edda;
            color: #155724;
        }

        .status-rejected {
            background: #f8d7da;
            color: #c00;
        }

        .status-cancelled {
            background: #e5e7eb;
            color: #6b7280;
        }

        /* 기본: 가로 레이아웃 — col 순서: Order Number(130px) / Status(130px) / Order Date / Last Updated / Total Quantity(110px) / Total Amount.
           Order Number와 Status는 컴팩트 폭으로 가깝게 붙임(둘 사이 ≈16px),
           Status 컬럼의 우측 여백(60px) + 컬럼 gap(16px)으로 Status → Order Date는 넉넉하게 ~76px 간격 확보.
           좌측 24px padding으로 썸네일과 거리 확보. 좁은 뷰포트(<1280)는 @media (max-width: 1279px) 에서 flex 2단으로 전환. */
        .order-info-grid {
            display: grid;
            grid-template-columns: 130px 130px 1fr 1fr 110px 1fr;
            align-items: start;
            gap: 0.5rem 1rem;
            padding-left: 24px;
        }
        /* 데스크톱(가로 레이아웃): 이미지 앞에 Order Number 컬럼 노출, info-grid 내 Order Number는 숨김 */
        .order-id-leading {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 130px;
            font-size: 0.875rem;
            padding-top: 4px;
        }
        .order-id-leading .order-info-label {
            color: var(--color-fg-low);
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .order-id-leading .order-info-value,
        .order-id-leading .order-info-value.regular {
            font-size: 14px;
            font-weight: 700 !important;
        }
        @media (min-width: 1280px) {
            /* info-grid에선 Order Number 셀 숨김 (이미지 앞 컬럼이 대체) */
            .order-info-item--orderid {
                display: none !important;
            }
            /* info-grid 컬럼: Order Number 빠지므로 5개로 재구성 */
            .order-info-grid {
                grid-template-columns: 130px 1fr 1fr 110px 1fr;
            }
        }
        /* 모바일/태블릿: 이미지 앞 Order Number 숨김 (info-grid 안의 것이 노출됨) */
        @media (max-width: 1279px) {
            .order-id-leading {
                display: none !important;
            }
        }

        .order-info-item {
            font-size: 0.875rem;
            min-width: 0;
        }

        .order-info-label {
            color: var(--color-fg-low);
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .order-info-value {
            font-weight: 600;
            font-size: 14px;
        }

        .order-info-value.regular {
            font-weight: 400;
        }

        .rejection-reason {
            background: #fef2f2;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 0.875rem;
            color: #c00;
            flex-basis: 100%;
        }

        .order-card-button {
            padding: 8px 16px;
            min-width: 110px;
            border: 1px solid #ddd;
            background: #fff;
            color: var(--color-fg);
            font-size: 13px;
            font-weight: var(--btn-font-weight);
            letter-spacing: 0;
            text-transform: uppercase;
            border-radius: var(--btn-radius);
            cursor: pointer;
            transition: all 0.2s;
        }

        .order-card-button:hover {
            background: var(--color-bg-contrast);
            color: var(--color-fg-on-contrast);
        }

        /* RESPONSIVE */
        @media (max-width: 1600px) {
            .product-grid {
                grid-template-columns: repeat(4, 1fr);
            }

            .cart-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 1300px) {
            .product-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .cart-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 1024px) {
            .product-detail {
                grid-template-columns: 1fr;
            }

            .sizes-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 0 1rem;
            }

            .header-left {
                gap: 1rem;
            }

            .nav {
                gap: 1rem;
                font-size: 0.75rem;
            }

            .header-right {
                gap: 1rem;
            }

            .company-info {
                display: none;
            }

            .login-container {
                flex-direction: column;
            }

            .login-left {
                display: none;
            }

            .login-right {
                flex: 1;
                min-height: 100vh;
            }

            /* 수주회 중지 상태일 때만 모바일에서도 login-left를 노출 (수주회 상태 카드 보여주기 위해) */
            .login-container.has-session-status .login-left {
                display: flex !important;
                position: relative !important;
                flex: 0 0 auto !important;
                width: 100% !important;
                min-height: auto !important;
                padding: 24px 16px 16px !important;
                background: #111 !important;
            }
            /* 모바일에선 video/overlay 숨김 (불필요한 리소스, 카드만 노출) */
            .login-container.has-session-status .login-left .login-left-bg,
            .login-container.has-session-status .login-left .login-left-overlay {
                display: none !important;
            }
            .login-container.has-session-status .login-left .login-logo,
            .login-container.has-session-status .login-left .login-subtitle {
                position: relative !important;
                top: auto !important;
                left: auto !important;
                margin: 0 0 4px !important;
                text-align: center !important;
            }
            .login-container.has-session-status .login-left .login-logo {
                font-size: 2rem !important;
            }
            .login-container.has-session-status .login-left .login-subtitle {
                font-size: 0.75rem !important;
            }
            /* 카드 모바일 사이징 */
            .login-container.has-session-status .login-session-card {
                margin-top: 24px !important;
                padding: 32px 20px !important;
                width: 100% !important;
                max-width: 100% !important;
            }
            .login-container.has-session-status .login-right {
                min-height: auto !important;
                justify-content: flex-start !important;
                padding: 80px 2rem 2rem !important;
            }
            .login-container.has-session-status .login-right .login-header {
                margin-bottom: 1.5rem !important;
            }

            .product-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }

            .cart-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }

            .filters-row {
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            .filter-divider {
                display: none;
            }

            .filters-right {
                width: 100%;
                margin-left: 0;
            }

            .confirm-table {
                font-size: 0.75rem;
            }

            .confirm-table th,
            .confirm-table td {
                padding: 0.5rem;
            }
        }

        /* MOBILE MENU BUTTON AND DRAWER */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            padding: 6px;
            cursor: pointer;
            color: var(--color-fg);
            align-items: center;
            justify-content: center;
        }

        .mobile-drawer-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 200;
        }

        .mobile-drawer {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 80%;
            max-width: 320px;
            background: var(--color-bg);
            z-index: 201;
            box-shadow: -4px 0 20px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.25s ease-out;
        }

        .mobile-drawer.open {
            transform: translateX(0);
        }

        .mobile-drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--color-border-low);
            height: 3.5rem;
        }

        .mobile-drawer-title {
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.04em;
        }

        .mobile-drawer-close {
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            padding: 0;
            margin: -8px -10px -8px 0;
            color: var(--color-fg-low);
            cursor: pointer;
            border-radius: 50%;
        }

        .mobile-drawer-close svg {
            width: 22px;
            height: 22px;
            stroke-width: 1.25;
        }

        .mobile-drawer-menu {
            display: flex;
            flex-direction: column;
            padding: 0.5rem 0;
            flex: 1;
        }

        .mobile-drawer-item {
            padding: 1rem 1.25rem;
            font-size: 1rem;
            font-weight: 500;
            color: var(--color-fg);
            cursor: pointer;
            border-bottom: 1px solid var(--color-border-low);
        }

        .mobile-drawer-item.active {
            font-weight: 700;
        }

        .mobile-drawer-footer {
            padding: 1.25rem;
            border-top: 1px solid var(--color-border-low);
        }

        /* MOBILE 640px OPTIMIZATIONS */
        @media (max-width: 640px) {

            /* Hide category banners on mobile */
            .category-banners {
                display: none;
            }

            /* Halve the gap between hero and NEW (first collections-section) on mobile */
            .category-banners+.collections-section {
                padding-top: 60px;
            }

            /* 모바일: 컬렉션 섹션 헤더 — 타이틀 한 줄 / 아이템 카운트 좌측 + View all 우측 한 줄 */
            .collections-section > div:first-child {
                display: grid !important;
                grid-template-columns: 1fr auto !important;
                grid-template-areas:
                    "title title"
                    "count viewall" !important;
                column-gap: 12px !important;
                row-gap: 6px !important;
                justify-content: initial !important;
                align-items: center !important;
            }
            .collections-section > div:first-child > div {
                display: contents !important;
            }
            .collections-section > div:first-child > div > h3 {
                grid-area: title !important;
            }
            .collections-section > div:first-child > div > span {
                grid-area: count !important;
            }
            .collections-section > div:first-child > button {
                grid-area: viewall !important;
                justify-self: end !important;
            }

            /* GNB - hide desktop nav, show hamburger */
            .header {
                padding: 0 1rem;
                justify-content: space-between;
            }

            .header-center {
                display: none;
            }

            .logout-btn {
                display: none;
            }

            /* 모바일: 햄버거 메뉴 안에 Account 정보가 들어가므로 헤더의 사람(Account) 아이콘 숨김 */
            [data-account-popover] {
                display: none !important;
            }

            .logo {
                font-size: 0.95rem;
                gap: 6px;
            }

            .logo-small {
                font-size: 0.6rem;
            }

            .header-right {
                gap: 0.75rem;
            }

            .mobile-menu-btn {
                display: inline-flex;
            }

            .mobile-drawer-backdrop.open {
                display: block;
            }

            /* Category 패널 — 모바일 하단 시트.
               1뎁스(Category) + 2뎁스(Sub Category)는 좌우 2-col로 나란히, 선택된 항목은 하단 chip 형태 */
            .category-panel-backdrop {
                position: fixed !important;
                inset: 0;
                background: rgba(0, 0, 0, 0.4);
                z-index: 199;
            }
            .category-panel {
                position: fixed !important;
                top: auto !important;
                left: 0 !important;
                right: 0 !important;
                bottom: 0 !important;
                width: 100% !important;
                max-height: 80vh;
                border-radius: 16px 16px 0 0 !important;
                border: none !important;
                box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.18) !important;
                z-index: 200 !important;
                display: flex;
                flex-direction: column;
            }
            .category-panel-inner {
                display: grid !important;
                grid-template-columns: 40% 60% !important;
                grid-template-rows: minmax(0, 1fr) auto !important;
                grid-template-areas:
                    "main sub"
                    "selected selected" !important;
                min-height: 0 !important;
                max-height: 80vh !important;
                flex-direction: initial !important;
            }
            .category-panel .cat-col-main {
                grid-area: main;
                width: 100% !important;
                min-width: 0 !important;
                max-width: none !important;
                border-right: 1px solid #e5e5e5 !important;
                border-bottom: 1px solid #e5e5e5 !important;
                overflow-y: auto;
                min-height: 0;
            }
            .category-panel .cat-col-sub {
                grid-area: sub;
                width: 100% !important;
                min-width: 0 !important;
                max-width: none !important;
                border-right: none !important;
                border-bottom: 1px solid #e5e5e5 !important;
                overflow-y: auto;
                min-height: 0;
            }
            .category-panel .cat-col-selected {
                grid-area: selected;
                width: 100% !important;
                min-width: 0 !important;
                max-width: none !important;
                border: none !important;
                flex-shrink: 0 !important;
                background: #fafafa;
                max-height: 30vh;
            }
            /* 컬럼 헤더 — sticky로 고정 */
            .category-panel .cat-col > div:first-child {
                position: sticky;
                top: 0;
                background: #fff;
                z-index: 1;
            }
            .category-panel .cat-col-selected > div:first-child {
                background: #fafafa;
            }
            /* Selected 항목을 chip 스타일로 변환 — 가로 wrap, 체크박스 없이 X로 제거 */
            .category-panel .cat-col-selected > div:nth-child(2) {
                display: flex !important;
                flex-wrap: wrap;
                gap: 6px !important;
                padding: 10px 14px !important;
            }
            .category-panel .cat-col-selected label {
                display: inline-flex !important;
                align-items: center !important;
                gap: 6px !important;
                padding: 4px 4px 4px 10px !important;
                background: #fff;
                border: 1px solid #d1d5db;
                border-radius: 999px !important;
                font-size: 12px !important;
                white-space: nowrap !important;
                line-height: 1.4;
            }
            .category-panel .cat-col-selected label input[type="checkbox"] {
                display: none !important;
            }
            .category-panel .cat-col-selected label::after {
                content: '×';
                font-size: 16px;
                line-height: 1;
                color: #888;
                width: 18px;
                height: 18px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                border-radius: 50%;
                background: #f3f4f6;
                margin-left: 2px;
            }

            /* Filter bar horizontal scroll */
            .filters-row {
                flex-wrap: nowrap !important;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
                padding: 0.625rem 1rem;
                gap: 0.5rem;
                padding-right: 0 !important;  /* sticky 토글이 마스크로 덮으므로 padding 없이 붙임 */
                position: relative;
            }

            /* 좌측 fade 마스크 — .filters-sticky 부모에 absolute 오버레이로 viewport 좌측 가장자리에 고정 */
            .filters-sticky {
                position: sticky;
                /* sticky는 absolute 자식의 containing block이 됨 */
            }
            .filters-sticky::before {
                content: '';
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                width: 24px;
                background: linear-gradient(to right, #fff 50%, rgba(255, 255, 255, 0));
                z-index: 5;
                pointer-events: none;
            }
            /* 전체 보기 모드에서는 가로 스크롤이 없으니 좌측 마스크 숨김 */
            .filters-row.show-all ~ ::before,
            .filters-sticky:has(.filters-row.show-all)::before {
                display: none;
            }

            /* 전체 보기 토글된 상태: 가로 스크롤 해제하고 wrap으로 전체 노출 */
            .filters-row.show-all {
                flex-wrap: wrap !important;
                overflow-x: visible !important;
                row-gap: 0.5rem;
            }

            .filters-row.dropdown-open {
                overflow-x: visible;
            }

            .filters-row::-webkit-scrollbar {
                display: none;
            }

            .filters-row>* {
                flex-shrink: 0;
            }

            /* 모바일 전용: 필터 바 전체 보기 토글 — 우측 끝에서 16px 떨어진 위치에 sticky 고정.
               아이콘만 노출, 보더/배경 wrapper 제거. 좌측 짧은 흰색 마스크 + 우측 16px 흰색 영역으로 뒤 필터 완전히 가림 */
            .filters-expand-toggle {
                display: inline-flex !important;
                align-items: center;
                justify-content: center;
                position: sticky;
                right: 16px;
                width: 24px;
                height: 36px;
                margin-left: auto !important;
                background: #fff;
                border: none;
                border-radius: 0;
                color: #111;
                padding: 0;
                cursor: pointer;
                z-index: 5;
                overflow: visible;
                /* 좌측 ~10px 짧은 흰색 페이드 마스크 */
                box-shadow:
                    -6px 0 0 #fff,
                    -10px 0 6px #fff;
            }
            /* 토글 우측 16px 영역(viewport 우측 가장자리까지) 흰색으로 덮어 뒤쪽 스크롤 콘텐츠 가림 */
            .filters-expand-toggle::after {
                content: '';
                position: absolute;
                top: 0;
                bottom: 0;
                left: 100%;
                width: 16px;
                background: #fff;
                pointer-events: none;
            }
            .filters-expand-toggle:active {
                opacity: 0.6;
            }
            /* 전체 보기(show-all) 상태에서도 우측 16px 마진 유지 */
            .filters-row.show-all .filters-expand-toggle {
                position: static;
                box-shadow: none;
                margin-left: auto !important;
                margin-right: 16px !important;
            }
            .filters-row.show-all .filters-expand-toggle::after {
                display: none;
            }

            .filter-divider {
                display: block !important;
                margin: 0 0.125rem;
            }

            .filters-right {
                width: auto !important;
                margin-left: 0 !important;
            }

            .category-buttons {
                flex-wrap: nowrap;
            }

            /* Product detail modal - fullscreen */
            .modal-backdrop {
                background: var(--color-bg);
            }

            .modal-content {
                max-width: 100%;
                max-height: 100vh;
                max-height: 100dvh;
                width: 100vw;
                height: 100vh;
                height: 100dvh;
                border-radius: 0;
                border: none;
                overflow-y: auto;
            }

            .modal-header {
                padding: 0.75rem 1rem 0.5rem;
                position: sticky;
                top: 0;
                background: var(--color-bg);
                z-index: 5;
                border-bottom: 1px solid var(--color-border-low);
            }

            .modal-body {
                padding: 1rem;
            }

            .product-detail {
                grid-template-columns: 1fr;
                gap: 1.25rem;
            }

            .detail-thumbnails {
                grid-template-columns: repeat(5, 1fr);
            }

            .sizes-grid {
                grid-template-columns: repeat(4, 1fr);
            }

            /* Fullscreen image viewer */
            .img-fullscreen-nav {
                width: 48px;
                height: 48px;
                font-size: 30px;
            }

            .img-fullscreen-nav.prev {
                left: 12px;
            }

            .img-fullscreen-nav.next {
                right: 12px;
            }

            .img-fullscreen-overlay img {
                max-width: 100vw;
                max-height: 100vh;
            }

            /* Product grid - 2 columns */
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.75rem;
            }

            /* Cart grid - 1 column */
            .cart-grid {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }

            /* Orders page - stacked card */
            .orders-section {
                padding: 1.25rem 1rem;
            }

            /* 모바일: 하단 EXPORT ALL 버튼 숨기고, 타이틀 우측 export 버튼 노출 */
            .orders-export-bottom {
                display: none !important;
            }
            .orders-export-top {
                display: inline-flex !important;
                align-items: center;
                justify-content: center;
            }

            .order-card {
                flex-direction: column !important;
                align-items: stretch !important;
                gap: 0.875rem !important;
                padding: 1rem !important;
            }

            .order-thumbnails {
                width: 100% !important;
                gap: 8px;
                flex-wrap: wrap !important;
                justify-content: flex-start !important;
            }

            .order-thumbnail {
                height: 64px;
                width: auto;
                max-width: 64px;
            }

            .order-thumbnail-more {
                min-width: 48px;
                height: 64px;
                padding: 0 8px;
                font-size: 0.875rem;
            }

            /* 모바일에서도 grid → flex 2단 강제 */
            .order-info-grid {
                display: flex !important;
                grid-template-columns: none !important;
                flex-wrap: wrap !important;
                gap: 1.25rem 0.875rem !important;
                width: 100% !important;
                padding-left: 0 !important;
            }

            .order-info-item {
                flex: 0 0 calc(50% - 0.4375rem) !important;
                min-width: 0 !important;
            }

            .order-info-value {
                font-size: 13px !important;
                overflow-wrap: anywhere !important;
                word-break: break-word !important;
            }

            .order-info-label {
                font-size: 0.6rem !important;
            }

            .order-card-actions {
                margin-left: 0;
                width: 100%;
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            .order-card-actions .order-card-button {
                flex: 1;
                min-width: 0;
                font-size: 11px;
            }
            /* 모바일: EXCEL 버튼은 짧게(컨텐츠 폭), VIEW DETAILS가 남은 폭을 모두 차지 */
            .order-card-actions .order-card-button:first-child {
                flex: 0 0 auto !important;
                padding-left: 18px !important;
                padding-right: 18px !important;
            }

            .rejection-reason {
                width: 100%;
            }

            /* Summary bar mobile optimization (products + cart pages) */
            .summary-bar {
                padding: 0.75rem 1rem 1rem;
            }

            .summary-bar-inner {
                padding: 0;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                gap: 0.5rem;
            }

            .summary-stats {
                gap: 1rem;
            }

            .summary-bar .stat {
                flex-direction: column;
                gap: 0.125rem;
                align-items: flex-start;
            }

            .summary-bar .stat-label {
                font-size: 9px;
                letter-spacing: 0.02em;
            }

            .summary-bar .stat>span:last-child {
                font-size: 13px;
                font-weight: 700;
            }

            .summary-bar .btn-outline-white {
                width: auto;
                padding: 10px 16px;
                font-size: 12px;
                white-space: nowrap;
            }


            /* Order detail modal — 모바일 카드형 세로 레이아웃
               블록 첫 행: [No.] [이미지 + 상품명/스타일넘버] [컬러는 우측 끝]
               그 아래: 사이즈/수량/단가/소계 grid 4컬럼.
               블록 사이에는 윗쪽 굵은 구분선. tfoot은 모달 하단에 sticky로 고정. */
            .order-items-table-wrap {
                overflow-x: hidden !important;
            }
            .order-items-table {
                min-width: 0 !important;
                display: block !important;
            }
            .order-items-table thead {
                display: none !important;
            }
            .order-items-table tbody {
                display: block !important;
            }

            /* 첫 row of block: No. cell(좌측 작게) + Product cell(이미지+텍스트+컬러) + 4 variant cells */
            .order-items-table tbody tr:has(td[rowspan]) {
                display: grid !important;
                grid-template-columns: 28px 1fr 1fr 1fr 1fr !important;
                grid-template-rows: auto auto !important;
                column-gap: 8px !important;
                row-gap: 24px !important;
                padding: 16px 4px !important;
                margin-top: 16px !important;
                border-top: 1px solid #d1d5db !important;
                border-bottom: none !important;
            }
            /* 첫 블록의 윗 구분선 제거 (위는 이미 검정 thead-shadow 있음) */
            .order-items-table tbody tr:has(td[rowspan]):first-child {
                border-top: none !important;
                margin-top: 0 !important;
                padding-top: 8px !important;
            }
            .order-items-table tbody tr:has(td[rowspan]) td.row-no-cell {
                grid-column: 1 !important;
                grid-row: 1 !important;
                padding: 0 !important;
                font-size: 12px !important;
                color: #999 !important;
                font-weight: 600 !important;
                align-self: center !important;
                border: none !important;
            }
            .order-items-table tbody tr:has(td[rowspan]) td[rowspan]:not(.row-no-cell) {
                grid-column: 2 / -1 !important;
                grid-row: 1 !important;
                padding: 0 !important;
                position: relative !important;
                border: none !important;
            }
            /* Product cell 내부 sticky 해제 + 이미지 큼 + 컬러 칩은 텍스트 컬럼의 스타일넘버 밑으로 자연 흐름 */
            .order-items-table tbody td[rowspan]:not(.row-no-cell) > div {
                position: static !important;
                top: auto !important;
                display: flex !important;
                gap: 12px !important;
                align-items: flex-start !important;
            }
            .order-items-table tbody td[rowspan]:not(.row-no-cell) .product-cell-image {
                width: 64px !important;
                height: 84px !important;
            }
            .order-items-table tbody td[rowspan]:not(.row-no-cell) .product-cell-image img {
                width: 100% !important;
                height: 100% !important;
                object-fit: cover !important;
                border-radius: 4px !important;
            }
            /* 컬러 칩 — 스타일넘버 바로 밑으로 자연스럽게 배치 (절대위치 해제) */
            .order-items-table tbody td[rowspan]:not(.row-no-cell) .order-color-badge {
                position: static !important;
                margin-top: 6px !important;
                font-size: 11px !important;
                padding: 3px 10px !important;
            }

            /* Variant cells (size/qty/price/subtotal) — 두번째 row, 4컬럼 (No.col 비워두고 col 2~5) */
            .order-items-table tbody tr:has(td[rowspan]) td:not([rowspan]):nth-last-child(4) { grid-column: 2 !important; grid-row: 2 !important; }
            .order-items-table tbody tr:has(td[rowspan]) td:not([rowspan]):nth-last-child(3) { grid-column: 3 !important; grid-row: 2 !important; }
            .order-items-table tbody tr:has(td[rowspan]) td:not([rowspan]):nth-last-child(2) { grid-column: 4 !important; grid-row: 2 !important; }
            .order-items-table tbody tr:has(td[rowspan]) td:not([rowspan]):nth-last-child(1) { grid-column: 5 !important; grid-row: 2 !important; }

            /* 후속 variant 행 (rowspan 없음) — 컬럼 정렬 유지하기 위해 같은 grid 사용, No. col 비움. 행 사이 얇은 라인 */
            .order-items-table tbody tr:not(:has(td[rowspan])) {
                display: grid !important;
                grid-template-columns: 28px 1fr 1fr 1fr 1fr !important;
                column-gap: 8px !important;
                padding: 10px 4px !important;
                border-top: 1px solid #f0f0f0 !important;
                border-bottom: none !important;
            }
            .order-items-table tbody tr:not(:has(td[rowspan])) td:nth-child(1) { grid-column: 2 !important; }
            .order-items-table tbody tr:not(:has(td[rowspan])) td:nth-child(2) { grid-column: 3 !important; }
            .order-items-table tbody tr:not(:has(td[rowspan])) td:nth-child(3) { grid-column: 4 !important; }
            .order-items-table tbody tr:not(:has(td[rowspan])) td:nth-child(4) { grid-column: 5 !important; }

            .order-items-table tbody td {
                padding: 0 !important;
                font-size: 13px !important;
                border: none !important;
            }
            /* size/qty/price/subtotal 셀 위에 작은 라벨 (thead 대체) — 첫 variant row에만 */
            .order-items-table tbody tr:has(td[rowspan]) td:not([rowspan])::before {
                display: block;
                font-size: 9px;
                color: #999;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                font-weight: 500;
                margin-bottom: 2px;
            }
            .order-items-table tbody tr:has(td[rowspan]) td:not([rowspan]):nth-last-child(4)::before { content: 'Size'; }
            .order-items-table tbody tr:has(td[rowspan]) td:not([rowspan]):nth-last-child(3)::before { content: 'Qty'; }
            .order-items-table tbody td:not([rowspan]):nth-last-child(2)::before { display: none !important; }
            .order-items-table tbody tr:has(td[rowspan]) td:not([rowspan]):nth-last-child(2)::before { content: 'Unit Price'; display: block !important; }
            .order-items-table tbody tr:has(td[rowspan]) td:not([rowspan]):nth-last-child(1)::before { content: 'Subtotal'; display: block !important; }

            /* tfoot — 모달 하단에 고정 (order-items-table-wrap이 아닌 viewport bottom 기준).
               flex column 모달 본문에서 footer를 분리해 sticky 적용. */
            .order-items-table tfoot {
                display: block !important;
                position: sticky !important;
                bottom: 0 !important;
                background: #fff !important;
                z-index: 5 !important;
                box-shadow: 0 -1px 0 #e5e7eb !important;
                margin: 0 -16px !important;
                padding: 0 16px !important;
            }
            .order-items-table tfoot tr {
                display: grid !important;
                grid-template-columns: auto auto 1fr auto auto !important;
                grid-template-rows: auto auto !important;
                column-gap: 8px !important;
                row-gap: 10px !important;
                align-items: baseline !important;
                padding: 12px 0 !important;
                border-top: 1px solid #e5e7eb !important;
            }
            /* 취소 버튼이 렌더되지 않을 때(주문접수 외 상태): 빈 colspan 셀 숨기고 1행 그리드로 — 총 수량/금액이 하단에 자연스럽게 붙음 */
            .order-items-table tfoot tr:not(:has(td[colspan] button)) {
                grid-template-rows: auto !important;
                row-gap: 0 !important;
            }
            .order-items-table tfoot tr:not(:has(td[colspan] button)) td[colspan] {
                display: none !important;
            }
            .order-items-table tfoot td {
                padding: 0 !important;
                border: none !important;
                font-size: 13px !important;
            }
            /* Row 1 (위): Total Qty | 값 | spacer | Total Amount | 값 */
            .order-items-table tfoot td:not([colspan]):nth-child(2) { grid-column: 1; grid-row: 1; }  /* Qty label */
            .order-items-table tfoot td:not([colspan]):nth-child(3) { grid-column: 2; grid-row: 1; }  /* Qty value */
            .order-items-table tfoot td:not([colspan]):nth-child(4) { grid-column: 4; grid-row: 1; }  /* Amount label */
            .order-items-table tfoot td:not([colspan]):nth-child(5) { grid-column: 5; grid-row: 1; }  /* Amount value */
            /* Row 2 (아래): 취소 버튼 + 설명문구 풀폭 */
            .order-items-table tfoot td[colspan] {
                grid-column: 1 / -1 !important;
                grid-row: 2 !important;
                padding-top: 4px !important;
                border-top: none !important;
            }
            .order-items-table tfoot td[style*="text-align: right"] {
                text-align: left !important;
            }

            /* 상품 상세 모달 — 모바일에서 하단 액션 영역(Total + 버튼들) sticky bottom 고정 (하단 여백 제로) */
            .modal-body:has(.product-detail-actions) {
                padding-bottom: 0 !important;
            }
            .product-detail-actions {
                position: sticky;
                bottom: 0;
                background: #fff;
                margin: 0 -1rem;
                padding: 8px 1rem 12px;
                box-shadow: 0 -1px 0 #e5e7eb, 0 -8px 16px rgba(255, 255, 255, 0.95);
                z-index: 5;
            }

            /* Order Confirmation 상단 툴바 — 모바일에서는 "Total X items"만 노출, 다른 버튼들 숨김 */
            .confirm-toolbar {
                flex-wrap: wrap !important;
                height: auto !important;
                gap: 6px !important;
                padding: 0 !important;
                margin-top: 24px !important;  /* 타이틀 밑으로 24px */
            }
            .confirm-toolbar > span:first-child {
                flex: 1 1 100% !important;
            }
            .confirm-toolbar > span[style*="visibility"] {
                display: none !important;
            }
            /* 모바일에서 REMOVE SELECTED / CLEAR SELECTION / DOWNLOAD / BULK UPLOAD 모두 숨김 */
            .confirm-toolbar > button,
            .confirm-toolbar > label {
                display: none !important;
            }
            .confirm-toolbar > div[style*="flex: 1"] {
                display: none !important;
            }
            /* 타이틀 영역 — 타이틀과 그 아래 toolbar 사이 간격 축소 */
            .confirm-title-row {
                margin-bottom: 0 !important;
            }
            /* 타이틀 옆 DOWNLOAD 버튼 노출 (모바일 전용) */
            .confirm-download-mobile {
                display: inline-flex !important;
            }

            /* Order Confirmation 테이블 — 모바일 카드형 세로 레이아웃 (가로 스크롤 제거)
               각 블록: [No. | 휴지통] 한 줄 + [이미지 + 상품명/컬러] + [Size/Qty/Price/Sub] 변형 행 */
            .confirm-table-scroll {
                overflow-x: hidden !important;
            }
            .confirm-table {
                min-width: 0 !important;
                display: block !important;
            }
            .confirm-table thead {
                display: none !important;
            }
            .confirm-table tbody {
                display: block !important;
            }
            /* 모바일: 블록단위 휴지통 버튼 노출 */
            .block-delete-btn {
                display: inline-flex !important;
                align-items: center;
                justify-content: center;
                width: 32px;
                height: 32px;
                background: transparent;
                border: none;
                color: #999;
                cursor: pointer;
                padding: 0;
            }
            .block-delete-btn:active {
                color: #c00;
            }

            /* ────────────────────────────────────────────────────────────
               Order Confirmation 모바일 카드 레이아웃
               각 블록 = 한 상품(컬러). 구조:
                 Row1: [No] [Product card (이미지+텍스트)]            [🗑]
                 Row2: SIZE | QTY | UNIT PRICE | SUBTOTAL  ← 라벨 (첫 variant행만)
                       S    | [n] | $35.25     | $35.25     ← 값
                       M    | [n] | $35.25     | $70.50
                       ...
               ──────────────────────────────────────────────────────────── */

            /* 블록 첫 row: 5-col grid (24px No + 4*1fr variants)

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ============================================================
        // Supabase 설정 — supabase/SETUP_GUIDE.md 참고
        // 빈 문자열로 두면 localStorage만 사용 (offline mode)
        // ============================================================
        const SUPABASE_URL = 'https://xiusdckfzdvtxxvcytum.supabase.co';        // 예: 'https://xxxx.supabase.co'
        const SUPABASE_ANON_KEY = 'sb_publishable_THsGVqwQsXwxWEEtsAhLfg_ebXBCF8l';   // 예: 'eyJhbGciOiJIUzI1NiIs...'

        const supabaseClient = (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase)
            ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
            : null;

        const SBSync = {
            enabled: !!supabaseClient,
            async fetchAll(table) {
                if (!supabaseClient) return null;
                try {
                    const { data, error } = await supabaseClient.from(table).select('*');
                    if (error) throw error;
                    return data;
                } catch (e) { console.warn(`[SBSync] fetch ${table}:`, e.message); return null; }
            },
            async upsertMany(table, records) {
                if (!supabaseClient || !records || records.length === 0) return false;
                try {
                    const { error } = await supabaseClient.from(table).upsert(records);
                    if (error) throw error;
                    return true;
                } catch (e) { console.warn(`[SBSync] upsert ${table}:`, e.message); return false; }
            },
            async deleteByIds(table, idCol, ids) {
                if (!supabaseClient || !ids || ids.length === 0) return false;
                try {
                    const { error } = await supabaseClient.from(table).delete().in(idCol, ids);

            'PURPLE': '#7c3aed',
            'PINK': '#ec4899',
            'BROWN': '#92400e',
            'BEIGE': '#e7d8c0',
            'KHAKI': '#a18a5c',
            'SAGE': '#9caf88',
            'CHARCOAL': '#374151',
            'CREAM': '#fbf6e9'
        };
        function getColorSwatch(name) {
            if (!name) return '#e5e7eb';
            const upper = String(name).toUpperCase().trim();
            if (COLOR_SWATCH_MAP[upper]) return COLOR_SWATCH_MAP[upper];
            // "GREY/PURPLE" 같은 복합 컬러 → 두 색의 conic gradient
            if (upper.includes('/')) {
                const parts = upper.split('/').map(s => s.trim());
                const c1 = COLOR_SWATCH_MAP[parts[0]] || '#9ca3af';
                const c2 = COLOR_SWATCH_MAP[parts[1]] || '#9ca3af';
                return `linear-gradient(135deg, ${c1} 0%, ${c1} 50%, ${c2} 50%, ${c2} 100%)`;
            }
            return '#e5e7eb';
        }

        // Export a single order's items to an .xlsx file
        const exportOrderToExcel = (order) => {

                alert('Excel library is still loading. Please try again in a moment.');

            const rows = (order.items || []).map((item, idx) => ({

                'Product': item.product.name,
                'Style No': item.product.style_no,

                'Size': item.size || '',
                'Qty': item.qty,
                'Unit Price (USD)': Number(item.unit_price.toFixed(2)),
                'Subtotal (USD)': Number(item.subtotal.toFixed(2)),
            }));
            rows.push({
                'No.': '',
                'Product': '',
                'Style No': '',
                'Color': '',
                'Size': 'Total',
                'Qty': order.total_qty,
                'Unit Price (USD)': '',
                'Subtotal (USD)': Number(order.total_amount.toFixed(2)),

                { wch: 5 }, { wch: 32 }, { wch: 16 }, { wch: 14 },
                { wch: 8 }, { wch: 8 }, { wch: 14 }, { wch: 14 },

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Order Items');
            XLSX.writeFile(wb, `${order.order_id}.xlsx`);
        };

        // Export all orders of the partner into a single workbook
        // Sheet 1: Orders summary, Sheet 2: All line items consolidated
        const exportAllOrdersToExcel = (orderList) => {
            if (typeof XLSX === 'undefined') {
                alert('Excel library is still loading. Please try again in a moment.');
                return;
            }
            if (!orderList || orderList.length === 0) {
                alert('No orders to export.');
                return;

            const statusMap = { '주문접수': 'Pending', '주문완료': 'Completed', '반려': 'Rejected', '주문취소': 'Cancelled' };

            const summaryRows = orderList.map((order, idx) => ({
                'No.': idx + 1,
                'Order Number': order.order_id,
                'Order Date': order.created_at ? String(order.created_at).replace('T', ' ').slice(0, 19) : '',
                'Last Updated': order.updated_at ? String(order.updated_at).replace('T', ' ').slice(0, 19) : '',
                'Status': statusMap[order.status] || order.status || '',
                'Total Qty': order.total_qty,

            const itemRows = [];
            orderList.forEach(order => {
                (order.items || []).forEach((item, idx) => {
                    itemRows.push({
                        'Order Number': order.order_id,

                        'Status': statusMap[order.status] || order.status || '',
                        'Line No.': idx + 1,
                        'Product': item.product.name,
                        'Style No': item.product.style_no,
                        'Color': item.color || '',
                        'Size': item.size || '',
                        'Qty': item.qty,
                        'Unit Price (USD)': Number(item.unit_price.toFixed(2)),
                        'Subtotal (USD)': Number(item.subtotal.toFixed(2)),

            const wb = XLSX.utils.book_new();

            wsSummary['!cols'] = [
                { wch: 5 }, { wch: 18 }, { wch: 20 }, { wch: 20 },
                { wch: 12 }, { wch: 10 }, { wch: 16 },

            const wsItems = XLSX.utils.json_to_sheet(itemRows);
            wsItems['!cols'] = [
                { wch: 18 }, { wch: 20 }, { wch: 12 }, { wch: 8 }, { wch: 32 },
                { wch: 16 }, { wch: 14 }, { wch: 8 }, { wch: 8 }, { wch: 14 }, { wch: 14 },

            const today = new Date().toISOString().slice(0, 10);
            XLSX.writeFile(wb, `orders_${today}.xlsx`);
        };

        // Export the current cart into an .xlsx file (one row per color+size line)
        const exportCartToExcel = (cartData, discountRate) => {
            if (typeof XLSX === 'undefined') {
                alert('Excel library is still loading. Please try again in a moment.');
                return;
            }
            const rows = [];
            let grandQty = 0;
            let grandAmount = 0;
            Object.entries(cartData || {}).forEach(([productId, colorQties]) => {
                const product = PRODUCTS.find(p => p.id === productId);
                if (!product) return;
                const wholesale = calculateWholesalePrice(product.retail_price_krw, discountRate);
                Object.entries(colorQties).forEach(([colorName, sizeQties]) => {
                    Object.entries(sizeQties).forEach(([size, qty]) => {
                        if (!qty || qty <= 0) return;
                        const subtotal = qty * wholesale;
                        grandQty += qty;
                        grandAmount += subtotal;
                        rows.push({
                            'No.': rows.length + 1,
                            'Product': product.name,
                            'Style No': product.style_no,
                            'Color': colorName,
                            'Size': size,
                            'Qty': qty,
                            'Unit Price (USD)': Number(wholesale.toFixed(2)),
                            'Subtotal (USD)': Number(subtotal.toFixed(2)),
                        });
                    });
                });
            });

            if (rows.length === 0) {
                alert('Shopping bag is empty.');
                return;
            }

            rows.push({
                'No.': '',
                'Product': '',
                'Style No': '',
                'Color': '',
                'Size': 'Total',
                'Qty': grandQty,
                'Unit Price (USD)': '',
                'Subtotal (USD)': Number(grandAmount.toFixed(2)),
            });

            const ws = XLSX.utils.json_to_sheet(rows);
            ws['!cols'] = [
                { wch: 5 }, { wch: 32 }, { wch: 16 }, { wch: 14 },
                { wch: 8 }, { wch: 8 }, { wch: 14 }, { wch: 14 },

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Shopping Bag');
            const today = new Date().toISOString().slice(0, 10);
            XLSX.writeFile(wb, `cart_${today}.xlsx`);
        };
        const formatDateTime = (dateStr) => {
            const d = new Date(dateStr);
            const yyyy = d.getFullYear();
            const MM = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            const ss = String(d.getSeconds()).padStart(2, '0');
            return `${yyyy}-${MM}-${dd} ${hh}:${mm}:${ss}`;
        };

        // COMPONENTS
        const ProductCard = ({ product, onSelect, cartQty, discountRate }) => {
            const wholesalePrice = calculateWholesalePrice(product.retail_price_krw, discountRate);
            const seasonLabel = formatSeason(product.season);
            const images = product.colors[0].images;
            // Append a clone of the first image so the last → first transition continues forward (seamless loop)
            const slides = images.length > 1 ? [...images, images[0]] : images;
            const [imgIndex, setImgIndex] = useState(0);
            const [enableTransition, setEnableTransition] = useState(true);
            const [slidesMounted, setSlidesMounted] = useState(false);
            const [isPaused, setIsPaused] = useState(false);
            const cardRef = React.useRef(null);
            const intervalRef = React.useRef(null);
            const timeoutRef = React.useRef(null);

            // Preload all slider images once the card enters (or nears) the viewport
            useEffect(() => {
                if (slidesMounted || !cardRef.current || images.length <= 1) return;
                const node = cardRef.current;
                const observer = new IntersectionObserver(
                    (entries) => {
                        if (entries[0].isIntersecting) {
                            setSlidesMounted(true);
                            observer.disconnect();
                        }
                    },
                    { rootMargin: '300px 0px' }
                );
                observer.observe(node);
                return () => observer.disconnect();
            }, [slidesMounted, images.length]);

            const slidesToRender = slidesMounted ? slides : [slides[0]];

            const startAutoSlide = () => {
                if (images.length <= 1 || isPaused || intervalRef.current || timeoutRef.current) return;
                // Ensure all slide images are mounted (and thus loading) as soon as the user hovers
                if (!slidesMounted) setSlidesMounted(true);
                // First slide kicks in at 0.5s, then every 2s after
                timeoutRef.current = setTimeout(() => {
                    setEnableTransition(true);
                    setImgIndex(prev => prev + 1);
                    timeoutRef.current = null;
                    intervalRef.current = setInterval(() => {
                        setEnableTransition(true);
                        setImgIndex(prev => prev + 1);
                    }, 2000);
                }, 500);
            };

            const stopAutoSlide = () => {
                if (timeoutRef.current) {
                    clearTimeout(timeoutRef.current);
                    timeoutRef.current = null;
                }
                if (intervalRef.current) {
                    clearInterval(intervalRef.current);
                    intervalRef.current = null;
                }
                setEnableTransition(false);
                setImgIndex(0);
                setIsPaused(false);
            };

            const togglePause = (e) => {
                e.stopPropagation();
                if (isPaused) {
                    // Resume: kick off the interval again
                    setIsPaused(false);
                    intervalRef.current = setInterval(() => {
                        setEnableTransition(true);
                        setImgIndex(prev => prev + 1);
                    }, 2000);
                } else {
                    // Pause: clear any pending timers
                    if (timeoutRef.current) {
                        clearTimeout(timeoutRef.current);
                        timeoutRef.current = null;
                    }
                    if (intervalRef.current) {
                        clearInterval(intervalRef.current);
                        intervalRef.current = null;
                    }
                    setIsPaused(true);
                }
            };

            const handleTransitionEnd = (e) => {
                if (e.propertyName !== 'transform') return;
                if (imgIndex === images.length) {
                    setEnableTransition(false);
                    setImgIndex(0);
                }
            };

            // After a no-transition snap (reset), re-enable transitions on the next frame
            useEffect(() => {
                if (!enableTransition) {
                    const id = requestAnimationFrame(() => {
                        requestAnimationFrame(() => setEnableTransition(true));
                    });
                    return () => cancelAnimationFrame(id);
                }
            }, [enableTransition]);

            useEffect(() => () => {
                if (intervalRef.current) clearInterval(intervalRef.current);
                if (timeoutRef.current) clearTimeout(timeoutRef.current);
            }, []);

            return (
                <div ref={cardRef} className="product-card" onClick={() => onSelect(product)} onMouseEnter={startAutoSlide} onMouseLeave={stopAutoSlide}>
                    <div className={`product-image-container`} style={cartQty > 0 ? { position: 'relative' } : {}}>
                        <div className="product-image-slider"
                            onTransitionEnd={handleTransitionEnd}
                            style={{
                                display: 'flex',
                                width: '100%',
                                height: '100%',
                                transform: `translateX(-${imgIndex * 100}%)`,
                                transition: enableTransition ? 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)' : 'none'
                            }}>
                            {slidesToRender.map((img, i) => (
                                <img
                                    key={i}
                                    src={img}
                                    alt={product.name}
                                    className="product-image"
                                    draggable={false}
                                    loading={i === 0 ? 'eager' : 'lazy'}
                                    decoding="async"
                                    style={{ flexShrink: 0, width: '100%' }}
                                />
                            ))}

                        {images.length > 1 && (
                            <button
                                type="button"
                                className={`product-slide-pause${isPaused ? ' is-paused' : ''}`}
                                onClick={togglePause}
                                aria-label={isPaused ? 'Play slideshow' : 'Pause slideshow'}
                            >
                                <svg className="product-slide-icon" width="10" height="10" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                    {isPaused ? (
                                        <polygon points="7,4 20,12 7,20"></polygon>
                                    ) : (
                                        <g>
                                            <rect x="6" y="4" width="4" height="16" rx="1"></rect>
                                            <rect x="14" y="4" width="4" height="16" rx="1"></rect>
                                        </g>
                                    )}
                                </svg>
                                <span className="product-slide-label">{isPaused ? 'PLAY' : 'PAUSE'}</span>
                                {!isPaused && (
                                    <span className="product-slide-progress-bar" key={imgIndex} aria-hidden="true"></span>
                                )}
                            </button>
                        )}
                        {cartQty > 0 && <div className="product-qty-bar">QTY: {cartQty} <button onClick={(e) => { e.stopPropagation(); }}>REMOVE</button></div>}
                    </div>
                    <div className="product-info">
                        {(seasonLabel || product.is_hero) && <div className="product-badges">
                            {seasonLabel && <span className="product-badge badge-season">{seasonLabel}</span>}
                            {product.is_hero && <span className="product-badge badge-hero">HERO</span>}
                        </div>}
                        <div className="product-name">{product.name}</div>
                        <div className="product-meta">{product.style_no} · {product.colors[0].name} · {product.gender} · {seasonLabel}</div>
                        <div className="product-price">{formatUSD(wholesalePrice)}</div>
                        <div className="product-price-retail">{formatKRW(product.retail_price_krw)}</div>
                    </div>
                </div>
            );
        };

        const ProductDetailModal = ({ product, isOpen, onClose, onAddToCart, isEditMode = false, existingQties = {}, discountRate }) => {

            const [selectedColorIndex, setSelectedColorIndex] = useState(0);

            const touchDeltaX = React.useRef(0);
            const [allColorQuantities, setAllColorQuantities] = useState(() => {
                const init = {};
                product.colors.forEach((color, colorIdx) => {
                    init[colorIdx] = {};
                    product.sizes.forEach(size => {

                if (isEditMode && existingQties) {
                    Object.entries(existingQties).forEach(([colorName, sizeQties]) => {
                        const colorIdx = product.colors.findIndex(c => c.name === colorName);

                            Object.entries(sizeQties).forEach(([size, qty]) => {
                                init[colorIdx][size] = parseInt(qty) || 0;

                return init;

            const currentColor = product.colors[selectedColorIndex] || product.colors[0];
            const quantities = allColorQuantities[selectedColorIndex] || {};

            const wholesalePrice = calculateWholesalePrice(product.retail_price_krw, discountRate);
            const totalQty = Object.values(allColorQuantities).reduce((sum, colorQties) => {

            const totalAmount = totalQty * wholesalePrice;

            const handleQtyChange = (size, val) => {

                    ...allColorQuantities,
                    [selectedColorIndex]: { ...currentQties, [size]: Math.max(0, parseInt(val) || 0) }

            const [bulkQty, setBulkQty] = useState('');

            const handleApplyToAll = () => {

                product.sizes.forEach(size => { next[size] = val; });
                setAllColorQuantities({

            const handleCopyFromColor = (sourceIdxStr) => {

            React.useEffect(() => {

            return (

                            </button>

                        <div className="modal-body">

                                <div className="detail-images">

                                        {((product.season && product.season.year === LATEST_SEASON.year && product.season.season === LATEST_SEASON.season) || product.is_hero) && (

                                        <button className="img-zoom-btn" onClick={() => setFullscreenImage(true)} title="View full size">

                                        {currentColor.images.length > 1 && (

                                        <img

                                        {currentColor.images.length > 1 && (

                                    <div className="detail-thumbnails">

                                <div className="detail-info">

                                            <div className="detail-value">{product.ship_date || 'N/A'}</div>
                                        </div>
                                        <div className="detail-field">
                                            <div className="detail-label">Sample Size</div>
                                            <div className="detail-value">{product.sample_size}</div>
                                        </div>
                                    </div>
                                    <div className="detail-row">
                                        <div className="detail-field">
                                            <div className="detail-label">Wholesale Price</div>
                                            <div className="detail-price">{formatUSD(wholesalePrice)}</div>
                                        </div>
                                        <div className="detail-field">
                                            <div className="detail-label">Retail(KRW)</div>
                                            <div className="detail-value">{formatKRW(product.retail_price_krw)}</div>

                                    <div className="detail-field">
                                        <div className="detail-label">Color</div>
                                        <div className="color-swatches" style={{ paddingBottom: '1.25rem' }}>
                                            <div className="color-swatches-row">
                                                {product.colors.map((color, idx) => (
                                                    <div key={idx} style={{ position: 'relative' }}>
                                                        <button
                                                            className={`color-swatch ${idx === selectedColorIndex ? 'active' : ''}`}

                                                        {idx === selectedColorIndex && (

                                                        )}

                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="detail-field" style={{ borderBottom: 'none' }}>
                                        <div className="detail-label">Quantity by Size</div>
                                        <div className="bulk-size-helper">

                                            <div className="bulk-size-helper-group">
                                                <input

                                                    className="bulk-size-helper-btn"

                                                        const reset = {};
                                                        product.sizes.forEach(s => { reset[s] = 0; });

                                                const qtyByColor = {};
                                                product.colors.forEach(c => {
                                                    const sizesObj = {};
                                                    product.sizes.forEach(s => { sizesObj[s] = 1; });
                                                    qtyByColor[c.name] = sizesObj;

                                            const qtyByColor = {};
                                            Object.entries(allColorQuantities).forEach(([colorIdx, sizeQties]) => {
                                                const colorName = product.colors[parseInt(colorIdx)].name;
                                                const validSizes = {};
                                                product.sizes.forEach(size => {
                                                    if (sizeQties[size] > 0) {
                                                        validSizes[size] = sizeQties[size];
                                                    }
                                                });
                                                if (Object.keys(validSizes).length > 0) {

                                            onAddToCart(product, qtyByColor);
                                            onClose();

                            </div>
                        </div>
                    </div>

            );
        };

        // 로그인 페이지용 수주회 상태 + 카운트다운 (크고 감각적인 카드)
        // First-time login: forced password change modal
        const PasswordChangeModal = ({ partner, onComplete, onCancel }) => {
            const [pw1, setPw1] = useState('');
            const [pw2, setPw2] = useState('');
            const [error, setError] = useState('');
            const submit = (e) => {
                e.preventDefault();
                if (!pw1) { setError('Please enter a new password.'); return; }
                if (pw1 !== pw2) { setError('Passwords do not match.'); return; }
                if (pw1 === partner.temp_password) { setError('New password must be different from the initial password.'); return; }
                onComplete(pw1);
            };
            return (
                <div className="modal-backdrop" style={{ zIndex: 2000 }}>
                    <div className="modal-content" onClick={(e) => e.stopPropagation()} style={{ maxWidth: '440px', width: '92%', padding: 0 }}>
                        <div className="modal-header" style={{ padding: '20px 24px 12px' }}>
                            <h2 className="modal-title">Change Password</h2>
                        </div>
                        <form onSubmit={submit} style={{ padding: '8px 24px 20px' }}>
                            <div style={{ padding: '12px 14px', background: '#fffbeb', border: '1px solid #fde68a', borderRadius: '6px', fontSize: '12px', color: '#92400e', marginBottom: '16px', lineHeight: 1.6 }}>
                                You must change your initial password on first login.
                            </div>
                            <div className="form-group" style={{ marginBottom: '12px' }}>
                                <label className="form-label" style={{ fontSize: '12px', marginBottom: '6px' }}>New Password</label>
                                <input type="password" className="form-input" value={pw1} onChange={(e) => { setPw1(e.target.value); setError(''); }} autoFocus autoComplete="new-password" />
                            </div>
                            <div className="form-group" style={{ marginBottom: '12px' }}>
                                <label className="form-label" style={{ fontSize: '12px', marginBottom: '6px' }}>Confirm New Password</label>
                                <input type="password" className="form-input" value={pw2} onChange={(e) => { setPw2(e.target.value); setError(''); }} autoComplete="new-password" />
                            </div>
                            {error && <div style={{ fontSize: '12px', color: '#dc2626', marginBottom: '12px' }}>{error}</div>}
                            <div style={{ display: 'flex', gap: '8px', justifyContent: 'flex-end', marginTop: '8px' }}>
                                <button type="button" onClick={onCancel} style={{ padding: '10px 18px', background: '#fff', color: '#555', border: '1px solid #ddd', borderRadius: '4px', fontSize: '13px', fontWeight: 500, cursor: 'pointer' }}>Cancel</button>
                                <button type="submit" style={{ padding: '10px 18px', background: '#111', color: '#fff', border: 'none', borderRadius: '4px', fontSize: '13px', fontWeight: 600, cursor: 'pointer' }}>Change Password & Login</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // Forgot password request modal (sends Slack notification)
        const ForgotPasswordModal = ({ onClose, onSubmit }) => {
            const [email, setEmail] = useState('');
            const [submitting, setSubmitting] = useState(false);
            const submit = async (e) => {
                e.preventDefault();
                if (!email.trim()) return;
                setSubmitting(true);
                await onSubmit(email);
                setSubmitting(false);
            };
            return (
                <div className="modal-backdrop" onClick={onClose} style={{ zIndex: 2000 }}>
                    <div className="modal-content" onClick={(e) => e.stopPropagation()} style={{ maxWidth: '440px', width: '92%', padding: 0 }}>
                        <div className="modal-header" style={{ padding: '20px 24px 12px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>

                            <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: '4px' }}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg></button>
                        </div>

                            </div>

                                <label className="form-label" style={{ fontSize: '12px', marginBottom: '6px' }}>Registered Email</label>

                            </div>
                            <div style={{ display: 'flex', gap: '8px', justifyContent: 'flex-end' }}>
                                <button type="button" onClick={onClose} style={{ padding: '10px 18px', background: '#fff', color: '#555', border: '1px solid #ddd', borderRadius: '4px', fontSize: '13px', fontWeight: 500, cursor: 'pointer' }}>Cancel</button>
                                <button type="submit" disabled={!email.trim() || submitting} style={{ padding: '10px 18px', background: !email.trim() || submitting ? '#ccc' : '#111', color: '#fff', border: 'none', borderRadius: '4px', fontSize: '13px', fontWeight: 600, cursor: !email.trim() || submitting ? 'default' : 'pointer' }}>
                                    {submitting ? 'Submitting...' : 'Request Reset'}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const LoginSessionStatus = ({ scheduleStart, scheduleStatus, sessionEnabled }) => {
            const [now, setNow] = useState(new Date());
            useEffect(() => {
                const t = setInterval(() => setNow(new Date()), 1000);
                return () => clearInterval(t);
            }, []);
            const target = scheduleStatus === 'pending' ? scheduleStart : null;
            const diff = target ? Math.max(0, target - now) : 0;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const seconds = Math.floor((diff / 1000) % 60);
            const pad = (n) => String(n).padStart(2, '0');

            // 기간 설정 + 시작 전(pending) → OPENING SOON
            // 기간 미설정(null) 또는 종료(ended) → SHOWROOM NOT IN SESSION
            const isOutOfSession = scheduleStatus !== 'pending';

                const yyyy = d.getFullYear();
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                const hh = String(d.getHours()).padStart(2, '0');
                const mi = String(d.getMinutes()).padStart(2, '0');
                return `${yyyy}.${mm}.${dd}  ${hh}:${mi}`;

            return (

                    boxShadow: '0 12px 40px rgba(0,0,0,0.3)'

                    <div style={{
                        fontSize: '13px',
                        letterSpacing: '0.4em',
                        color: 'rgba(255,255,255,0.7)',

                        marginBottom: '12px'
