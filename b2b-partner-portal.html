                    {/* 메인 카피 */}
                    <div style={{
                        fontSize: 'clamp(22px, 3vw, 40px)',

                        fontWeight: 600,
                        letterSpacing: '-0.015em',

                        fontSize: '14px',

                    {/* 오픈 일정 + 카운트다운 */}
                    {scheduleStatus === 'pending' && (
                        <>
                            <div style={{
                                fontSize: '13px',
                                letterSpacing: '0.3em',
                                color: 'rgba(255,255,255,0.55)',
                                fontWeight: 500,
                                marginBottom: '10px'
                            }}>OPEN DATE</div>
                            <div style={{
                                fontSize: '22px',
                                color: '#fff',
                                fontWeight: 400,
                                letterSpacing: '0.05em',
                                fontFamily: "'JetBrains Mono', 'SF Mono', Menlo, monospace",

                                height: '1px',
                                background: 'rgba(255,255,255,0.1)',

                                    { v: hours, label: 'HOURS' },
                                    { v: minutes, label: 'MIN' },

                                                color: 'rgba(255,255,255,0.45)',

                                            }}>{unit.label}</div>
                                        </div>
                                    </React.Fragment>
                                ))}
                            </div>
                        </>
                    )}
                </div>

        // 수주회 준비중 / 카운트다운 랜딩

            const [now, setNow] = useState(new Date());
            useEffect(() => {

            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            // 기간 미설정(null) 또는 종료(ended) → NOT IN SESSION

                        position: 'absolute', top: 0, left: 0, right: 0, bottom: 0,

                        pointerEvents: 'none', zIndex: 0
                    }}></div>

                    {/* Top: Brand — 수주회 중지 상태에선 로고 축소, 컨텐츠 영역 강조 */}

                        <div style={{ fontSize: 'clamp(1.5rem, 2.5vw, 2.25rem)', fontWeight: 700, letterSpacing: '0.04em', color: '#fff', lineHeight: 1 }}>MUSINSA</div>
                        <div style={{ fontSize: 'clamp(0.65rem, 0.9vw, 0.75rem)', letterSpacing: '0.4em', opacity: 0.6, color: '#fff', marginTop: '6px' }}>GLOBAL B2B</div>
                    </div>

                    {/* Headline */}
                    <div style={{ textAlign: 'center', position: 'relative', zIndex: 1 }}>
                        <h1 style={{
                            fontSize: 'clamp(60px, 9vw, 120px)',
                            fontWeight: 700,
                            letterSpacing: '-0.025em',

                            margin: 0,

                            letterSpacing: '0.01em',
                            maxWidth: '560px',
                            margin: '24px auto 0',

                            <div style={{ display: 'flex', gap: 'clamp(6px, 1.2vw, 16px)', alignItems: 'flex-start', justifyContent: 'center', flexWrap: 'nowrap' }}>
                                {[
                                    { v: days, label: 'DAYS' },
                                    { v: hours, label: 'HOURS' },
                                    { v: minutes, label: 'MIN' },
                                    { v: seconds, label: 'SEC' }
                                ].map((unit, i) => (
                                    <React.Fragment key={i}>
                                        {i > 0 && (
                                            <div style={{
                                                fontSize: 'clamp(36px, 8vw, 88px)',
                                                fontWeight: 200,
                                                lineHeight: 1,
                                                color: 'rgba(255,255,255,0.3)',
                                                fontFamily: "'JetBrains Mono', 'SF Mono', Menlo, monospace",

                                            }}>:</div>

                                        <div style={{ textAlign: 'center', minWidth: 'clamp(56px, 14vw, 110px)', flexShrink: 0 }}>

                                                fontSize: 'clamp(36px, 8vw, 88px)',

                    )}

                    {/* Schedule info for ended */}
                    {scheduleStatus === 'ended' && scheduleStart && (
                        <div style={{ textAlign: 'center', marginTop: '32px', fontSize: '13px', color: 'rgba(255,255,255,0.45)', letterSpacing: '0.05em', position: 'relative', zIndex: 1 }}>
                            ENDED · {formatScheduleRange()}
                        </div>
                    )}

                    {/* Actions */}
                    <div style={{ marginTop: '64px', display: 'flex', gap: '12px', alignItems: 'center', position: 'relative', zIndex: 1 }}>
                        {hasOrders && (
                            <button
                                onClick={onMyOrders}
                                style={{
                                    padding: '14px 32px',
                                    background: 'transparent',
                                    color: '#fff',
                                    border: '1px solid rgba(255,255,255,0.3)',
                                    borderRadius: '2px',
                                    fontSize: '12px',
                                    fontWeight: 500,
                                    letterSpacing: '0.15em',
                                    cursor: 'pointer',
                                    textTransform: 'uppercase',
                                    transition: 'all 0.2s',
                                    fontFamily: 'inherit'
                                }}
                                onMouseEnter={(e) => { e.target.style.background = 'rgba(255,255,255,0.05)'; e.target.style.borderColor = 'rgba(255,255,255,0.6)'; }}
                                onMouseLeave={(e) => { e.target.style.background = 'transparent'; e.target.style.borderColor = 'rgba(255,255,255,0.3)'; }}
                            >View My Orders</button>
                        )}
                        <button
                            onClick={onLogout}
                            style={{
                                padding: '14px 32px',
                                background: 'transparent',
                                color: 'rgba(255,255,255,0.6)',
                                border: '1px solid rgba(255,255,255,0.3)',
                                borderRadius: '2px',
                                fontSize: '12px',
                                fontWeight: 500,
                                letterSpacing: '0.15em',
                                cursor: 'pointer',
                                textTransform: 'uppercase',
                                transition: 'all 0.2s',
                                fontFamily: 'inherit'
                            }}
                            onMouseEnter={(e) => { e.target.style.color = '#fff'; e.target.style.background = 'rgba(255,255,255,0.05)'; e.target.style.borderColor = 'rgba(255,255,255,0.6)'; }}
                            onMouseLeave={(e) => { e.target.style.color = 'rgba(255,255,255,0.6)'; e.target.style.background = 'transparent'; e.target.style.borderColor = 'rgba(255,255,255,0.3)'; }}
                        >Logout</button>
                    </div>

                    {/* Bottom: copyright */}
                    <div style={{ position: 'absolute', bottom: '32px', left: 0, right: 0, textAlign: 'center', fontSize: '11px', color: 'rgba(255,255,255,0.25)', letterSpacing: '0.1em', zIndex: 1 }}>
                        © MUSINSA · GLOBAL B2B
                    </div>
                </div>
            );
        };

        // MAIN APP
        const App = () => {
            const VALID_PAGES = ['login', 'home', 'products', 'confirm', 'orders'];
            // index.html에서 ?fresh=1로 진입한 경우 로그인 상태 초기화
            const _isFreshEntry = (() => {
                try {
                    const params = new URLSearchParams(window.location.search);
                    if (params.get('fresh') === '1') {
                        localStorage.removeItem('musinsa_b2b_partner_logged_in');
                        const url = new URL(window.location.href);
                        url.searchParams.delete('fresh');
                        window.history.replaceState(null, '', url.toString());
                        return true;
                    }
                } catch (e) { }
                return false;
            })();
            // 로그인된 파트너 정보: localStorage에 저장 → 새로고침 시 유지
            const [currentPartner, setCurrentPartner] = useState(() => {
                if (_isFreshEntry) {
                    // fresh 진입이면 저장된 로그인 무시하고 기본값 (실제 로그인 시 currentPartner 갱신됨)
                    try {
                        const saved = localStorage.getItem('musinsa_b2b_partners');
                        if (saved) {
                            const parsed = JSON.parse(saved);
                            if (Array.isArray(parsed) && parsed.length > 0) return parsed[0];
                        }
                    } catch (e) { }
                    return PARTNERS[0];
                }
                try {
                    const savedPartner = localStorage.getItem('musinsa_b2b_partner_logged_in');
                    if (savedPartner) {
                        const parsed = JSON.parse(savedPartner);
                        if (parsed && parsed.partner_id) return parsed;
                    }
                } catch (e) { }
                try {
                    const saved = localStorage.getItem('musinsa_b2b_partners');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (Array.isArray(parsed) && parsed.length > 0) return parsed[0];
                    }
                } catch (e) { }
                return PARTNERS[0];
            });
            // 페이지 상태: URL 해시 기반 (예: #orders)
            const [page, _setPage] = useState(() => {
                if (_isFreshEntry) return 'login';
                const hash = (window.location.hash || '').replace('#', '');
                // URL이 #login이면 무조건 로그인 페이지 노출 (새로고침 시 의도 보존)
                if (hash === 'login') return 'login';
                const isLoggedIn = (() => {
                    try { return !!JSON.parse(localStorage.getItem('musinsa_b2b_partner_logged_in') || 'null'); } catch (e) { return false; }
                })();
                if (!isLoggedIn) return 'login';
                return VALID_PAGES.includes(hash) ? hash : 'home';
            });
            // setPage 래퍼: URL 해시도 함께 업데이트
            const setPage = React.useCallback((newPage) => {
                if (!VALID_PAGES.includes(newPage)) newPage = 'home';
                const targetHash = '#' + newPage;
                if (window.location.hash !== targetHash) {
                    window.history.pushState({ page: newPage }, '', targetHash);
                }
                _setPage(newPage);
            }, []);
            // popstate (뒤로가기/앞으로가기) 처리
            useEffect(() => {
                const onPop = () => {
                    const hash = (window.location.hash || '').replace('#', '');
                    const target = VALID_PAGES.includes(hash) ? hash : 'home';
                    _setPage(target);
                };
                window.addEventListener('popstate', onPop);
                if (!window.history.state) {
                    window.history.replaceState({ page }, '', '#' + page);
                }
                return () => window.removeEventListener('popstate', onPop);
            }, []);
            // currentPartner가 바뀔 때마다 localStorage에 저장 (로그인 유지)
            useEffect(() => {
                try {
                    if (currentPartner && page !== 'login') {
                        localStorage.setItem('musinsa_b2b_partner_logged_in', JSON.stringify(currentPartner));
                    }
                } catch (e) { }
            }, [currentPartner, page]);

            // 뷰포트 폭 추적 (My Orders 썸네일 갯수 결정용)
            const [viewportWidth, setViewportWidth] = useState(typeof window !== 'undefined' ? window.innerWidth : 1440);
            useEffect(() => {
                const onResize = () => setViewportWidth(window.innerWidth);
                window.addEventListener('resize', onResize);
                return () => window.removeEventListener('resize', onResize);
            }, []);

            // Display Settings (어드민에서 변경 시 자동 반영)
            const [displaySettings, setDisplaySettings] = useState(() => {
                // 모듈 레벨 DISPLAY_SETTINGS를 초기값으로
                return DISPLAY_SETTINGS;
            });
            // displaySettings 변경 시 모듈 변수도 동기화 (다른 곳에서 참조하는 코드 호환)
            useEffect(() => {
                DISPLAY_SETTINGS = displaySettings;
            }, [displaySettings]);
            // Supabase + localStorage에서 displaySettings 폴링
            useEffect(() => {
                let cancelled = false;
                const reload = async () => {
                    // 1순위: Supabase
                    if (SBSync.enabled) {
                        try {
                            const dsRow = await (async () => {
                                const { data, error } = await supabaseClient.from('display_settings').select('*').eq('id', 1).single();
                                if (error) throw error;
                                return data;
                            })();
                            if (cancelled || !dsRow) return;
                            // banner_slots 안에 묶어둔 메타 정보 추출
                            const bs = dsRow.banner_slots || {};
                            const { __loginMedia, __heroMedia, __emailTemplates, __orderSettings, __genderOrder, ...realBanners } = bs;
                            const remoteSettings = {
                                categoryOrder: dsRow.category_order || {},
                                genderOrder: __genderOrder || {},
                                newProducts: dsRow.new_products || [],
                                heroProducts: dsRow.hero_products || [],
                                bannerSlots: realBanners,
                                loginMedia: __loginMedia || null,
                                heroMedia: __heroMedia || null,
                                emailTemplates: __emailTemplates || null,
                                orderSettings: __orderSettings || null
                            };
                            if (JSON.stringify(remoteSettings) !== JSON.stringify(displaySettings)) {
                                setDisplaySettings(remoteSettings);
                            }
                            return;
                        } catch (e) { /* fallthrough to localStorage */ }
                    }
                    // 2순위: localStorage
                    try {
                        const saved = localStorage.getItem('musinsa_b2b_display_settings');
                        if (saved) {
                            const parsed = JSON.parse(saved);
                            if (JSON.stringify(parsed) !== JSON.stringify(displaySettings)) {
                                setDisplaySettings(parsed);
                            }
                        }
                    } catch (e) { }
                };
                reload();
                const interval = setInterval(reload, 5000); // 5초마다
                return () => { cancelled = true; clearInterval(interval); };
            }, []);

            const [language, setLanguage] = useState('EN');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [forcePasswordChange, setForcePasswordChange] = useState(null); // 최초 로그인 시 비번 변경 강제 (partner 객체 보관)
            const [forgotOpen, setForgotOpen] = useState(false);
            const [partners, setPartners] = useState(() => {
                try {
                    const saved = localStorage.getItem('musinsa_b2b_partners');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (Array.isArray(parsed) && parsed.length > 0) return parsed;
                    }
                } catch (e) { }
                return PARTNERS;
            });
            const [cart, setCart] = useState(() => {
                // 새로고침 시 장바구니 유지 — localStorage에서 복원
                try {
                    const saved = localStorage.getItem('musinsa_b2b_cart');
                    if (saved) return JSON.parse(saved);
                } catch (e) { }
                return {};
            });
            // cart 변경 시마다 localStorage에 저장
            useEffect(() => {
                try { localStorage.setItem('musinsa_b2b_cart', JSON.stringify(cart)); } catch (e) { }
            }, [cart]);
            const [selectedConfirmKeys, setSelectedConfirmKeys] = useState([]); // Order Confirmation 페이지 벌크 선택용
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [modalOpen, setModalOpen] = useState(false);
            const [cartDrawerOpen, setCartDrawerOpen] = useState(false);
            const [accountModalOpen, setAccountModalOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterCategories, setFilterCategories] = useState([]);
            const [filterSubCategories, setFilterSubCategories] = useState([]);
            const [showCategoryPanel, setShowCategoryPanel] = useState(false);
            const [activeCat, setActiveCat] = useState(null);
            const [filterDropdownOpen, setFilterDropdownOpen] = useState(null);
            const filterDropdownRef = React.useRef(null);
            const [showSearch, setShowSearch] = useState(false);
            const [showAllFilters, setShowAllFilters] = useState(false); // 모바일 필터 바 전체 보기 토글
            const [orderSubmitted, setOrderSubmitted] = useState(false);
            const [editingProduct, setEditingProduct] = useState(null);
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [cancelTarget, setCancelTarget] = useState(null); // 취소 확인 모달용
            const [suggestedExpanded, setSuggestedExpanded] = useState(false);
            const [orderInfoCollapsed, setOrderInfoCollapsed] = useState(false); // 모바일 주문 상세 모달: 스크롤 시 상단 정보 카드 접힘
            // 모달 열릴 때마다 collapsed 초기화
            useEffect(() => {
                if (selectedOrder) setOrderInfoCollapsed(false);
            }, [selectedOrder]);

            // Supabase에서 partners 초기 로드 + 폴링 (DB에 없는 로컬 컬럼 — 예: country, password — 보존)
            useEffect(() => {
                if (!SBSync.enabled) return;
                let cancelled = false;
                const loadPartners = async () => {
                    const dbPartners = await SBSync.fetchAll('partners');
                    if (cancelled || !dbPartners || dbPartners.length === 0) return;
                    // 머지 — 로컬 state를 base로 두고, DB row에서 정의된 값(undefined/null 제외)만 덮어씀
                    setPartners(prev => {
                        const localById = {};
                        (prev || []).forEach(p => { localById[p.partner_id] = p; });
                        const merged = dbPartners.map(dbRow => {
                            const local = localById[dbRow.partner_id];
                            if (!local) return dbRow;
                            const out = { ...local };
                            Object.keys(dbRow).forEach(k => {
                                const v = dbRow[k];
                                if (v !== undefined && v !== null) out[k] = v;
                            });
                            return out;
                        });
                        if (JSON.stringify(merged) === JSON.stringify(prev)) return prev;
                        return merged;
                    });
                };
                loadPartners();
                const interval = setInterval(loadPartners, 10000); // 10초마다 폴링
                return () => { cancelled = true; clearInterval(interval); };
            }, []);

            // 모달 열릴 때마다 확장 상태 초기화
            useEffect(() => { if (selectedOrder) setSuggestedExpanded(false); }, [selectedOrder?.order_id]);
            // 주문 상세 모달이 열려있는 동안 배경 스크롤 잠금
            useEffect(() => {
                if (!selectedOrder) return;
                const prevOverflow = document.body.style.overflow;
                const prevPaddingRight = document.body.style.paddingRight;
                // 스크롤바 너비만큼 padding 보정 (레이아웃 점프 방지)
                const scrollbarWidth = window.innerWidth - document.documentElement.clientWidth;
                document.body.style.overflow = 'hidden';
                if (scrollbarWidth > 0) document.body.style.paddingRight = scrollbarWidth + 'px';
                return () => {
                    document.body.style.overflow = prevOverflow;
                    document.body.style.paddingRight = prevPaddingRight;
                };
            }, [selectedOrder?.order_id]);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [activeFilter, setActiveFilter] = useState('all');
            const [filterYear, setFilterYear] = useState('All');
            const [filterSeason, setFilterSeason] = useState('All');
            // 카테고리 표시 순서 (무신사 스타일: 아우터 → 상의 → 하의 → 악세서리)
            const CATEGORY_ORDER = ['Outerwear', 'Tops', 'Pants', 'Bottoms', 'Skirts', 'Dresses', 'Shoes', 'Bags', 'Accessories'];
            const categoryList = [...new Set(PRODUCTS.filter(p => p.is_visible).map(p => p.category).filter(Boolean))].sort((a, b) => {
                const ia = CATEGORY_ORDER.indexOf(a);
                const ib = CATEGORY_ORDER.indexOf(b);
                if (ia === -1 && ib === -1) return a.localeCompare(b);
                if (ia === -1) return 1;
                if (ib === -1) return -1;
                return ia - ib;
            });
            const subCatsByCategory = {};
            PRODUCTS.filter(p => p.is_visible).forEach(p => {
                if (p.category && p.sub_category) {
                    if (!subCatsByCategory[p.category]) subCatsByCategory[p.category] = new Set();
                    subCatsByCategory[p.category].add(p.sub_category);
                }
            });
            const [selectedGenders, setSelectedGenders] = useState([]);
            const [orders, setOrders] = useState(() => {
                try {
                    const saved = localStorage.getItem('musinsa_b2b_orders');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        // Restore product references
                        return parsed.map(order => ({
                            ...order,
                            items: (order.items || []).map(item => ({
                                ...item,
                                product: PRODUCTS.find(p => p.id === item.productId) || item.product
                            }))
                        }));
                    }
                } catch (e) { }
                return ORDERS;
            });
            const [scrollY, setScrollY] = useState(0);
            const [summaryBarHidden, setSummaryBarHidden] = useState(false);
            const [heroRevealed, setHeroRevealed] = useState(false);
            const heroScrollDone = React.useRef(false);
            const heroVideoRef = React.useRef(null);
            const [heroVideoPaused, setHeroVideoPaused] = useState(false);

            // Persist orders to localStorage (Supabase는 주문 제출/취소 시점에 직접 upsert)
            const sbOrdersInitDone = React.useRef(false);
            useEffect(() => {
                try {
                    const toSave = orders.map(order => ({
                        ...order,
                        items: (order.items || []).map(item => ({
                            ...item,
                            productId: item.product?.id || item.productId,
                            product: undefined
                        }))
                    }));
                    localStorage.setItem('musinsa_b2b_orders', JSON.stringify(toSave));
                } catch (e) { }
            }, [orders]);

            // Supabase에서 초기 orders 로드 (있으면 덮어쓰기)
            useEffect(() => {
                if (!SBSync.enabled) { sbOrdersInitDone.current = true; return; }
                let cancelled = false;
                (async () => {
                    const dbOrders = await SBSync.fetchAll('orders');
                    if (cancelled) return;
                    if (dbOrders) {
                        const restored = dbOrders.map(order => ({
                            ...order,
                            items: (order.items || []).map(item => ({
                                ...item,
                                product: PRODUCTS.find(p => p.id === item.productId) || item.product
                            }))
                        }));
                        setOrders(restored);
                    }
                    sbOrdersInitDone.current = true;
                })();
                return () => { cancelled = true; };
            }, []);

            // Supabase orders 폴링 (5초마다) — MERGE 방식: 로컬에만 있는 주문도 보존
            useEffect(() => {
                if (!SBSync.enabled) return;
                const interval = setInterval(async () => {
                    const dbOrders = await SBSync.fetchAll('orders');
                    if (!dbOrders) return;
                    // 로컬에만 있는 신규 주문 보존 + 최신 updated_at 우선
                    setOrders(prev => {
                        const localById = {};
                        prev.forEach(o => { localById[o.order_id] = o; });
                        const restoreItems = (order) => ({
                            ...order,
                            items: (order.items || []).map(item => ({
                                ...item,
                                product: PRODUCTS.find(p => p.id === item.productId) || item.product
                            }))
                        });
                        const merged = [];
                        const dbIds = new Set();
                        dbOrders.forEach(dbRow => {
                            dbIds.add(dbRow.order_id);
                            const local = localById[dbRow.order_id];
                            if (local && local.updated_at && dbRow.updated_at && new Date(local.updated_at) > new Date(dbRow.updated_at)) {
                                merged.push(local); // 로컬이 더 최신
                            } else {
                                merged.push(restoreItems(dbRow));
                            }
                        });
                        prev.forEach(o => { if (!dbIds.has(o.order_id)) merged.push(o); });
                        const sameLength = merged.length === prev.length;
                        if (sameLength) {
                            const a = JSON.stringify(merged.map(o => o.order_id + '|' + o.status + '|' + o.updated_at));
                            const b = JSON.stringify(prev.map(o => o.order_id + '|' + o.status + '|' + o.updated_at));
                            if (a === b) return prev;
                        }
                        return merged;
                    });
                }, 5000);
                return () => clearInterval(interval);
            }, []);

            // Listen for admin status changes (instant via storage event + fallback polling)
            useEffect(() => {
                const syncOrders = () => {
                    try {
                        const saved = localStorage.getItem('musinsa_b2b_orders');
                        if (saved) {
                            const parsed = JSON.parse(saved);
                            const restored = parsed.map(order => ({
                                ...order,
                                items: (order.items || []).map(item => ({
                                    ...item,
                                    product: PRODUCTS.find(p => p.id === item.productId) || item.product
                                }))
                            }));
                            if (JSON.stringify(parsed) !== JSON.stringify(orders.map(o => ({ ...o, items: (o.items || []).map(i => ({ ...i, productId: i.product?.id || i.productId, product: undefined })) })))) {
                                setOrders(restored);
                            }
                        }
                    } catch (e) { }
                };
                const onStorage = (e) => {
                    if (!e.key || e.key === 'musinsa_b2b_orders') syncOrders();
                };
                window.addEventListener('storage', onStorage);
                const interval = setInterval(syncOrders, 1000);
                return () => {
                    window.removeEventListener('storage', onStorage);
                    clearInterval(interval);
                };
            }, [orders]);

            const toggleHeroVideo = (e) => {
                e.stopPropagation();
                const v = heroVideoRef.current;
                if (!v) return;
                if (v.paused) {
                    v.play();
                    setHeroVideoPaused(false);
                } else {
                    v.pause();
                    setHeroVideoPaused(true);
                }
            };

            useEffect(() => {
                if (page !== 'home') {
                    heroScrollDone.current = false;
                    setHeroRevealed(false);
                    return;
                }
                if (heroScrollDone.current) return;
                const isMobile = window.innerWidth <= 768;
                if (isMobile) {
                    // On mobile, skip the scroll-jump mechanic. Rely on the CSS
                    // entrance animation (video zoom + text fade) triggered by .hero-revealed.
                    window.scrollTo(0, 0);
                    const tMob = setTimeout(() => {
                        setHeroRevealed(true);
                        heroScrollDone.current = true;
                    }, 200);
                    return () => clearTimeout(tMob);
                }
                // Desktop: scroll so the hero is completely above the viewport (banner section
                // with its top padding is what the user sees), then smooth-scroll back up to reveal hero.
                const heroEl = document.querySelector('.hero-section');
                let offset;
                if (heroEl) {
                    // Viewport top aligned to banner section top (= hero bottom). Hero is fully above,
                    // banner padding area shows as the white whitespace at the top of the viewport.
                    offset = heroEl.getBoundingClientRect().bottom + window.scrollY;
                } else {
                    offset = 600;
                }
                window.scrollTo(0, Math.max(0, offset));
                // After a brief pause, smooth-scroll up to reveal hero
                const t1 = setTimeout(() => {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }, 300);
                // After scroll completes, fade in text
                const t2 = setTimeout(() => {
                    setHeroRevealed(true);

            // 일괄 발주 엑셀 업로드 처리 (Order Confirmation에서 사용)
            const handleBulkUpload = (file, ev) => {
                if (!file) return;
                if (typeof XLSX === 'undefined') { alert('Excel library is still loading. Please try again.'); return; }
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const wb = XLSX.read(data, { type: 'array' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
                        const newCart = { ...cart };
                        let applied = 0; const errors = [];
                        rows.forEach((r, idx) => {
                            const styleNo = String(r['Style No'] || r['스타일번호'] || '').trim();
                            const colorName = String(r['Color'] || r['색상'] || '').trim();
                            const size = String(r['Size'] || r['사이즈'] || '').trim();
                            const qty = parseInt(r['Qty'] || r['수량'] || 0, 10);
                            if (!styleNo || qty < 0) return; // 빈 행 무시 (Total 행 등)
                            const product = PRODUCTS.find(p => p.style_no === styleNo);
                            if (!product) { errors.push(`행 ${idx + 2}: 상품 '${styleNo}' 찾을 수 없음`); return; }
                            if (!size) { errors.push(`행 ${idx + 2}: 사이즈 누락`); return; }
                            const finalColor = colorName || (product.colors?.[0]?.name) || (product.color || '');
                            if (!newCart[product.id]) newCart[product.id] = {};
                            if (!newCart[product.id][finalColor]) newCart[product.id][finalColor] = {};
                            if (qty > 0) newCart[product.id][finalColor][size] = qty;
                            else delete newCart[product.id][finalColor][size];
                            applied += 1;
                        });
                        // 빈 color/product 정리
                        Object.keys(newCart).forEach(pid => {
                            Object.keys(newCart[pid]).forEach(c => {
                                if (Object.keys(newCart[pid][c]).length === 0) delete newCart[pid][c];
                            });
                            if (Object.keys(newCart[pid]).length === 0) delete newCart[pid];
                        });
                        setCart(newCart);
                        setOrderSubmitted(false);
                        if (errors.length > 0) {
                            alert(`✅ ${applied} item(s) applied\n⚠️ ${errors.length} error(s):\n${errors.slice(0, 5).join('\n')}${errors.length > 5 ? `\n…and ${errors.length - 5} more` : ''}`);
                        } else {
                            alert(`✅ ${applied} item(s) quantity uploaded successfully.`);
                        }
                    } catch (err) {

                };
                reader.readAsArrayBuffer(file);

            const getCartStats = (source) => {
                const data = source || cart;

                Object.entries(data).forEach(([productId, colorQties]) => {

                    if (product) {
                        let qty = 0;
                        // Count each color variant (with any qty > 0) as a separate style row
                        Object.values(colorQties).forEach(sizeQties => {
                            const colorQty = Object.values(sizeQties).reduce((a, b) => a + b, 0);
                            if (colorQty > 0) totalStyles += 1;

            // Newer products (higher P-id) come first
            const sortByRecency = (arr) => [...arr].sort((a, b) => {
                const ai = parseInt((a.id || '').replace(/[^0-9]/g, ''), 10) || 0;
                const bi = parseInt((b.id || '').replace(/[^0-9]/g, ''), 10) || 0;

            });

            const getVisibleProducts = () => {
                const filtered = PRODUCTS.filter(p => p.is_visible).filter(p => {
                    if (filterCategories.length > 0 && !filterCategories.includes(p.category)) return false;
                    if (filterSubCategories.length > 0 && !filterSubCategories.includes(p.sub_category)) return false;
                    if (searchTerm && !p.name.toLowerCase().includes(searchTerm.toLowerCase()) && !p.style_no.toLowerCase().includes(searchTerm.toLowerCase())) return false;
                    if (activeFilter === 'hero' && !p.is_hero) return false;
                    if (filterYear !== 'All' && p.season && p.season.year !== parseInt(filterYear)) return false;
                    if (filterSeason !== 'All' && p.season && p.season.season !== filterSeason) return false;
                    if (selectedGenders.length > 0 && !selectedGenders.includes(p.gender)) return false;
                    return true;
                });
                // 어드민이 설정한 노출 순서를 적용 — 사용자가 보고 있는 컨텍스트에 따라 가장 적합한 순서를 우선:
                //   • 단일 카테고리 필터(예: Outerwear 탭) → 그 카테고리의 카테고리별 순서
                //   • 단일 성별 필터만(예: MEN 배너) → 그 성별의 구분별 순서
                //   • 그 외(전체 보기 / 복합 필터) → 카테고리 그룹(Outerwear → Tops → …) 안에서 카테고리별 순서, tie 시 구분별 순서, 마지막은 ID 오름차순
                const catMap = displaySettings.categoryOrder || {};
                const genderMap = displaySettings.genderOrder || {};
                const rankIn = (arr, id) => {
                    if (!arr) return Number.MAX_SAFE_INTEGER;
                    const i = arr.indexOf(id);
                    return i === -1 ? Number.MAX_SAFE_INTEGER : i;
                };
                const catGroupRank = (cat) => {
                    const i = CATEGORY_ORDER.indexOf(cat);
                    return i === -1 ? 999 : i;
                };
                const singleCategory = filterCategories.length === 1 ? filterCategories[0] : null;
                const singleGender = (selectedGenders.length === 1 && filterCategories.length === 0) ? selectedGenders[0] : null;
                return [...filtered].sort((a, b) => {
                    // 1. 단일 카테고리 컨텍스트 → 그 카테고리의 순서만 적용
                    if (singleCategory) {
                        const ra = rankIn(catMap[singleCategory], a.id);
                        const rb = rankIn(catMap[singleCategory], b.id);
                        if (ra !== rb) return ra - rb;
                        return productIdRank(a) - productIdRank(b);
                    }
                    // 2. 단일 성별 컨텍스트 → 그 성별의 순서만 적용
                    if (singleGender) {
                        const ra = rankIn(genderMap[singleGender], a.id);
                        const rb = rankIn(genderMap[singleGender], b.id);
                        if (ra !== rb) return ra - rb;
                        return productIdRank(a) - productIdRank(b);
                    }
                    // 3. 일반: 카테고리 그룹 우선 (Outerwear → Tops → …) 으로 묶고
                    if (a.category !== b.category) {
                        return catGroupRank(a.category) - catGroupRank(b.category);
                    }
                    // 4. 같은 카테고리 안에서: 어드민의 카테고리별 순서
                    const ca = rankIn(catMap[a.category], a.id);
                    const cb = rankIn(catMap[b.category], b.id);
                    if (ca !== cb) return ca - cb;
                    // 5. 카테고리 순서가 같다면(또는 미설정): 구분별 순서로 tie-break
                    const ga = rankIn(genderMap[a.gender], a.id);
                    const gb = rankIn(genderMap[b.gender], b.id);
                    if (ga !== gb) return ga - gb;
                    // 6. 마지막 fallback: ID 오름차순 (P-001부터)
                    return productIdRank(a) - productIdRank(b);
                });
            };

            const getNewProducts = () => {
                // 어드민 전시 설정의 NEW 상품 우선 적용
                if (DISPLAY_SETTINGS.newProducts && DISPLAY_SETTINGS.newProducts.length > 0) {
                    const adminNew = DISPLAY_SETTINGS.newProducts.map(id => PRODUCTS.find(p => p.id === id)).filter(Boolean);
                    if (adminNew.length > 0) return adminNew;
                }
                // Exclude specific products from the main "NEW" showcase (e.g., those with visually dim hero shots)
                const NEW_EXCLUDE = new Set(['P-023', 'P-024', 'P-044']);
                // Pinned products for specific NEW slots (1-indexed). Overrides the default slot occupant.
                const NEW_PINS = { 1: 'P-033', 3: 'P-031', 6: 'P-025' };
                const pinnedNewIds = new Set(Object.values(NEW_PINS));
                // Exclude products that are already featured in HERO section from NEW showcase
                const latest = PRODUCTS.filter(p => p.is_visible && !p.is_hero && !NEW_EXCLUDE.has(p.id) && !pinnedNewIds.has(p.id) && p.season && p.season.year === LATEST_SEASON.year && p.season.season === LATEST_SEASON.season);
                // Interleave order (1-indexed slot → desired gender)
                const order = ['Male', 'Female', 'Male', 'Female', 'Kids', 'Accessories', 'Female', 'Female', 'Kids', 'Accessories'];
                // Pins consume one slot of their slot's *designated* gender, not their own gender
                const quotas = { Male: 0, Female: 0, Kids: 0, Accessories: 0 };
                order.forEach((g, idx) => {
                    const slotIsPinned = NEW_PINS[idx + 1] != null;
                    if (!slotIsPinned) quotas[g] += 1;
                });
                const byGender = { Male: [], Female: [], Kids: [], Accessories: [] };
                sortByRecency(latest).forEach(p => { if (byGender[p.gender]) byGender[p.gender].push(p); });
                const picked = [];
                const pickedIds = new Set();
                Object.keys(quotas).forEach(g => {
                    byGender[g].slice(0, quotas[g]).forEach(p => { picked.push(p); pickedIds.add(p.id); });
                });
                // Fill any remaining slots if a bucket was short, prioritizing Male then Female then Kids then Accessories
                const fillOrder = ['Male', 'Female', 'Kids', 'Accessories'];
                const totalNeeded = 10 - Object.keys(NEW_PINS).length;
                while (picked.length < totalNeeded) {
                    let added = false;
                    for (const g of fillOrder) {
                        const next = byGender[g].find(p => !pickedIds.has(p.id));
                        if (next) { picked.push(next); pickedIds.add(next.id); added = true; if (picked.length >= totalNeeded) break; }
                    }
                    if (!added) break;
                }
                // Place pinned products at their designated slots first, then fill remaining slots per interleave order
                const buckets = { Male: [], Female: [], Kids: [], Accessories: [] };
                picked.forEach(p => buckets[p.gender].push(p));
                const interleaved = new Array(10).fill(null);
                Object.keys(NEW_PINS).forEach(slot => {
                    const idx = parseInt(slot, 10) - 1;
                    const pinProduct = PRODUCTS.find(p => p.id === NEW_PINS[slot]);
                    if (pinProduct) interleaved[idx] = pinProduct;
                });
                for (let i = 0; i < 10; i++) {
                    if (interleaved[i] != null) continue;
                    const g = order[i];
                    let next = buckets[g].shift();
                    if (!next) { for (const fg of fillOrder) { if (buckets[fg].length > 0) { next = buckets[fg].shift(); break; } } }
                    if (next) interleaved[i] = next;
                }
                return interleaved.filter(Boolean).slice(0, 10);
            };
            const getHeroProducts = () => {
                // 어드민 전시 설정의 HERO 상품 우선 적용
                if (DISPLAY_SETTINGS.heroProducts && DISPLAY_SETTINGS.heroProducts.length > 0) {
                    const adminHero = DISPLAY_SETTINGS.heroProducts.map(id => PRODUCTS.find(p => p.id === id)).filter(Boolean);
                    if (adminHero.length > 0) return adminHero;
                }
                // Exclude specific products from the main HERO showcase (e.g., dim-background shots)
                const HERO_EXCLUDE = new Set(['P-016', 'P-023', 'P-024', 'P-040']);
                // Pinned products for specific HERO slots (1-indexed). Overrides season/gender quotas.
                const HERO_PINS = { 2: 'P-010', 3: 'P-001' };
                const pinnedIds = new Set(Object.values(HERO_PINS));
                const newIds = new Set(getNewProducts().map(p => p.id));
                // HERO should feature products from seasons OTHER than the current NEW season
                const isLatestSeason = (p) => p.season && p.season.year === LATEST_SEASON.year && p.season.season === LATEST_SEASON.season;
                // Remaining hero pool (non-current-season, not excluded, not in NEW, not pinned)
                const heroes = sortByRecency(PRODUCTS.filter(p => p.is_hero && p.is_visible && !newIds.has(p.id) && !HERO_EXCLUDE.has(p.id) && !isLatestSeason(p) && !pinnedIds.has(p.id)));
                // Fill remaining slots (gender-balanced best-effort)
                const byGender = { Male: [], Female: [], Kids: [], Accessories: [] };
                heroes.forEach(p => { if (byGender[p.gender]) byGender[p.gender].push(p); });
                const pinnedCount = Object.keys(HERO_PINS).length;
                const HERO_MAX = 10;
                const remaining = HERO_MAX - pinnedCount;
                const fillOrder = ['Male', 'Female', 'Kids', 'Accessories'];
                const filler = [];
                const fillerIds = new Set();
                while (filler.length < remaining) {
                    let added = false;
                    for (const g of fillOrder) {
                        const next = (byGender[g] || []).find(p => !fillerIds.has(p.id));
                        if (next) { filler.push(next); fillerIds.add(next.id); added = true; if (filler.length >= remaining) break; }
                    }
                    if (!added) break;
                }
                // Place pinned products at their designated slots; fill the rest with `filler` in order
                const result = new Array(HERO_MAX).fill(null);
                Object.keys(HERO_PINS).forEach(slot => {
                    const idx = parseInt(slot, 10) - 1;
                    const pinProduct = PRODUCTS.find(p => p.id === HERO_PINS[slot]);
                    if (pinProduct) result[idx] = pinProduct;
                });
                let fi = 0;
                for (let i = 0; i < HERO_MAX; i++) {
                    if (result[i] == null && fi < filler.length) result[i] = filler[fi++];
                }
                return result.filter(Boolean);
            };

                                                                size,
                                                                qty,
                                                                unit_price: wholesalePrice,
                                                                subtotal: Math.round(qty * wholesalePrice * 100) / 100
                                                            });
                                                        }
                                                    });
                                                });

                                                        }, 0);
                                                        nextSeq = Math.max(maxSeq + 1, orders.length + 1);
                                                    }
                                                } catch (e) {}

                                            const newOrder = {

                                                    return;
                                                }
                                            }

                                            setCart({});

                                                        else if (top <= 4 && orderInfoCollapsed) setOrderInfoCollapsed(false);
                                                    }}>
                                                    <table className="order-items-table">
                                                        <thead>
                                                            <tr>
                                                                <th style={{ width: '48px' }}>No.</th>
                                                                <th style={{ width: '320px' }}>Product</th>
                                                                <th>Size</th>
                                                                <th>Qty</th>
                                                                <th>Unit Price</th>
                                                                <th>Subtotal</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {(() => {
                                                                const items = selectedOrder.items || [];
                                                                // (productId, color)별 블록으로 그룹핑 — 같은 색상이면 하나의 블록
                                                                const blocks = [];
                                                                let curBlock = null;
                                                                items.forEach((item) => {
                                                                    const pid = item.product?.id;
                                                                    const color = item.color || '';
                                                                    const key = `${pid}__${color}`;
                                                                    if (!curBlock || curBlock.key !== key) {
                                                                        curBlock = { key, productId: pid, color, product: item.product, items: [] };
                                                                        blocks.push(curBlock);
                                                                    }
                                                                    curBlock.items.push(item);
                                                                });
                                                                // NO.는 (상품, 컬러) 블록 단위로 카운트
                                                                const rows = [];
                                                                blocks.forEach((block, blockIdx) => {
                                                                    const blockNo = blockIdx + 1;
                                                                    block.items.forEach((item, itemIdx) => {
                                                                        const isFirstRowOfBlock = itemIdx === 0;
                                                                        rows.push(
                                                                            <tr key={`${block.key}-${itemIdx}`}>
                                                                                {isFirstRowOfBlock && (
                                                                                    <td className="row-no-cell" rowSpan={block.items.length} style={{ verticalAlign: 'top', background: '#fff' }}>
                                                                                        <div style={{ position: 'sticky', top: '50px', paddingTop: '4px' }}>{blockNo}</div>
                                                                                    </td>
                                                                                )}
                                                                                {isFirstRowOfBlock && (
                                                                                    <td rowSpan={block.items.length} style={{ verticalAlign: 'top', background: '#fff' }}>
                                                                                        <div style={{ position: 'sticky', top: '50px', display: 'flex', gap: '12px', alignItems: 'flex-start' }}>
                                                                                            <div className="product-cell-image" style={{ flexShrink: 0 }}>
                                                                                                <img src={block.product.images[0]} alt={block.product.name} draggable={false} loading="lazy" decoding="async" />
                                                                                            </div>
                                                                                            <div style={{ display: 'flex', flexDirection: 'column', gap: '4px', minWidth: 0, flex: 1 }}>
                                                                                                <div style={{ fontWeight: 500, lineHeight: 1.4, color: '#111', wordBreak: 'keep-all' }}>{block.product.name}</div>
                                                                                                <div style={{ fontSize: '12px', color: '#999', letterSpacing: '0.02em' }}>{block.product.style_no}</div>
                                                                                                {block.color && (
                                                                                                    <span className="order-color-badge" style={{ display: 'inline-flex', alignSelf: 'flex-start', alignItems: 'center', gap: '6px', padding: '4px 12px', background: '#f3f4f6', color: '#111', fontSize: '13px', fontWeight: 600, borderRadius: '999px', letterSpacing: '0.04em', marginTop: '10px' }}>
                                                                                                        <span style={{ width: '14px', height: '14px', borderRadius: '50%', background: getColorSwatch(block.color), border: '1px solid rgba(0,0,0,0.15)', flexShrink: 0 }}></span>
                                                                                                        {block.color}
                                                                                                    </span>
                                                                                                )}
                                                                                            </div>
                                                                                        </div>
                                                                                    </td>
                                                                                )}
                                                                                <td>{item.size}</td>
                                                                                <td>{item.qty}</td>
                                                                                <td>${item.unit_price.toFixed(2)}</td>
                                                                                <td style={{ fontWeight: 700 }}>${item.subtotal.toFixed(2)}</td>
                                                                            </tr>
                                                                        );
                                                                    });
                                                                });
                                                                return rows;
                                                            })()}
                                                        </tbody>
                                                        <tfoot>
                                                            <tr>
                                                                <td colSpan="2" style={{ verticalAlign: 'middle' }}>
                                                                    {selectedOrder.status === '주문접수' && (
                                                                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                                                            <button className="btn-outline-black" style={{ fontSize: '12px', padding: '6px 12px', color: '#111', borderColor: '#d1d5db', whiteSpace: 'nowrap' }} onClick={() => setCancelTarget(selectedOrder)}>CANCEL ORDER</button>
                                                                            <span style={{ fontSize: '11px', color: '#999', fontWeight: 400, lineHeight: 1.2 }}>Cancellation is not available here once the order has been approved.</span>
                                                                        </div>
                                                                    )}
                                                                </td>
                                                                <td style={{ textAlign: 'right', color: '#999', fontSize: '12px', fontWeight: 400, paddingRight: '8px' }}>Total Qty</td>
                                                                <td>{selectedOrder.total_qty}</td>
                                                                <td style={{ textAlign: 'right', color: '#999', fontSize: '12px', fontWeight: 400, paddingRight: '8px' }}>Total Amount</td>
                                                                <td>{formatUSD(selectedOrder.total_amount)}</td>
                                                            </tr>
                                                        </tfoot>
                                                    </table>
                                                </div>

                                            </div>
                                            {/* 모바일 전용: Total Qty/Amount 하단 고정 footer */}
                                            <div className="mobile-totals-footer">
                                                <div className="totals-row">
                                                    <span><em>Total Qty</em><strong>{selectedOrder.total_qty}</strong></span>
                                                    <span><em>Total Amount</em><strong>{formatUSD(selectedOrder.total_amount)}</strong></span>
                                                </div>
                                                {selectedOrder.status === '주문접수' && (
                                                    <div className="cancel-row">
                                                        <button className="btn-outline-black" style={{ fontSize: '11px', padding: '6px 10px', color: '#111', borderColor: '#d1d5db', whiteSpace: 'nowrap' }} onClick={() => setCancelTarget(selectedOrder)}>CANCEL ORDER</button>
                                                        <span>Cancellation is not available here once the order has been approved.</span>
                                                    </div>
                                                )}
                                            </div>
                                            {/* 모바일 전용: 하단 고정 닫기 버튼 */}
                                            <button className="modal-close-bottom" onClick={() => setSelectedOrder(null)}>CLOSE</button>
                                        </div>
                                    </div>
                                );
                            })()}
                        </div>
                    )}

                    {/* CANCEL ORDER CONFIRMATION MODAL */}
                    {cancelTarget && (() => {
                        // 주문 상태를 취소로 변경 + Supabase 동기화
                        const cancelInSupabase = async () => {
                            const cancelled = { ...cancelTarget, status: '주문취소', updated_at: new Date().toISOString() };
                            if (SBSync.enabled) {
                                const dbReady = SBOrderToDb({
                                    ...cancelled,
                                    items: (cancelled.items || []).map(it => ({ ...it, productId: it.product?.id || it.productId, product: undefined }))
                                });
                                await SBSync.upsertMany('orders', [dbReady]);
                            }
                            setOrders(prev => prev.map(o => o.order_id === cancelTarget.order_id ? cancelled : o));
                        };
                        const restoreToCart = async () => {
                            await cancelInSupabase();
                            // 카트에 다시 담기
                            const newCart = {};
                            (cancelTarget.items || []).forEach(it => {
                                const pid = it.product?.id || it.productId;
                                const color = it.color || '';
                                const size = it.size;
                                if (!pid || !size) return;
                                if (!newCart[pid]) newCart[pid] = {};
                                if (!newCart[pid][color]) newCart[pid][color] = {};
                                newCart[pid][color][size] = (newCart[pid][color][size] || 0) + (it.qty || 0);
                            });
                            setCart(newCart);
                            setOrderSubmitted(false);
                            setCancelTarget(null);
                            setSelectedOrder(null);
                            setPage('confirm');
                        };
                        const cancelOnly = async () => {
                            await cancelInSupabase();
                            setCancelTarget(null);
                            setSelectedOrder(null);
                        };
                        const itemCount = (cancelTarget.items || []).length;
                        const totalQty = cancelTarget.total_qty || (cancelTarget.items || []).reduce((s, it) => s + (it.qty || 0), 0);
                        return (
                            <div className="modal-backdrop" onClick={() => setCancelTarget(null)} style={{ zIndex: 2000 }}>
                                <div onClick={(e) => e.stopPropagation()} style={{ background: '#fff', borderRadius: '8px', maxWidth: '460px', width: '90%', padding: '28px', boxShadow: '0 10px 40px rgba(0,0,0,0.18)' }}>
                                    <h3 style={{ margin: '0 0 8px', fontSize: '18px', fontWeight: 700, color: '#111' }}>Cancel this order?</h3>
                                    <p style={{ margin: '0 0 20px', fontSize: '13px', color: '#666', lineHeight: 1.6 }}>
                                        <strong>{cancelTarget.order_id}</strong> · {itemCount} item{itemCount !== 1 ? 's' : ''} · {totalQty} units<br />
                                        Would you like to move these items back to your Order Confirmation, or cancel without keeping them?
                                    </p>
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                                        <button onClick={restoreToCart} style={{ padding: '12px 16px', background: '#111', color: '#fff', border: '1px solid #111', borderRadius: '4px', fontSize: '13px', fontWeight: 600, cursor: 'pointer', textTransform: 'uppercase', letterSpacing: '0.04em' }}>
                                            → Move items to Order Confirmation
                                        </button>
                                        <button onClick={cancelOnly} style={{ padding: '12px 16px', background: '#fff', color: '#c00', border: '1px solid #c00', borderRadius: '4px', fontSize: '13px', fontWeight: 600, cursor: 'pointer', textTransform: 'uppercase', letterSpacing: '0.04em' }}>
                                            Cancel without restoring
                                        </button>
                                        <button onClick={() => setCancelTarget(null)} style={{ padding: '10px 16px', background: 'transparent', color: '#666', border: 'none', fontSize: '13px', fontWeight: 500, cursor: 'pointer', marginTop: '4px' }}>
                                            Close
                                        </button>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}
                </div>
            );
        };

        // RENDER
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
